const CHAT_EMOJIS = ["🔥","💯","😂","😮","👍","❤️","🚀","💀"];
const CHAR_LIMIT = 255;

// Demo data for submission feed simulation
const DEMO_SKINS_SAMPLE = [];
const DEMO_TRADERS = [];
const DEMO_BASE_VALUES = {};

function SubmissionFeed({ allSkins, submissions, bracketSubs, onGoSkin }) {
  const [demoFeed,    setDemoFeed]    = useState([]);
  const [liveSubs,    setLiveSubs]    = useState([]); // only submissions added this session
  const [pushing,     setPushing]     = useState(false);
  const scrollRef     = useRef(null);
  const CARD_H        = 88;
  const prevSubCount  = useRef(null);

  // Seed initial demo entries then add one every 3–5s
  useEffect(() => {
    const skinsWithVal = allSkins.filter(s => s.val);
    if (skinsWithVal.length === 0) return; // no data yet — feed stays empty
    const makeEntry = (i, tsOffset=0) => {
      const skin  = skinsWithVal[i % skinsWithVal.length];
      const base  = skin.val.avg;
      const swing = (Math.random() - 0.46) * 0.12;
      const value = Math.round(base * (1 + swing) / 10) * 10;
      return { id:`demo_${i}_${Date.now()}`, skin, value, trader:"—", bracketId:null, _ts: Date.now() - tsOffset };
    };
    const seed = Array.from({length:8}, (_, i) => makeEntry(i, i * 7000));
    setDemoFeed(seed);
    let counter = 8;
    const addEntry = () => {
      const entry = makeEntry(counter++);
      setPushing(true);
      setTimeout(() => {
        setDemoFeed(prev => [entry, ...prev].slice(0, 30));
        setPushing(false);
        if (scrollRef.current) scrollRef.current.scrollTop = 0;
      }, 320);
    };
    let timeoutId;
    const schedule = () => {
      timeoutId = setTimeout(() => { addEntry(); schedule(); }, 3500 + Math.random() * 1800);
    };
    schedule();
    return () => clearTimeout(timeoutId);
  }, [allSkins]);

  // Merge live session subs + demo, sorted newest first with direction
  const feed = useMemo(() => {
    return [...demoFeed, ...liveSubs]
      .sort((a,b) => b._ts - a._ts)
      .slice(0, 30)
      .map((e, i, arr) => {
        const prev = arr.slice(i+1).find(x => x.skin.id === e.skin.id && x.bracketId === e.bracketId);
        const dir  = prev ? (e.value > prev.value ? "up" : e.value < prev.value ? "down" : "flat") : "flat";
        return { ...e, dir };
      });
  }, [demoFeed, liveSubs]);

  // Track baseline on mount, then watch for new session submissions only
  useEffect(() => {
    const count = (s, b) =>
      Object.values(s).flat().length +
      Object.values(b).flatMap(x => Object.values(x).flat()).length;
    // Set baseline on first render
    if (prevSubCount.current === null) {
      prevSubCount.current = count(submissions, bracketSubs);
      return;
    }
    const n = count(submissions, bracketSubs);
    if (n > prevSubCount.current) {
      prevSubCount.current = n;
      // Find the newest entry just added (highest _ts among all real subs)
      const allEntries = [];
      allSkins.forEach(skin => {
        (submissions[skin.id] || []).forEach(s => {
          if (!s.flagged) allEntries.push({ id:`real_${skin.id}_${s.submittedAt}_${s.value}`, skin, trader:s.traderId, value:s.value, _ts: Date.now(), bracketId:null });
        });
        Object.entries(bracketSubs[skin.id] || {}).forEach(([bracketId, subs]) => {
          subs.forEach(s => {
            if (!s.flagged) allEntries.push({ id:`bracket_${skin.id}_${bracketId}_${s.submittedAt}_${s.value}`, skin, trader:s.traderId, value:s.value, _ts: Date.now(), bracketId });
          });
        });
      });
      // Only add entries we haven't seen in liveSubs yet
      setLiveSubs(prev => {
        const existingIds = new Set(prev.map(e => e.id));
        const newEntries = allEntries.filter(e => !existingIds.has(e.id));
        if (!newEntries.length) return prev;
        setPushing(true);
        setTimeout(() => {
          setPushing(false);
          if (scrollRef.current) scrollRef.current.scrollTop = 0;
        }, 320);
        return [...newEntries, ...prev].slice(0, 30);
      });
    }
  }, [submissions, bracketSubs, allSkins]);

  const renderCard = (entry) => {
    const up   = entry.dir === "up";
    const down = entry.dir === "down";
    const gc   = up ? "#4ade80" : down ? "#f87171" : "#6b7280";
    const bracket = entry.bracketId ? SERIAL_BRACKETS.find(b=>b.id===entry.bracketId) : null;
    return (
      <div key={entry.id}
        onClick={() => onGoSkin && onGoSkin(entry.skin)}
        style={{
          marginBottom:6, borderRadius:10, padding:"8px 10px",
          background: up   ? "linear-gradient(135deg,rgba(74,222,128,0.08),rgba(74,222,128,0.03))"
                    : down ? "linear-gradient(135deg,rgba(248,113,113,0.08),rgba(248,113,113,0.03))"
                    :        "rgba(255,255,255,0.02)",
          border:`1px solid ${gc}30`,
          boxShadow:`0 0 8px ${gc}18, inset 0 0 12px ${gc}08`,
          position:"relative", overflow:"hidden", flexShrink:0,
          cursor:"pointer",
          transition:"box-shadow 0.15s, border-color 0.15s",
        }}
        onMouseEnter={e=>{ e.currentTarget.style.boxShadow=`0 0 14px ${gc}35, inset 0 0 12px ${gc}12`; e.currentTarget.style.borderColor=`${gc}60`; }}
        onMouseLeave={e=>{ e.currentTarget.style.boxShadow=`0 0 8px ${gc}18, inset 0 0 12px ${gc}08`; e.currentTarget.style.borderColor=`${gc}30`; }}>
        <div style={{position:"absolute",inset:0,backgroundImage:`repeating-linear-gradient(0deg,transparent,transparent 3px,${gc}05 3px,${gc}05 4px)`,pointerEvents:"none",borderRadius:10}}/>
        <div style={{display:"flex",alignItems:"center",gap:5,marginBottom:4}}>
          <span style={{fontSize:13,flexShrink:0}}>{entry.skin.emoji}</span>
          <span style={{fontSize:10,fontWeight:700,color:"#aaa",flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{skinLabel(entry.skin)}</span>
          <span style={{fontSize:13,fontWeight:900,color:gc,flexShrink:0,textShadow:`0 0 8px ${gc}`}}>{up?"↑":down?"↓":"–"}</span>
        </div>
        <div style={{fontSize:14,fontWeight:800,color:gc,fontVariantNumeric:"tabular-nums",textShadow:`0 0 10px ${gc}88`,letterSpacing:"0.02em",marginBottom:3}}>{fmt(entry.value)}</div>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:4}}>
          <span style={{fontSize:9,color:"#444",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{entry.trader}</span>
          {bracket
            ? <span style={{fontSize:8,color:bracket.color,background:bracket.color+"18",border:`1px solid ${bracket.color}30`,borderRadius:99,padding:"1px 5px",fontWeight:700,flexShrink:0}}>{bracket.label}</span>
            : <span style={{fontSize:8,color:"#2a2a2a",flexShrink:0}}>just now</span>}
        </div>
      </div>
    );
  };

  return (
    <div style={{width:200,flexShrink:0,position:"sticky",top:88,height:"calc(100vh - 120px)",display:"flex",flexDirection:"column",background:"#0e0e0e",border:"1px solid #1a1a1a",borderRadius:16,overflow:"hidden"}}>
      {/* Header */}
      <div style={{padding:"10px 12px",borderBottom:"1px solid #1a1a1a",flexShrink:0,display:"flex",alignItems:"center",gap:6}}>
        <div style={{width:6,height:6,borderRadius:"50%",background:"#4ade80",boxShadow:"0 0 6px #4ade80",animation:"pulse-dot 2s ease-in-out infinite"}}/>
        <span style={{fontSize:10,fontWeight:800,color:"#444",textTransform:"uppercase",letterSpacing:"0.07em"}}>Live Feed</span>
        <span style={{marginLeft:"auto",fontSize:9,color:"#2a2a2a"}}>{feed.length} entries</span>
      </div>

      {/* Cards — outer clips, inner shifts down during push then snaps */}
      <div style={{flex:1,overflow:"hidden",position:"relative"}}>
        <div
          ref={scrollRef}
          id="live-feed-scroll"
          style={{
            position:"absolute", inset:0,
            overflowY:"auto", overflowX:"hidden",
            scrollbarWidth:"none", msOverflowStyle:"none",
            padding:"8px 8px 48px",
            transform: pushing ? `translateY(${CARD_H}px)` : "translateY(0px)",
            transition: pushing ? `transform 0.30s cubic-bezier(0.2,0,0.2,1)` : "none",
          }}>
          {feed.length === 0
            ? <div style={{padding:"32px 8px",textAlign:"center",color:"#333",fontSize:11}}>Waiting for submissions…</div>
            : feed.map(e => renderCard(e))
          }
        </div>
        {/* Bottom fade */}
        <div style={{position:"absolute",bottom:0,left:0,right:0,height:48,background:"linear-gradient(to top,#0e0e0e,transparent)",pointerEvents:"none"}}/>
      </div>
    </div>
  );
}

function LiveChat({ currentUser, profiles, messages, setMessages }) {
  const [input, setInput]           = useState("");
  const [showGif, setShowGif]       = useState(false);
  const [gifQ, setGifQ]             = useState("");
  const [gifResults, setGifResults] = useState([]);
  const [gifLoading, setGifLoading] = useState(false);
  const [showReactFor, setShowReactFor] = useState(null);
  const [hoveredUser, setHoveredUser]   = useState(null);
  const bottomRef  = useRef(null);
  const inputRef   = useRef(null);
  const hoverTimer = useRef(null);

  // Auto-scroll to bottom on new messages
  useEffect(() => {
    bottomRef.current?.scrollIntoView({ behavior:"smooth" });
  }, [messages]);

  // GIF search
  useEffect(() => {
    if (!showGif) return;
    const tid = setTimeout(async () => {
      setGifLoading(true);
      try {
        const q = gifQ.trim() || "trending";
        const res = await fetch(`https://tenor.googleapis.com/v2/search?q=${encodeURIComponent(q)}&key=AIzaSyC7P2aNzS4MCsHxuXq_tJUzRCuaAflXBpQ&limit=12&media_filter=gif`);
        const data = await res.json();
        setGifResults(data.results || []);
      } catch { setGifResults([]); }
      setGifLoading(false);
    }, 400);
    return () => clearTimeout(tid);
  }, [gifQ, showGif]);

  const nowTime = () => new Date().toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit"});

  const send = async () => {
    const text = input.trim();
    if (!text || !currentUser) return;
    const msg = { id:`cm${Date.now()}`, user:currentUser.username, text, time:nowTime(), reactions:{} };
    setMessages(prev => [...prev, msg]);
    setInput("");
    const userId = (await supabase.auth.getUser()).data.user?.id;
    if (userId) await supabase.from("chat_messages").insert({ user_id:userId, username:currentUser.username, text });
  };

  const sendGif = (gif) => {
    if (!currentUser) return;
    const url = gif.media_formats?.gif?.url || gif.media_formats?.mediumgif?.url;
    const msg = { id:`cm${Date.now()}`, user:currentUser.username, gif:url, time:nowTime(), reactions:{} };
    setMessages(prev => [...prev, msg]);
    setShowGif(false); setGifQ("");
  };

  const toggleReact = (msgId, emoji) => {
    if (!currentUser) return;
    setMessages(prev => prev.map(m => {
      if (m.id !== msgId) return m;
      const users = m.reactions[emoji] || [];
      const has = users.includes(currentUser.username);
      return { ...m, reactions: { ...m.reactions, [emoji]: has ? users.filter(u=>u!==currentUser.username) : [...users, currentUser.username] }};
    }));
    setShowReactFor(null);
  };

  const roleColor  = r => r==="admin"?"#f87171":r==="trader"?"#f97316":"#9ca3af";
  const roleIcon   = r => r==="admin"?"🛡️":r==="trader"?"🔑":null;
  const roleLabel  = r => r==="admin"?"Admin":r==="trader"?"Trusted Trader":"Member";

  const showUserCard = (username, e) => {
    clearTimeout(hoverTimer.current);
    const rect = e.currentTarget.getBoundingClientRect();
    hoverTimer.current = setTimeout(() => {
      setHoveredUser({ username, top: rect.bottom + 6, left: rect.left });
    }, 280);
  };
  const hideUserCard = () => {
    clearTimeout(hoverTimer.current);
    hoverTimer.current = setTimeout(() => setHoveredUser(null), 150);
  };
  const keepCard = () => clearTimeout(hoverTimer.current);

  const charsLeft = CHAR_LIMIT - input.length;
  const nearLimit = charsLeft <= 40;

  const AVATAR_COLORS_C = [["#f97316","#c2410c"],["#818cf8","#4f46e5"],["#4ade80","#15803d"],["#f472b6","#be185d"],["#60a5fa","#2563eb"],["#fbbf24","#b45309"]];

  const ProfileHoverCard = () => {
    if (!hoveredUser) return null;
    const p = profiles[hoveredUser.username];
    if (!p) return null;
    const role = p.role ?? "community";
    const rc = roleColor(role);
    const ri = roleIcon(role);
    const [g1, g2] = AVATAR_COLORS_C[p.avatarColor ?? 0] ?? AVATAR_COLORS_C[0];
    const cardW = 224;
    const left  = Math.min(hoveredUser.left, (typeof window!=="undefined"?window.innerWidth:800) - cardW - 16);
    return (
      <div onMouseEnter={keepCard} onMouseLeave={hideUserCard}
        style={{position:"fixed",top:hoveredUser.top,left,zIndex:9999,width:cardW,
          background:"#161616",border:"1px solid #2a2a2a",borderRadius:14,
          boxShadow:"0 8px 32px rgba(0,0,0,0.7)",padding:"14px",pointerEvents:"auto"}}>
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}>
          <div style={{width:44,height:44,borderRadius:12,background:`linear-gradient(135deg,${g1},${g2})`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,flexShrink:0}}>
            {p.emoji||"👤"}
          </div>
          <div style={{minWidth:0,flex:1}}>
            <div style={{fontSize:13,fontWeight:800,color:"#fff",marginBottom:3,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{hoveredUser.username}</div>
            <div style={{display:"flex",alignItems:"center",gap:5,flexWrap:"wrap"}}>
              {ri&&<span style={{fontSize:12,lineHeight:1}}>{ri}</span>}
              <span style={{fontSize:10,fontWeight:700,color:rc,background:rc+"1a",border:`1px solid ${rc}35`,borderRadius:99,padding:"1px 8px",whiteSpace:"nowrap"}}>{roleLabel(role)}</span>
            </div>
          </div>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,marginBottom:8}}>
          {(() => {
            const repC = p.reputation>=90?"#4ade80":p.reputation>=60?"#fbbf24":"#f87171";
            return [
              { label:"Reputation", val:p.reputation??"—", color:repC },
              { label:"Member for",  val:`${p.joinedDaysAgo}d`, color:"#ccc" },
            ].map(s=>(
              <div key={s.label} style={{background:"#1a1a1a",borderRadius:8,padding:"6px 10px"}}>
                <div style={{fontSize:9,color:"#444",marginBottom:2,textTransform:"uppercase",letterSpacing:"0.05em"}}>{s.label}</div>
                <div style={{fontSize:12,fontWeight:700,color:s.color}}>{s.val}</div>
              </div>
            ));
          })()}
        </div>
        {p.bio&&<div style={{fontSize:11,color:"#555",lineHeight:1.5,borderTop:"1px solid #1e1e1e",paddingTop:8,overflow:"hidden",display:"-webkit-box",WebkitLineClamp:2,WebkitBoxOrient:"vertical"}}>{p.bio}</div>}
        {p.badge&&<div style={{marginTop:8,display:"inline-flex",alignItems:"center",gap:5,background:"rgba(249,115,22,0.1)",border:"1px solid rgba(249,115,22,0.25)",borderRadius:99,padding:"3px 10px"}}>
          <span style={{fontSize:10}}>🏅</span>
          <span style={{fontSize:10,fontWeight:700,color:"#f97316"}}>{p.badge}</span>
        </div>}
      </div>
    );
  };

  return (
    <>
    <ProfileHoverCard/>
    <div style={{width:360,flexShrink:0,display:"flex",flexDirection:"column",height:"calc(100vh - 120px)",position:"sticky",top:88,background:"#111",border:"1px solid #1e1e1e",borderRadius:16,overflow:"hidden"}}>
      {/* Header */}
      <div style={{padding:"12px 14px",borderBottom:"1px solid #1a1a1a",display:"flex",alignItems:"center",gap:8,flexShrink:0}}>
        <div style={{width:8,height:8,borderRadius:"50%",background:"#4ade80",boxShadow:"0 0 6px #4ade80aa"}}/>
        <span style={{fontFamily:"Syne,sans-serif",fontSize:13,fontWeight:800,color:"#fff"}}>Live Chat</span>
        <span style={{marginLeft:"auto",fontSize:10,color:"#444"}}>{messages.length} msgs</span>
      </div>

      {/* Messages */}
      <div style={{flex:1,overflowY:"auto",padding:"10px 10px 4px",display:"flex",flexDirection:"column",gap:1,scrollbarWidth:"thin",scrollbarColor:"#222 transparent"}}>
        {messages.map(m => {
          const prof = profiles[m.user];
          const role = prof?.role ?? "community";
          const icon = roleIcon(role);
          const nc   = roleColor(role);
          const reactEntries = Object.entries(m.reactions).filter(([,users])=>users.length>0);
          const isMe = currentUser?.username === m.user;

          return (
            <div key={m.id}
              style={{display:"flex",flexDirection:"column",alignItems:isMe?"flex-end":"flex-start",paddingBottom:6}}
              onMouseEnter={e=>{ const btn=e.currentTarget.querySelector(".react-btn"); if(btn) btn.style.opacity="1"; }}
              onMouseLeave={e=>{ const btn=e.currentTarget.querySelector(".react-btn"); if(btn) btn.style.opacity="0"; setShowReactFor(null); }}>

              {/* Name + timestamp row */}
              <div style={{display:"flex",alignItems:"center",gap:4,marginBottom:3,flexDirection:isMe?"row-reverse":"row"}}>
                <span onMouseEnter={e=>showUserCard(m.user,e)} onMouseLeave={hideUserCard} style={{cursor:"pointer",flexShrink:0,lineHeight:0}}>
                  <Avatar profile={prof} size={20} onClick={()=>{}}/>

                {icon&&<span style={{fontSize:11,lineHeight:1}}>{icon}</span>}
                <span onMouseEnter={e=>showUserCard(m.user,e)} onMouseLeave={hideUserCard}

                    </div>

                </div>

              {/* Reactions */}
              {reactEntries.length>0&&(
                <div style={{display:"flex",gap:3,marginTop:3,flexWrap:"wrap",justifyContent:isMe?"flex-end":"flex-start"}}>
                  {reactEntries.map(([emoji,users])=>{
                    const mine = users.includes(currentUser?.username);
                    return (
                      <button key={emoji} onClick={()=>toggleReact(m.id,emoji)}
                        style={{background:mine?"rgba(249,115,22,0.15)":"#1a1a1a",border:`1px solid ${mine?"rgba(249,115,22,0.3)":"#252525"}`,borderRadius:99,cursor:"pointer",fontSize:11,padding:"2px 7px",display:"flex",alignItems:"center",gap:3,transition:"all 0.1s"}}>
                        {emoji}<span style={{fontSize:10,fontWeight:700,color:mine?"#f97316":"#555"}}>{users.length}</span>
                      </button>
                    );
                  })}
                </div>
              )}
            </div>
          );
        })}
        <div ref={bottomRef}/>
      </div>

      {/* GIF picker */}
      {showGif&&(
        <div style={{borderTop:"1px solid #1a1a1a",padding:"8px",flexShrink:0,maxHeight:200,display:"flex",flexDirection:"column",gap:6}}>
          <input value={gifQ} onChange={e=>setGifQ(e.target.value)} placeholder="Search GIFs…"
            style={{background:"#0e0e0e",border:"1px solid #252525",borderRadius:8,color:"#e0e0e0",fontFamily:"inherit",fontSize:12,padding:"6px 10px",outline:"none",width:"100%"}}/>
          <div style={{overflowY:"auto",display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:4}}>
            {gifLoading
              ? <div style={{gridColumn:"1/-1",textAlign:"center",color:"#444",fontSize:11,padding:"12px 0"}}>Loading…</div>
              : gifResults.map(g=>{
                  const thumb = g.media_formats?.tinygif?.url || g.media_formats?.gif?.url;
                  return <img key={g.id} src={thumb} alt="" onClick={()=>sendGif(g)} style={{width:"100%",aspectRatio:"1",objectFit:"cover",borderRadius:6,cursor:"pointer",border:"1px solid #252525"}}/>;
                })
            }
          </div>
        </div>
      )}

      {/* Input bar */}
      <div style={{padding:"8px 10px",borderTop:"1px solid #1a1a1a",flexShrink:0}}>
        {!currentUser
          ? <div style={{textAlign:"center",fontSize:11,color:"#444",padding:"8px 0"}}>Log in to chat</div>
          : (
            <>
              <div style={{display:"flex",gap:6,alignItems:"flex-end"}}>
                <textarea ref={inputRef} value={input}
                  onChange={e=>setInput(e.target.value.slice(0,CHAR_LIMIT))}
                  onKeyDown={e=>{ if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();send();} }}
                  placeholder="Say something…"
                  rows={1}
                  style={{flex:1,background:"#0e0e0e",border:"1px solid #252525",borderRadius:10,color:"#e0e0e0",fontFamily:"inherit",fontSize:12,padding:"7px 10px",outline:"none",resize:"none",lineHeight:1.4,maxHeight:72,overflowY:"auto"}}/>
                <div style={{display:"flex",gap:4,flexShrink:0}}>
                  <button onClick={()=>{setShowGif(v=>!v);}} title="GIF"
                    style={{background:showGif?"rgba(249,115,22,0.15)":"#1a1a1a",border:`1px solid ${showGif?"rgba(249,115,22,0.4)":"#252525"}`,borderRadius:8,color:showGif?"#f97316":"#555",cursor:"pointer",fontSize:11,fontWeight:700,padding:"6px 7px",transition:"all 0.15s"}}>GIF</button>
                  <button onClick={send} disabled={!input.trim()}
                    style={{background:input.trim()?"linear-gradient(135deg,#f97316,#c2410c)":"#1a1a1a",border:"none",borderRadius:8,color:input.trim()?"#000":"#333",cursor:input.trim()?"pointer":"default",fontSize:13,fontWeight:800,padding:"6px 10px",transition:"all 0.15s"}}>↑</button>
                </div>
              </div>
              {nearLimit&&<div style={{fontSize:9,color:charsLeft<=10?"#f87171":"#fbbf24",marginTop:4,textAlign:"right"}}>{charsLeft} left</div>}
            </>
          )
        }
      </div>
    </div>
    </>
  );
}

function SettingsRow({ label, desc, children }) {
  return (
    <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",gap:24,padding:"14px 0",borderBottom:"1px solid #1a1a1a"}}>
      <div style={{flex:1,minWidth:0}}>
        <div style={{fontSize:13,fontWeight:600,color:"#e0e0e0",marginBottom:desc?3:0}}>{label}</div>
        {desc && <div style={{fontSize:12,color:"#555",lineHeight:1.5}}>{desc}</div>}
      </div>
      <div style={{flexShrink:0,display:"flex",alignItems:"center"}}>{children}</div>
    </div>
  );
}

function SettingsToggle({ value, onChange }) {
  return (
    <div onClick={()=>onChange(!value)}
      style={{width:40,height:22,borderRadius:11,background:value?"#f97316":"#252525",position:"relative",cursor:"pointer",transition:"background 0.2s",flexShrink:0}}>
      <div style={{position:"absolute",top:3,left:value?20:3,width:16,height:16,borderRadius:"50%",background:"#fff",transition:"left 0.2s",boxShadow:"0 1px 3px rgba(0,0,0,0.4)"}}/>
    </div>
  );
}

function SettingsInput({ value, onChange, placeholder, maxLength }) {
  return (
    <input value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder} maxLength={maxLength}
      style={{background:"#0e0e0e",border:"1px solid #252525",borderRadius:8,color:"#e0e0e0",fontFamily:"inherit",fontSize:13,fontWeight:500,padding:"7px 12px",outline:"none",width:200,textAlign:"right"}}/>
  );
}

function SettingsSection({ title, children }) {
  return (
    <div style={{background:"#111",border:"1px solid #1e1e1e",borderRadius:14,padding:"0 20px",marginBottom:16}}>
      <div style={{padding:"14px 0 10px",borderBottom:"1px solid #1a1a1a",fontSize:11,fontWeight:700,color:"#f97316",textTransform:"uppercase",letterSpacing:"0.07em"}}>{title}</div>
      {children}
      <div style={{height:4}}/>
    </div>
  );
}

function TradeSide({ label, allSkins, side, onChange }) {
  const [query,      setQuery]      = useState("");
  const [open,       setOpen]       = useState(false);
  const [items,      setItems]      = useState([]);
  const [coins,      setCoins]      = useState("");
  const inputRef = useRef(null);
  const dropRef  = useRef(null);

  const filtered = query.trim().length > 0
    ? allSkins.filter(s => s.name.toLowerCase().includes(query.toLowerCase()) || s.weapon.toLowerCase().includes(query.toLowerCase()))
    : allSkins;

  // Close dropdown on outside click
  useEffect(() => {
    if (!open) return;
    const h = e => { if (!dropRef.current?.contains(e.target)) setOpen(false); };
    document.addEventListener("mousedown", h);
    return () => document.removeEventListener("mousedown", h);
  }, [open]);

  const addSkin = (skin) => {
    const bracket = SERIAL_BRACKETS[SERIAL_BRACKETS.length - 1]; // default s251+
    const serial  = 500;
    const bv      = getBracketValue(bracket.id, skin.val?.avg ?? 0, skin.bSubs);
    const entry   = { id: `${skin.id}_${Date.now()}`, skin, serial, bracketId: bracket.id, value: bv.value, verified: bv.verified };
    const next    = [...items, entry];
    setItems(next);
    onChange(next, Number(coins) || 0);
    setQuery(""); setOpen(false);
  };

  const updateSerial = (id, serial) => {
    const v = Math.max(1, parseInt(serial) || 1);
    const next = items.map(it => {
      if (it.id !== id) return it;
      const bracket = getBracket(v);
      const bv      = getBracketValue(bracket.id, it.skin.val?.avg ?? 0, it.skin.bSubs);
      return { ...it, serial: v, bracketId: bracket.id, value: bv.value, verified: bv.verified };
    });
    setItems(next); onChange(next, Number(coins) || 0);
  };

  const removeItem = (id) => {
    const next = items.filter(it => it.id !== id);
    setItems(next); onChange(next, Number(coins) || 0);
  };

  const coinsNum  = Math.max(0, parseInt(coins) || 0);
  const totalValue = items.reduce((a, it) => a + (it.value || 0), 0) + coinsNum;
  const rc = { Legendary:"#f97316", Epic:"#a855f7", Rare:"#60a5fa", Uncommon:"#9ca3af" };

  return (
    <div style={{flex:1,minWidth:0,background:"#111",border:"1px solid #1e1e1e",borderRadius:18,padding:"20px",display:"flex",flexDirection:"column",gap:14}}>
      {/* Side label */}
      <div style={{fontFamily:"Syne,sans-serif",fontWeight:800,fontSize:14,color: side==="you" ? "#f97316" : "#60a5fa",textTransform:"uppercase",letterSpacing:"0.06em"}}>{label}</div>

      {/* Search dropdown */}
      <div style={{position:"relative"}} ref={dropRef}>
        <div style={{display:"flex",alignItems:"center",gap:8,background:"#0e0e0e",border:"1px solid #252525",borderRadius:10,padding:"8px 12px"}}>
          <span style={{fontSize:14,color:"#444"}}>🔍</span>
          <input ref={inputRef} value={query} onChange={e=>{setQuery(e.target.value);setOpen(true);}}
            onFocus={()=>setOpen(true)} placeholder="Search skins to add…"
            style={{flex:1,background:"none",border:"none",outline:"none",color:"#e0e0e0",fontFamily:"inherit",fontSize:13,fontWeight:500}}/>
        </div>
        {open && (
          <div style={{position:"absolute",top:"calc(100% + 6px)",left:0,right:0,background:"#141414",border:"1px solid #252525",borderRadius:12,zIndex:100,maxHeight:220,overflowY:"auto",boxShadow:"0 12px 32px rgba(0,0,0,0.6)"}}>
            {filtered.length === 0
              ? <div style={{padding:"16px",fontSize:12,color:"#444",textAlign:"center"}}>No skins found</div>
              : filtered.map(skin => (
                <div key={skin.id} onClick={()=>addSkin(skin)}
                  style={{display:"flex",alignItems:"center",gap:10,padding:"9px 14px",cursor:"pointer",borderBottom:"1px solid #1a1a1a",transition:"background 0.1s"}}
                  onMouseEnter={e=>e.currentTarget.style.background="#1a1a1a"}
                  onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                  <span style={{fontSize:18,flexShrink:0}}>{skin.emoji}</span>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:13,fontWeight:600,color:"#e0e0e0"}}>{skinLabel(skin)}</div>
                    <div style={{fontSize:11,color:"#555"}}>{skinSubLabel(skin)} · <span style={{color:rc[skin.rarity]}}>{skin.rarity}</span></div>
                  </div>
                  {skin.val?.avg > 0 && <div style={{fontSize:12,fontWeight:600,color:"#666",flexShrink:0}}>{fmt(skin.val.avg)}</div>}
                </div>
              ))
            }
          </div>
        )}
      </div>

      {/* Added items */}
      <div style={{display:"flex",flexDirection:"column",gap:8,minHeight:60}}>
        {items.length === 0 && (
          <div style={{padding:"24px 0",textAlign:"center",color:"#333",fontSize:12}}>No skins added yet</div>
        )}
        {items.map(it => {
          const bracket = SERIAL_BRACKETS.find(b=>b.id===it.bracketId) ?? SERIAL_BRACKETS[SERIAL_BRACKETS.length-1];
          return (
            <div key={it.id} style={{background:"#0e0e0e",border:"1px solid #1e1e1e",borderRadius:12,padding:"12px 14px"}}>
              {/* Skin header */}
              <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
                <span style={{fontSize:20}}>{it.skin.emoji}</span>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:13,fontWeight:700,color:"#e0e0e0",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{skinLabel(it.skin)}</div>

                <div style={{flex:1,background:bracket.color+"12",border:`1px solid ${bracket.color}25`,borderRadius:8,padding:"3px 8px",fontSize:11,fontWeight:700,color:bracket.color,textAlign:"center",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{bracket.label}</div>

                <div style={{fontSize:16,fontWeight:800,color:"#e0e0e0",fontVariantNumeric:"tabular-nums"}}>{it.value > 0 ? fmt(it.value) : <span style={{color:"#333",fontSize:13}}>No data</span>}</div>

      {/* Coins input */}
      <div style={{borderTop:"1px solid #1e1e1e",paddingTop:12}}>
        <div style={{fontSize:11,color:"#555",fontWeight:600,marginBottom:7}}>🪙 Coins on top</div>
        <div style={{display:"flex",alignItems:"center",gap:8,background:"#0e0e0e",border:"1px solid #252525",borderRadius:10,padding:"7px 12px"}}>
          <span style={{fontSize:13,color:"#444",flexShrink:0}}>🪙</span>
          <input type="number" min="0" value={coins} placeholder="0"
            onChange={e=>{
              setCoins(e.target.value);
              onChange(items, Math.max(0, parseInt(e.target.value)||0));
            }}
            style={{flex:1,background:"none",border:"none",outline:"none",color:"#e0e0e0",fontFamily:"inherit",fontSize:13,fontWeight:600,fontVariantNumeric:"tabular-nums"}}/>
          {coinsNum > 0 && <span style={{fontSize:11,color:"#555",flexShrink:0}}>{fmt(coinsNum)}</span>}
        </div>
      </div>

      {/* Side total */}
      <div style={{borderTop:"1px solid #1e1e1e",paddingTop:12,display:"flex",flexDirection:"column",gap:4}}>
        {coinsNum > 0 && items.length > 0 && (
          <div style={{display:"flex",justifyContent:"space-between",fontSize:11,color:"#444"}}>
            <span>Skins</span>
            <span style={{fontVariantNumeric:"tabular-nums"}}>{fmt(items.reduce((a,it)=>a+(it.value||0),0))}</span>
          </div>
        )}
        {coinsNum > 0 && (
          <div style={{display:"flex",justifyContent:"space-between",fontSize:11,color:"#444"}}>
            <span>Coins</span>
            <span style={{fontVariantNumeric:"tabular-nums"}}>{fmt(coinsNum)}</span>
          </div>
        )}
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop: coinsNum > 0 ? 4 : 0}}>
          <div style={{fontSize:12,color:"#555",fontWeight:600}}>Total{items.length > 0 ? ` (${items.length} skin${items.length!==1?"s":""})` : ""}</div>
          <div style={{fontSize:20,fontWeight:800,color: side==="you" ? "#f97316" : "#60a5fa",fontVariantNumeric:"tabular-nums"}}>{totalValue > 0 ? fmt(totalValue) : <span style={{color:"#333",fontSize:13}}>—</span>}</div>
        </div>
      </div>
    </div>
  );
}

function TradeCalculator({ allSkins, onGoSkin }) {
  const [youItems,  setYouItems]  = useState([]);
  const [theyItems, setTheyItems] = useState([]);
  const [youCoins,  setYouCoins]  = useState(0);
  const [theyCoins, setTheyCoins] = useState(0);
  const [showGuide, setShowGuide] = useState(true);

  const youTotal  = youItems.reduce((a,  it) => a + (it.value  || 0), 0) + youCoins;
  const theyTotal = theyItems.reduce((a, it) => a + (it.value  || 0), 0) + theyCoins;
  const diff      = theyTotal - youTotal;
  const bothHave  = youTotal > 0 && theyTotal > 0;
  const ratio     = bothHave ? Math.min(youTotal, theyTotal) / Math.max(youTotal, theyTotal) : 0;
  const fairPct   = Math.round(ratio * 100);

  // Verdict
  const verdict = () => {
    if (!bothHave) return null;
    const absDiff = Math.abs(diff);
    const pct = absDiff / Math.max(youTotal, theyTotal) * 100;
    if (pct <= 5)  return { label:"Even Trade",   color:"#4ade80", desc:"Both sides are within 5% — this is a fair deal.", icon:"✅" };
    if (pct <= 15) return { label:"Slight Edge",  color:"#fbbf24", desc:`${diff > 0 ? "You're" : "They're"} getting slightly more value (${pct.toFixed(0)}% difference).`, icon:"⚠️" };
    if (pct <= 35) return { label:"Uneven Trade", color:"#f97316", desc:`${diff > 0 ? "You're" : "They're"} getting significantly more value (${pct.toFixed(0)}% difference).`, icon:"❌" };
    return             { label:"Lopsided Trade", color:"#f87171", desc:`This trade heavily favours ${diff > 0 ? "you" : "them"} (${pct.toFixed(0)}% difference). Reconsider.`, icon:"🚨" };
  };
  const v = verdict();

  const steps = [
    { icon:"🔍", title:"Search for skins", desc:"Use the search box on each side to find and add skins to the trade. You can add multiple skins per side." },
    { icon:"🔢", title:"Set the serial number", desc:"Each skin has a serial number that affects its value. Type the exact serial to get the right bracket price automatically." },
    { icon:"🪙", title:"Add coins on top", desc:"If one side includes coins, enter the amount in the Coins on top field. It's factored into the total value." },
    { icon:"⚖️", title:"Read the verdict", desc:"The fairness bar and verdict panel update live. The marker slides toward whoever's getting more value — centre means even." },
  ];

  return (
    <div style={{maxWidth:1100,margin:"0 auto"}}>

      {/* Guide modal */}
      {showGuide && (
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.8)",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center",backdropFilter:"blur(4px)"}}>
          <div style={{background:"#141414",border:"1px solid #252525",borderRadius:20,padding:"32px",width:480,maxWidth:"calc(100vw - 48px)",position:"relative"}}>
            {/* Header */}
            <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:24}}>
              <div style={{width:40,height:40,background:"linear-gradient(135deg,#f97316,#c2410c)",borderRadius:12,display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,flexShrink:0}}>⚖️</div>
              <div>
                <div style={{fontFamily:"Syne,sans-serif",fontWeight:800,fontSize:17,color:"#fff"}}>How the Calculator Works</div>
                <div style={{fontSize:12,color:"#555",marginTop:2}}>Takes about 30 seconds to learn</div>
              </div>
            </div>

            {/* Steps */}
            <div style={{display:"flex",flexDirection:"column",gap:16,marginBottom:28}}>
              {steps.map((s, i) => (
                <div key={i} style={{display:"flex",gap:14,alignItems:"flex-start"}}>
                  <div style={{width:36,height:36,background:"#1a1a1a",border:"1px solid #252525",borderRadius:10,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,flexShrink:0}}>{s.icon}</div>
                  <div>
                    <div style={{fontSize:13,fontWeight:700,color:"#e0e0e0",marginBottom:3}}>{s.title}</div>
                    <div style={{fontSize:12,color:"#666",lineHeight:1.6}}>{s.desc}</div>
                  </div>
                </div>
              ))}
            </div>

            {/* Price note */}
            <div style={{background:"#111",border:"1px solid #1e1e1e",borderRadius:10,padding:"10px 14px",marginBottom:24,fontSize:12,color:"#666",lineHeight:1.6}}>
              💡 Prices come from <span style={{color:"#4ade80",fontWeight:600}}>verified trader submissions</span> where available, or a <span style={{color:"#60a5fa",fontWeight:600}}>recommended estimate</span> based on the serial multiplier.
            </div>

            <button onClick={()=>setShowGuide(false)}
              style={{width:"100%",background:"linear-gradient(135deg,#f97316,#c2410c)",border:"none",borderRadius:12,color:"#000",cursor:"pointer",fontFamily:"inherit",fontSize:14,fontWeight:700,padding:"12px 0"}}>
              Got it — let's go
            </button>
          </div>
        </div>
      )}

      {/* Header */}
      <div style={{marginBottom:28,display:"flex",alignItems:"flex-start",justifyContent:"space-between",gap:12}}>
        <div>
          <div style={{fontFamily:"Syne,sans-serif",fontWeight:800,fontSize:24,color:"#fff",marginBottom:4}}>Trade Calculator</div>
          <div style={{fontSize:13,color:"#555"}}>Add skins to each side, set serial numbers, and see if the trade is fair.</div>
        </div>
        <button onClick={()=>setShowGuide(true)}
          style={{background:"none",border:"1px solid #252525",borderRadius:10,color:"#555",cursor:"pointer",fontFamily:"inherit",fontSize:12,fontWeight:600,padding:"7px 14px",flexShrink:0,transition:"all 0.15s"}}
          onMouseEnter={e=>{e.currentTarget.style.borderColor="#f97316";e.currentTarget.style.color="#f97316";}}
          onMouseLeave={e=>{e.currentTarget.style.borderColor="#252525";e.currentTarget.style.color="#555";}}>
          ? How it works
        </button>
      </div>

      {/* Two sides */}
      <div style={{display:"flex",gap:16,alignItems:"flex-start",marginBottom:20}}>
        <TradeSide label="You're offering" side="you"  allSkins={allSkins} onChange={(items, coins)=>{setYouItems(items);setYouCoins(coins);}}/>

        {/* VS divider */}
        <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:8,paddingTop:52,flexShrink:0}}>
          <div style={{width:36,height:36,borderRadius:"50%",background:"#1a1a1a",border:"1px solid #252525",display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:800,color:"#444"}}>VS</div>
          {bothHave && (
            <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:4}}>
              <div style={{width:1,height:40,background:"linear-gradient(to bottom,#252525,transparent)"}}/>
              <div style={{fontSize:10,color:"#333",fontWeight:600,textAlign:"center",lineHeight:1.4}}>
                {diff > 0 ? `+${fmt(Math.abs(diff))}` : diff < 0 ? `-${fmt(Math.abs(diff))}` : "Even"}
              </div>
            </div>
          )}
        </div>

        <TradeSide label="They're offering" side="they" allSkins={allSkins} onChange={(items, coins)=>{setTheyItems(items);setTheyCoins(coins);}}/>
      </div>

      {/* Verdict panel */}
      {bothHave && v && (
        <div style={{background:"#111",border:`1px solid ${v.color}30`,borderRadius:16,padding:"20px 24px"}}>
          <div style={{display:"flex",alignItems:"flex-start",gap:16,flexWrap:"wrap"}}>

            {/* Verdict */}
            <div style={{flex:1,minWidth:200}}>
              <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
                <span style={{fontSize:20}}>{v.icon}</span>
                <span style={{fontFamily:"Syne,sans-serif",fontWeight:800,fontSize:18,color:v.color}}>{v.label}</span>
              </div>
              <div style={{fontSize:13,color:"#888",lineHeight:1.6}}>{v.desc}</div>
            </div>

            {/* Fairness meter */}
            <div style={{minWidth:220,flex:1}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                <span style={{fontSize:11,color:"#f97316",fontWeight:600}}>You</span>
                <span style={{fontSize:11,fontWeight:700,color:v.color}}>{fairPct}% fair</span>
                <span style={{fontSize:11,color:"#60a5fa",fontWeight:600}}>Them</span>
              </div>
              {/* Track */}
              <div style={{position:"relative",height:10,borderRadius:99,background:"linear-gradient(90deg,#f87171 0%,#4ade80 50%,#f87171 100%)",boxShadow:"inset 0 1px 3px rgba(0,0,0,0.4)"}}>
                {/* Marker — 50% = even, slides left if they get more, right if you get more */}
                {(() => {
                  // markerPct: 0=far left (they win big), 50=even, 100=far right (you win big)
                  const max = Math.max(youTotal, theyTotal);
                  const markerPct = max > 0 ? 50 + ((youTotal - theyTotal) / max) * 50 : 50;
                  return (
                    <div style={{
                      position:"absolute", top:"50%",
                      left:`${markerPct}%`,
                      transform:"translate(-50%,-50%)",
                      width:16, height:16, borderRadius:"50%",
                      background:"#fff",
                      border:"2px solid #0e0e0e",
                      boxShadow:"0 0 6px rgba(0,0,0,0.6)",
                      transition:"left 0.4s cubic-bezier(0.2,0,0.2,1)",
                      zIndex:1,
                    }}/>
                  );
                })()}
                {/* Centre tick */}
                <div style={{position:"absolute",top:"50%",left:"50%",transform:"translate(-50%,-50%)",width:2,height:14,background:"rgba(0,0,0,0.3)",borderRadius:1}}/>
              </div>
              <div style={{display:"flex",justifyContent:"center",marginTop:5}}>
                <span style={{fontSize:10,color:"#333"}}>◀ favours them &nbsp;|&nbsp; favours you ▶</span>
              </div>
            </div>

            {/* Value breakdown */}
            <div style={{display:"flex",gap:20,flexShrink:0}}>
              <div style={{textAlign:"center"}}>
                <div style={{fontSize:11,color:"#555",fontWeight:600,marginBottom:4}}>You offer</div>
                <div style={{fontSize:18,fontWeight:800,color:"#f97316",fontVariantNumeric:"tabular-nums"}}>{fmt(youTotal)}</div>
              </div>
              <div style={{textAlign:"center"}}>
                <div style={{fontSize:11,color:"#555",fontWeight:600,marginBottom:4}}>They offer</div>
                <div style={{fontSize:18,fontWeight:800,color:"#60a5fa",fontVariantNumeric:"tabular-nums"}}>{fmt(theyTotal)}</div>
              </div>
              <div style={{textAlign:"center"}}>
                <div style={{fontSize:11,color:"#555",fontWeight:600,marginBottom:4}}>Difference</div>
                <div style={{fontSize:18,fontWeight:800,color:diff===0?"#4ade80":diff>0?"#4ade80":"#f87171",fontVariantNumeric:"tabular-nums"}}>{diff===0?"Even":diff>0?`+${fmt(diff)}`:`-${fmt(Math.abs(diff))}`}</div>
              </div>
            </div>
          </div>
        </div>
      )}

      {/* Empty state */}
      {!bothHave && (
        <div style={{background:"#111",border:"1px solid #1a1a1a",borderRadius:16,padding:"32px",textAlign:"center"}}>
          <div style={{fontSize:32,marginBottom:10}}>⚖️</div>
          <div style={{fontSize:14,color:"#444"}}>Add at least one skin to each side to see the trade verdict</div>
        </div>
      )}
    </div>
  );
}

  const navigate = useCallback((t) => {
    setTab(t); setActiveSkin(null); setViewingProfile(null); setActivePost(null); setNewPostOpen(false);
    window.scrollTo({ top:0, behavior:"smooth" });
  }, []);
  const [search,       setSearch]      = useState("");
  const [category,     setCategory]    = useState("All");
  const [weapon,       setWeapon]      = useState("All");
  const [rarity,       setRarity]      = useState("All");
  const [tier,         setTier]        = useState("All");
  const [sort,         setSort]        = useState("value-desc");
  const [viewMode,     setViewMode]    = useState("simple"); // "simple" | "advanced"
  const [submissions,  setSubmissions] = useState(INIT_SUBMISSIONS);
  const [bracketSubs,  setBracketSubs] = useState(INIT_BRACKET_SUBS);
  const [votes,        setVotes]       = useState(INIT_VOTES);
  const [userVotes,    setUserVotes]   = useState({});
  const [currentUser,  setCurrentUser] = useState(null);
  const [showAuth,        setShowAuth]        = useState(false);
  const [authRedirect,    setAuthRedirect]     = useState(null); // tab to go to after login
  const [showNotifications, setShowNotifications] = useState(false);
  const [showProfileCard,   setShowProfileCard]   = useState(false);
  const [dismissedAlerts,   setDismissedAlerts]   = useState(new Set());
  const [notifications,     setNotifications]     = useState([]);
  const [notifTab,          setNotifTab]          = useState("notifications"); // "notifications" | "alerts"
  const [frozen,       setFrozen]      = useState(INIT_FROZEN);
  const [disputes,     setDisputes]    = useState(INIT_DISPUTES);
  const [communityVotes, setCommunityVotes] = useState({});
  const [traderRequests, setTraderRequests] = useState([]);
  const [toasts,         setToasts]         = useState([]);
  const [announcement,   setAnnouncement]   = useState({ text:"", type:"info", active:false });
  const [scamReports,       setScamReports]       = useState([]);
  const [confirmedScammers, setConfirmedScammers] = useState([]);
  const [profiles,     setProfiles]    = useState(INIT_PROFILES);
  const [forumPosts,   setForumPosts]  = useState(FORUM_POSTS_DB);
  const [replies,      setReplies]     = useState(INIT_REPLIES);
  const [postReactions,setPostReactions] = useState({});
  const [replyReactions,setReplyReactions] = useState({});
  const [activePost,   setActivePost]  = useState(null);
  const [newPostOpen,  setNewPostOpen] = useState(false);
  const [userAlerts,   setUserAlerts]   = useState({});
  const [chatMessages, setChatMessages] = useState([]);

  const allSkins = useMemo(()=>buildSkins(submissions,votes,frozen,bracketSubs),[submissions,votes,frozen,bracketSubs]);

  // ── Load site mode from Supabase (first thing, before rendering) ──
  useEffect(() => {
    supabase.from("site_config").select("value").eq("key", "site_mode").single()
      .then(({ data }) => {
        if (data) setSiteMode(data.value);
        setSiteLoading(false);
      })
      .catch(() => setSiteLoading(false));

    // Real-time: if admin changes site mode, all open sessions update within seconds
    const channel = supabase.channel("site_config_realtime")
      .on("postgres_changes", { event:"UPDATE", schema:"public", table:"site_config", filter:"key=eq.site_mode" },
        payload => { setSiteMode(payload.new.value); })
      .subscribe();
    return () => supabase.removeChannel(channel);
  }, []);

  // ── Restore Supabase session on mount ──
  useEffect(() => {
    supabase.auth.getSession().then(({ data: { session } }) => {
      if (session) {
        supabase.from("profiles").select("*").eq("id", session.user.id).single()
          .then(({ data: profile }) => {
            if (profile) {
              const acc = normaliseProfile(profile);
              setProfiles(prev => ({ ...prev, [acc.username]: acc }));
              setCurrentUser(acc);
            }
          });
      }
    });
  }, []);

  // ── Load all profiles from Supabase ──
  useEffect(() => {
    supabase.from("profiles").select("*").then(({ data }) => {
      if (data) {
        const mapped = {};
        data.forEach(p => { const norm = normaliseProfile(p); mapped[norm.username] = norm; });
        setProfiles(prev => ({ ...prev, ...mapped }));
      }
    });
  }, []);

  // ── Load submissions from Supabase ──
  useEffect(() => {
    supabase.from("submissions").select("*").then(({ data }) => {
      if (!data) return;
      const grouped = {};
      data.forEach(s => {
        if (!grouped[s.skin_id]) grouped[s.skin_id] = [];
        grouped[s.skin_id].push({ traderId: s.trader_id, value: s.value, submittedAt: s.submitted_at, flagged: s.flagged, _id: s.id });
      });
      setSubmissions(grouped);
    });
    supabase.from("bracket_submissions").select("*").then(({ data }) => {
      if (!data) return;
      const grouped = {};
      data.forEach(s => {
        if (!grouped[s.skin_id]) grouped[s.skin_id] = {};
        if (!grouped[s.skin_id][s.bracket_id]) grouped[s.skin_id][s.bracket_id] = [];
        grouped[s.skin_id][s.bracket_id].push({ traderId: s.trader_id, value: s.value, submittedAt: s.submitted_at, flagged: s.flagged, _id: s.id });
      });
      setBracketSubs(grouped);
    });
  }, []);

  // ── Load forum posts from Supabase ──
  useEffect(() => {
    supabase.from("forum_posts").select("*").order("created_at", { ascending: false }).then(({ data }) => {
      if (data) {
        setForumPosts(data.map(p => ({
          id: p.id, user: p.username, title: p.title, body: p.body,
          tag: p.tag, pinned: p.pinned, views: p.views, replies: p.reply_count,
          richText: p.rich_text, poll: p.poll,
          time: timeAgo(p.created_at), _created: p.created_at,
        })));
      }
    });
  }, []);

  // ── Load scam data from Supabase ──
  useEffect(() => {
    supabase.from("scam_reports").select("*").then(({ data }) => {
      if (data) setScamReports(data.map(r => ({ id: r.id, accusedUsername: r.accused_username, robloxUsername: r.roblox_username, discordUsername: r.discord_username, description: r.description, photos: r.photo_urls||[], reportedBy: r.reported_by, time: timeAgo(r.created_at), status: r.status })));
    });
    supabase.from("confirmed_scammers").select("*").then(({ data }) => {
      if (data) setConfirmedScammers(data.map(s => ({ id: s.id, username: s.username, robloxUsername: s.roblox_username, discordUsername: s.discord_username, description: s.description, photos: s.photo_urls||[], reportedBy: s.reported_by, confirmedAt: new Date(s.confirmed_at).toLocaleDateString("en-GB",{day:"numeric",month:"short",year:"numeric"}) })));
    });
  }, []);

  // ── Real-time: new forum posts ──
  useEffect(() => {
    const channel = supabase.channel("forum_posts_realtime")
      .on("postgres_changes", { event:"INSERT", schema:"public", table:"forum_posts" }, payload => {
        const p = payload.new;
        setForumPosts(prev => [{
          id: p.id, user: p.username, title: p.title, body: p.body,
          tag: p.tag, pinned: p.pinned, views: p.views, replies: p.reply_count,
          richText: p.rich_text, poll: p.poll, time: "just now", _created: p.created_at,
        }, ...prev]);
      })

  const handleCommunityVote = useCallback((voteId, direction) => {
    if (!currentUser) return;
    const rep = profiles[currentUser.username]?.reputation ?? 0;
    if (rep < MIN_REP) return; // not enough rep
    setCommunityVotes(prev => {
      const vote = prev[voteId];
      if (!vote) return prev;
      // Remove any existing vote from this user first
      const keep   = vote.keep.filter(u => u !== currentUser.username);
      const reject = vote.reject.filter(u => u !== currentUser.username);
      if (direction === "keep")   keep.push(currentUser.username);
      if (direction === "reject") reject.push(currentUser.username);
      return { ...prev, [voteId]: { ...vote, keep, reject } };
    });
  }, [currentUser, profiles]);

  // Resolve expired community votes — runs on a timer, not on every communityVotes change
  useEffect(() => {
    const check = () => {
      const now = Date.now();
      setCommunityVotes(prev => {
        const expired = Object.values(prev).filter(v => !v.resolved && now >= v.expiresAt);
        if (expired.length === 0) return prev;
        const next = { ...prev };
        expired.forEach(vote => {
          const total = vote.keep.length + vote.reject.length;
          const keepWins = total >= MIN_VOTES && vote.keep.length > vote.reject.length;
          next[vote.id] = { ...vote, resolved: true, resolvedAt: now };
          // Update the submission's flagged state
          if (vote.source === "base") {
            setSubmissions(s => {
              const subs = [...(s[vote.skinId] || [])];
              if (subs[vote.subIdx]) subs[vote.subIdx] = { ...subs[vote.subIdx], flagged: !keepWins };
              return { ...s, [vote.skinId]: subs };
            });
          } else {
            setBracketSubs(s => {
              const skinB = { ...(s[vote.skinId] || {}) };
              const arr = [...(skinB[vote.bracketId] || [])];
              if (arr[vote.subIdx]) arr[vote.subIdx] = { ...arr[vote.subIdx], flagged: !keepWins };
              skinB[vote.bracketId] = arr;
              return { ...s, [vote.skinId]: skinB };
            });
          }
          if (!keepWins) {
            setProfiles(p => {
              const profile = p[vote.traderId];
              if (!profile) return p;
              return { ...p, [vote.traderId]: { ...profile, rejectedSubmissions: (profile.rejectedSubmissions||0)+1 } };
            });
          }
        });
        return next;
      });
    };
    // Check on mount and every 60 seconds
    check();
    const interval = setInterval(check, 60000);
    return () => clearInterval(interval);
  }, []); // empty deps — runs once, polling via interval

                  {totalBadgeCount > 0 && (
                    <span style={{position:"absolute",top:-4,right:-4,background:"#f87171",borderRadius:"50%",width:16,height:16,display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,fontWeight:700,color:"#000"}}>
                      {totalBadgeCount}
                    </span>
                  )}
                </button>
                {showNotifications && (
                  <div style={{position:"fixed",top:64,left:0,right:0,background:"#141414",border:"1px solid #252525",borderRadius:"0 0 16px 16px",zIndex:300,boxShadow:"0 16px 48px rgba(0,0,0,0.6)",overflow:"hidden",maxHeight:"70vh",overflowY:"auto"}}>
                    <NotifPanel notifications={notifications} triggeredAlerts={triggeredAlerts} notifTab={notifTab} setNotifTab={setNotifTab} markNotifsRead={markNotifsRead} dismissNotif={dismissNotif} allSkins={allSkins} onGoSkin={s=>{setActiveSkin(s);setShowNotifications(false);}} unreadNotifCount={unreadNotifCount}/>
                  </div>
                )}
              </div>
            )}
            <button onClick={()=>setMobileMenuOpen(v=>!v)}
              style={{background:"none",border:"1px solid #252525",borderRadius:10,color:"#888",cursor:"pointer",fontSize:20,width:38,height:38,display:"flex",alignItems:"center",justifyContent:"center"}}>
              {mobileMenuOpen ? "✕" : "☰"}
            </button>
          </div>
        )}
      </header>

      {/* Mobile slide-down menu */}
      {isMobile && mobileMenuOpen && (
        <div style={{position:"fixed",top:64,left:0,right:0,background:"#0e0e0e",borderBottom:"1px solid #1a1a1a",zIndex:39,padding:16,display:"flex",flexDirection:"column",gap:8}}>
          {[["home","🏠 Home"],["tracker","📊 Tracker"],["forum","💬 Forum"],["stats","📈 Stats"],["calculator","⚖️ Calculator"],["howto","❓ How It Works"],...(currentUser?.role==="admin"?[["admin","🛡️ Admin"]]:[])].map(([t,label])=>(
            <button key={t} onClick={()=>{navigate(t);setMobileMenuOpen(false);}}
              style={{background:tab===t?"#1a1a1a":"transparent",border:`1px solid ${tab===t?"#f9731640":"#1e1e1e"}`,borderRadius:12,color:tab===t?"#f97316":"#888",cursor:"pointer",fontFamily:"inherit",fontSize:14,fontWeight:600,padding:"12px 16px",textAlign:"left",transition:"all 0.1s"}}>
              {label}
            </button>
          ))}
          <div style={{height:1,background:"#1a1a1a",margin:"4px 0"}}/>
          {currentUser ? (
            <>
              <button onClick={()=>{handleViewProfile(currentUser.username);setMobileMenuOpen(false);}} style={{background:"transparent",border:"1px solid #1e1e1e",borderRadius:12,color:"#888",cursor:"pointer",fontFamily:"inherit",fontSize:14,fontWeight:600,padding:"12px 16px",textAlign:"left"}}>👤 My Profile</button>
              <button onClick={()=>{navigate("settings");setMobileMenuOpen(false);}} style={{background:"transparent",border:"1px solid #1e1e1e",borderRadius:12,color:"#888",cursor:"pointer",fontFamily:"inherit",fontSize:14,fontWeight:600,padding:"12px 16px",textAlign:"left"}}>⚙️ Settings</button>
              <button onClick={async()=>{await supabase.auth.signOut();setCurrentUser(null);setMobileMenuOpen(false);}} style={{background:"transparent",border:"1px solid #1e1e1e",borderRadius:12,color:"#555",cursor:"pointer",fontFamily:"inherit",fontSize:14,fontWeight:600,padding:"12px 16px",textAlign:"left"}}>🚪 Log Out</button>
            </>
          ) : (
            <button onClick={()=>{setShowAuth(true);setMobileMenuOpen(false);}} style={{background:"linear-gradient(135deg,#f97316,#c2410c)",border:"none",borderRadius:12,color:"#000",cursor:"pointer",fontFamily:"inherit",fontSize:14,fontWeight:700,padding:"12px 16px",textAlign:"left"}}>Log In / Register</button>
          )}
        </div>
      )}

      {/* LANDING — full width, no max-width container */}
      {/* Sitewide announcement banner */}
      {announcement.active && (
        <div style={{
          background: announcement.type==="warn"?"rgba(251,191,36,0.08)":announcement.type==="error"?"rgba(248,113,113,0.08)":"rgba(96,165,250,0.08)",
          borderBottom: `1px solid ${announcement.type==="warn"?"#fbbf2430":announcement.type==="error"?"#f8717130":"#60a5fa30"}`,
          padding:"10px 24px", display:"flex", alignItems:"center", justifyContent:"center", gap:8, fontSize:13,
          color: announcement.type==="warn"?"#fbbf24":announcement.type==="error"?"#f87171":"#60a5fa",
        }}>
          <span>{announcement.type==="warn"?"⚠️":announcement.type==="error"?"🔴":"📢"}</span>
          <span>{announcement.text}</span>
          {currentUser?.role==="admin" && (
            <button onClick={()=>setAnnouncement({text:"",type:"info",active:false})}
              style={{marginLeft:8,background:"none",border:"none",color:"inherit",cursor:"pointer",fontSize:12,opacity:0.6}}>✕</button>
          )}
        </div>
      )}
      {!viewingProfile && !activeSkin && tab==="home" && (
        <LandingPage onNavigate={navigate}/>
      )}

      <main style={{maxWidth:1440,margin:"0 auto",padding:isMobile?"12px 12px 80px":"32px 24px",display:tab==="home"&&!viewingProfile&&!activeSkin?"none":"block"}}>

        {/* PROFILE VIEW */}
        {viewingProfile && (
          <ProfilePage
            username={viewingProfile}
            profiles={profiles}
            submissions={submissions}
            allSkins={allSkins}
            isOwn={currentUser?.username===viewingProfile}
            onBack={()=>setViewingProfile(null)}
            onSave={handleSaveProfile}
            forumPosts={forumPosts}
          />
        )}

        {/* SKIN DETAIL */}
        {!viewingProfile && activeSkin && (
          <SkinPage
            skin={allSkins.find(s=>s.id===activeSkin.id)??activeSkin}
            currentUser={currentUser} userVote={userVotes[activeSkin.id]??0}
            onVote={handleVote} onBack={()=>setActiveSkin(null)}
            onTraderSubmit={handleSubmit} disputes={disputes}
            onDispute={handleDispute} onAdminFreeze={handleFreeze}
            profiles={profiles} onViewProfile={handleViewProfile}
            onBracketSubmit={handleBracketSubmit}
            userAlerts={userAlerts} onSetAlert={handleSetAlert}
            communityVotes={Object.values(communityVotes).filter(v=>v.skinId===activeSkin.id&&!v.resolved)}
            onCommunityVote={handleCommunityVote}
            isMobile={isMobile}
          />
        )}

        {/* TRACKER */}
        {!viewingProfile && !activeSkin && tab==="tracker" && (
          <div style={{display:"flex",gap:24,alignItems:"flex-start",flexDirection:isMobile?"column":"row"}}>
            {!isMobile && <SubmissionFeed allSkins={allSkins} submissions={submissions} bracketSubs={bracketSubs} onGoSkin={skin=>{setActiveSkin(skin);setTab("tracker");setViewingProfile(null);}}/>}
            <div style={{flex:1,minWidth:0,width:isMobile?"100%":"auto"}}>
            <>
            <Panel style={{marginBottom:20}}>
              {/* View mode toggle */}
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14,flexWrap:"wrap",gap:8}}>
                <div style={{fontSize:10,fontWeight:700,color:"#555",textTransform:"uppercase",letterSpacing:"0.07em"}}>Filter & Sort</div>
                <div style={{display:"flex",background:"#111",borderRadius:10,padding:3,gap:2,border:"1px solid #1e1e1e"}}>
                  {[
                    {id:"simple",   label:"Simple",   emoji:"👋", tip:"Plain English — great for beginners"},
                    {id:"advanced", label:"Advanced",  emoji:"📊", tip:"Full stats, confidence scores & serial table"},
                  ].map(m=>(
                    <button key={m.id} onClick={()=>setViewMode(m.id)}
                      style={{background:viewMode===m.id?"#f97316":"transparent",border:"none",borderRadius:8,color:viewMode===m.id?"#fff":"#555",cursor:"pointer",fontFamily:"inherit",fontSize:12,fontWeight:700,padding:"6px 14px",transition:"all 0.15s",display:"flex",alignItems:"center",gap:5}}
                      title={m.tip}>
                      <span>{m.emoji}</span> {m.label}
                    </button>
                  ))}
                </div>
              </div>
              {viewMode==="simple"&&<div style={{marginBottom:12,padding:"8px 12px",background:"rgba(249,115,22,0.06)",border:"1px solid rgba(249,115,22,0.15)",borderRadius:10,fontSize:12,color:"#888"}}>👋 <strong style={{color:"#f97316"}}>Simple mode</strong> — showing plain-English values. Switch to <strong style={{color:"#ccc"}}>Advanced</strong> for full trader stats.</div>}
              <div style={{display:"flex",gap:8,flexWrap:"wrap",alignItems:"center"}}>
                <div style={{position:"relative",flex:1,minWidth:180}}>
                  <span style={{position:"absolute",left:12,top:"50%",transform:"translateY(-50%)",color:"#444",fontSize:14,pointerEvents:"none"}}>🔍</span>
                  <input placeholder="Search skin name…" value={search} onChange={e=>setSearch(e.target.value)} style={{...sel,paddingLeft:34,width:"100%"}}/>
                </div>
                {/* Category */}
                <div style={{position:"relative"}}>
                  <select value={category} onChange={e=>{setCategory(e.target.value);setWeapon("All");}} style={{...sel,paddingRight:28,minWidth:148}}>
                    {categories.map(o=><option key={o} value={o}>{o==="All"?"All Categories":o}</option>)}
                  </select>
                  <span style={{position:"absolute",right:10,top:"50%",transform:"translateY(-50%)",color:"#555",fontSize:10,pointerEvents:"none"}}>▾</span>
                </div>
                {/* Weapon — only show when a category is selected and has multiple weapons */}
                {category!=="All" && weaponOpts.length>2 && (
                  <div style={{position:"relative"}}>
                    <select value={weapon} onChange={e=>setWeapon(e.target.value)} style={{...sel,paddingRight:28,minWidth:140}}>
                      {weaponOpts.map(o=><option key={o} value={o}>{o==="All"?"All Weapons":o}</option>)}
                    </select>
                    <span style={{position:"absolute",right:10,top:"50%",transform:"translateY(-50%)",color:"#555",fontSize:10,pointerEvents:"none"}}>▾</span>
                  </div>
                )}
                {/* Rarity + Tier */}
                {[{val:rarity,set:setRarity,opts:rarities,label:"Rarity"},{val:tier,set:setTier,opts:tiers,label:"Tier",fmtOpt:t=>t==="All"?"All Tiers":`${t} — ${TIER_META[t]?.label||""}`}].map((f,i)=>(
                  <div key={i} style={{position:"relative"}}>
                    <select value={f.val} onChange={e=>f.set(e.target.value)} style={{...sel,paddingRight:28,minWidth:148}}>
                      {f.opts.map(o=><option key={o} value={o}>{f.fmtOpt?f.fmtOpt(o):o==="All"?`All ${f.label}s`:o}</option>)}
                    </select>
                    <span style={{position:"absolute",right:10,top:"50%",transform:"translateY(-50%)",color:"#555",fontSize:10,pointerEvents:"none"}}>▾</span>
                  </div>
                ))}
                <div style={{position:"relative"}}>
                  <select value={sort} onChange={e=>setSort(e.target.value)} style={{...sel,paddingRight:28,minWidth:178}}>
                    <option value="value-desc">Value: High → Low</option>
                    <option value="value-asc">Value: Low → High</option>
                    <option value="weekly-desc">Weekly Change ↑</option>
                    <option value="demand-desc">Demand: High → Low</option>
                    <option value="name-asc">Name A → Z</option>
                  </select>
                  <span style={{position:"absolute",right:10,top:"50%",transform:"translateY(-50%)",color:"#555",fontSize:10,pointerEvents:"none"}}>▾</span>
                </div>
                {(search||category!=="All"||weapon!=="All"||rarity!=="All"||tier!=="All")&&<button onClick={()=>{setSearch("");setCategory("All");setWeapon("All");setRarity("All");setTier("All");}} style={{...sel,color:"#f97316",border:"1px solid #f9731630",background:"rgba(249,115,22,0.06)",cursor:"pointer"}}>✕ Clear</button>}
              </div>
              <div style={{marginTop:12,fontSize:12,color:"#444"}}>Showing <strong style={{color:"#f97316"}}>{visible.length}</strong> of {allSkins.length} skins</div>
            </Panel>
            {visible.length>0
              ? <div style={{display:"grid",gridTemplateColumns:isMobile?`repeat(2,1fr)`:`repeat(auto-fill,minmax(${viewMode==="simple"?"220px":"210px"},1fr))`,gap:isMobile?8:12}}>
                  {visible.map(s=><SkinCard key={s.id} skin={s} onClick={setActiveSkin} viewMode={viewMode} hasAlert={!!(userAlerts?.[s.id])}/>)}
                </div>
              : <div style={{textAlign:"center",padding:"80px 0",color:"#333",fontSize:14}}>No skins match your filters.</div>}
            </>
            </div>
            <LiveChat currentUser={currentUser} profiles={profiles} messages={chatMessages} setMessages={setChatMessages}/>
          </div>
        )}

        {/* FORUM */}
        {!viewingProfile && !activeSkin && tab==="forum" && !activePost && !newPostOpen && (
          <div style={{display:"flex",gap:24,alignItems:"flex-start"}}>
            <div style={{flex:1,minWidth:0}}>
              <ForumPage currentUser={currentUser} profiles={profiles} onViewProfile={handleViewProfile}
                onOpenPost={handleOpenPost} posts={forumPosts} onNewPost={()=>setNewPostOpen(true)}
                onViewScammers={()=>navigate("scammers")}/>
            </div>
            <LiveChat currentUser={currentUser} profiles={profiles} messages={chatMessages} setMessages={setChatMessages}/>
          </div>
        )}

        {/* NEW POST */}
        {!viewingProfile && !activeSkin && tab==="forum" && newPostOpen && (
          <NewPostPage
            currentUser={currentUser}
            profiles={profiles}
            onBack={()=>setNewPostOpen(false)}
            onSubmit={handleNewPost}
          />
        )}

        {/* POST DETAIL */}
        {!viewingProfile && !activeSkin && tab==="forum" && activePost && !newPostOpen && (
          <PostPage
            post={forumPosts.find(p=>p.id===activePost.id)||activePost}
            replies={replies[activePost.id]||[]}
            postReactions={postReactions}
            replyReactions={replyReactions}
            currentUser={currentUser}
            profiles={profiles}
            onBack={()=>setActivePost(null)}
            onAddReply={handleAddReply}
            onReactPost={handleReactPost}
            onReactReply={handleReactReply}
            onViewProfile={handleViewProfile}
            onVotePoll={handleVotePoll}
            onPinPost={postId=>setForumPosts(prev=>prev.map(p=>p.id===postId?{...p,pinned:!p.pinned}:p))}
          />
        )}

        {/* STATS */}
        {!viewingProfile && !activeSkin && tab==="stats" && (
          <StatsPage allSkins={allSkins} submissions={submissions} profiles={profiles} votes={votes} forumPosts={forumPosts}/>
        )}

        {/* HOW IT WORKS */}
        {!viewingProfile && !activeSkin && tab==="scammers" && (
          <ScammerPage
            currentUser={currentUser}
            confirmedScammers={confirmedScammers}
            onSubmitReport={async report => {
              setScamReports(prev => [report, ...prev]);
              await supabase.from("scam_reports").insert({
                accused_username: report.accusedUsername,
                roblox_username: report.robloxUsername || "",
                discord_username: report.discordUsername || "",
                description: report.description,
                photo_urls: report.photos || [],
                reported_by: report.reportedBy,
              });
            }}
            onShowAuth={() => setShowAuth(true)}
          />
        )}

        {!viewingProfile && !activeSkin && tab==="howto" && (
          <HowItWorksPage/>
        )}

        {!viewingProfile && !activeSkin && tab==="terms" && (
          <TermsPage onNavigate={navigate}/>
        )}

        {!viewingProfile && !activeSkin && tab==="calculator" && (
          <TradeCalculator allSkins={allSkins} onGoSkin={skin=>{setActiveSkin(skin);setTab("tracker");setViewingProfile(null);}}/>
        )}

        {!viewingProfile && !activeSkin && tab==="settings" && (
          <SettingsPage
            currentUser={currentUser}
            profiles={profiles}
            onSave={handleSaveProfile}
            onNavigate={navigate}
          />
        )}

        {!viewingProfile && !activeSkin && tab==="admin" && currentUser?.role==="admin" && (
          <AdminPage
            allSkins={allSkins}
            submissions={submissions} setSubmissions={setSubmissions}
            bracketSubs={bracketSubs} setBracketSubs={setBracketSubs}
            disputes={disputes}       setDisputes={setDisputes}
            frozen={frozen}           setFrozen={setFrozen}
            forumPosts={forumPosts}   setForumPosts={setForumPosts}
            profiles={profiles}       setProfiles={setProfiles}
            onViewProfile={handleViewProfile}
            onViewSkin={skin=>{setActiveSkin(skin);setTab("tracker");}}
            setNotifications={setNotifications}
            scamReports={scamReports}           setScamReports={setScamReports}
            confirmedScammers={confirmedScammers} setConfirmedScammers={setConfirmedScammers}
            siteMode={siteMode} setSiteMode={setSiteMode}
            announcement={announcement} setAnnouncement={setAnnouncement}
            communityVotes={communityVotes} setCommunityVotes={setCommunityVotes}
            traderRequests={traderRequests} setTraderRequests={setTraderRequests}
          />
        )}
      </main>

      {/* Site-wide footer */}
      {tab !== "home" && (
        <div style={{borderTop:"1px solid #141414",padding:"16px 24px",display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:8}}>
          <div style={{fontSize:11,color:"#2a2a2a"}}>CA Market · Community-run · Not affiliated with Combat Arena</div>
          <button onClick={()=>navigate("terms")}
            style={{background:"none",border:"none",color:"#333",cursor:"pointer",fontFamily:"inherit",fontSize:11,textDecoration:"underline",padding:0,transition:"color 0.15s"}}
            onMouseEnter={e=>e.currentTarget.style.color="#f97316"}
            onMouseLeave={e=>e.currentTarget.style.color="#333"}>
            Terms of Service & Disclaimer
          </button>
        </div>
      )}
      <ToastContainer toasts={toasts}/>
      </div>
  );
}

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App/>);
    // Hide loading screen
    const loader = document.getElementById('loading');
    if (loader) { loader.style.opacity = '0'; setTimeout(() => loader.remove(), 350); }
  </script>
  <script>
    window.addEventListener('error', function(e) {
      const loader = document.getElementById('loading');
      if (loader) loader.innerHTML = '<div style="max-width:600px;padding:24px;background:#1a0a0a;border:1px solid #f8717133;border-radius:12px;color:#f87171;font-family:monospace;font-size:12px;line-height:1.6;"><strong style="font-size:14px;">⚠ Script Error</strong><br><br>' + (e.message || 'Unknown error') + '<br><br><em style="color:#555">' + (e.filename ? e.filename + ':' + e.lineno : '') + '</em></div>';
    });
  </script>
</body>
</html>
