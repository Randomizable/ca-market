// ─────────────────────────────────────────────────────────────
//  SCAMMER LIST PAGE
// ─────────────────────────────────────────────────────────────
function ScammerPage({ currentUser, confirmedScammers, onSubmitReport, onShowAuth }) {
  const [showForm,      setShowForm]      = useState(false);
  const [search,        setSearch]        = useState("");
  const [accused,       setAccused]       = useState("");
  const [robloxUser,    setRobloxUser]    = useState("");
  const [description,   setDescription]  = useState("");
  const [discordUser,   setDiscordUser]   = useState("");
  const [photos,        setPhotos]        = useState([]);
  const [submitted,     setSubmitted]     = useState(false);
  const [error,         setError]         = useState("");

  const handlePhotoUpload = (e) => {
    const files = Array.from(e.target.files).slice(0, 4 - photos.length);
    files.forEach(file => {
      const reader = new FileReader();
      reader.onload = ev => setPhotos(prev => [...prev, ev.target.result].slice(0,4));
      reader.readAsDataURL(file);
    });
  };

  const handleSubmit = () => {
    if (!accused.trim()) { setError("Please enter the username of the scammer."); return; }
    if (description.trim().length < 20) { setError("Please provide a detailed description (at least 20 characters)."); return; }
    onSubmitReport({
      id: `sr_${Date.now()}`,
      accusedUsername: accused.trim(),
      robloxUsername: robloxUser.trim(),
      discordUsername: discordUser.trim(),
      description: description.trim(),
      photos,
      reportedBy: currentUser.username,
      time: "just now",
    });
    setSubmitted(true);
    setAccused(""); setRobloxUser(""); setDiscordUser(""); setDescription(""); setPhotos([]); setError("");
    setTimeout(() => { setSubmitted(false); setShowForm(false); }, 3000);
  };

  const inp = {background:"#0e0e0e",border:"1px solid #252525",borderRadius:10,color:"#e0e0e0",fontFamily:"inherit",fontSize:13,padding:"10px 14px",outline:"none",width:"100%",boxSizing:"border-box"};

  return (
    <div style={{maxWidth:800,margin:"0 auto"}}>
      {/* Header */}
      <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",flexWrap:"wrap",gap:16,marginBottom:28}}>
        <div>
          <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:8}}>
            <div style={{width:40,height:40,background:"rgba(248,113,113,0.15)",border:"1px solid rgba(248,113,113,0.3)",borderRadius:12,display:"flex",alignItems:"center",justifyContent:"center",fontSize:20}}>🚨</div>
            <div>
              <div style={{fontFamily:"Syne,sans-serif",fontWeight:800,fontSize:22,color:"#fff"}}>Confirmed Scammers</div>
              <div style={{fontSize:13,color:"#555",marginTop:2}}>Community-verified reports, reviewed and approved by CA Market admins</div>
            </div>
          </div>
          <div style={{background:"rgba(249,115,22,0.06)",border:"1px solid rgba(249,115,22,0.15)",borderRadius:10,padding:"10px 14px",fontSize:12,color:"#888",lineHeight:1.6,maxWidth:580}}>
            ⚠️ All reports are reviewed by admins before being listed. CA Market is not responsible for trades made with users on this list. Always trade carefully and use in-game protections.
          </div>
        </div>
        <button
          onClick={()=>{ if (!currentUser) { onShowAuth(); return; } setShowForm(p=>!p); }}
          style={{background:"linear-gradient(135deg,#f87171,#dc2626)",border:"none",borderRadius:10,color:"#fff",cursor:"pointer",fontFamily:"inherit",fontSize:13,fontWeight:700,padding:"10px 20px",flexShrink:0,transition:"opacity 0.15s"}}
          onMouseEnter={e=>e.currentTarget.style.opacity="0.85"}
          onMouseLeave={e=>e.currentTarget.style.opacity="1"}>
          🚨 Report a Scammer
        </button>
      </div>

      {/* Search bar */}
      <div style={{display:"flex",alignItems:"center",gap:8,background:"#111",border:"1px solid #1e1e1e",borderRadius:10,padding:"9px 14px",marginBottom:20}}>
        <span style={{fontSize:14,color:"#444",flexShrink:0}}>🔍</span>
        <input value={search} onChange={e=>setSearch(e.target.value)}
          placeholder="Search by username, Roblox name, or Discord…"
          style={{flex:1,background:"none",border:"none",outline:"none",color:"#e0e0e0",fontFamily:"inherit",fontSize:13,fontWeight:500}}/>
        {search && <button onClick={()=>setSearch("")} style={{background:"none",border:"none",color:"#555",cursor:"pointer",fontSize:14,padding:"0 2px"}}>✕</button>}
      </div>

      {/* Report form */}
      {showForm && (
        <div style={{background:"#111",border:"1px solid #1e1e1e",borderRadius:16,padding:"24px",marginBottom:28}}>
          <div style={{fontFamily:"Syne,sans-serif",fontWeight:800,fontSize:16,color:"#fff",marginBottom:4}}>Submit a Scam Report</div>
          <div style={{fontSize:12,color:"#555",marginBottom:20}}>Your report will be reviewed by an admin before appearing publicly.</div>

          {submitted ? (
            <div style={{textAlign:"center",padding:"24px 0"}}>
              <div style={{fontSize:32,marginBottom:10}}>✅</div>
              <div style={{fontSize:14,fontWeight:600,color:"#4ade80",marginBottom:4}}>Report submitted successfully</div>
              <div style={{fontSize:12,color:"#555"}}>An admin will review your report shortly.</div>
            </div>
          ) : (
            <>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:14,marginBottom:14}}>
                <div>
                  <div style={{fontSize:12,color:"#888",fontWeight:600,marginBottom:6}}>CA Market Username <span style={{color:"#f87171"}}>*</span></div>
                  <input style={inp} value={accused} onChange={e=>setAccused(e.target.value)} placeholder="Their CA Market username"/>
                </div>
                <div>
                  <div style={{fontSize:12,color:"#888",fontWeight:600,marginBottom:6}}>Roblox Username <span style={{color:"#555",fontWeight:400}}>(optional)</span></div>
                  <input style={inp} value={robloxUser} onChange={e=>setRobloxUser(e.target.value)} placeholder="Their Roblox username"/>
                </div>
                <div>
                  <div style={{fontSize:12,color:"#888",fontWeight:600,marginBottom:6}}>Discord <span style={{color:"#555",fontWeight:400}}>(optional)</span></div>
                  <input style={inp} value={discordUser} onChange={e=>setDiscordUser(e.target.value)} placeholder="username or user#0000"/>
                </div>
              </div>

              <div style={{marginBottom:14}}>
                <div style={{fontSize:12,color:"#888",fontWeight:600,marginBottom:6}}>Description <span style={{color:"#f87171"}}>*</span></div>
                <textarea value={description} onChange={e=>setDescription(e.target.value.slice(0,5000))}
                  placeholder="Describe what happened in detail — what was traded, what was promised, what went wrong. The more detail the better."
                  rows={5} style={{...inp,resize:"vertical",lineHeight:1.6}}/>
                <div style={{fontSize:11,color:description.length<20?"#f87171":"#555",marginTop:4,textAlign:"right"}}>{description.length} chars {description.length<20?`(${20-description.length} more needed)`:""}</div>
              </div>

              {/* Photo upload */}
              <div style={{marginBottom:16}}>
                <div style={{fontSize:12,color:"#888",fontWeight:600,marginBottom:6}}>Evidence Photos <span style={{color:"#555",fontWeight:400}}>(up to 4 images)</span></div>
                <div style={{display:"flex",gap:8,flexWrap:"wrap",alignItems:"center"}}>
                  {photos.map((src,i)=>(
                    <div key={i} style={{position:"relative"}}>
                      <img src={src} alt={`Photo ${i+1}`} style={{width:72,height:56,objectFit:"cover",borderRadius:8,border:"1px solid #252525"}}/>
                      <button onClick={()=>setPhotos(prev=>prev.filter((_,j)=>j!==i))}
                        style={{position:"absolute",top:-6,right:-6,width:18,height:18,borderRadius:"50%",background:"#f87171",border:"none",color:"#fff",fontSize:10,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700,lineHeight:1}}>✕</button>
                    </div>
                  ))}
                  {photos.length < 4 && (
                    <label style={{width:72,height:56,borderRadius:8,border:"1px dashed #333",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",cursor:"pointer",gap:2}}>
                      <span style={{fontSize:18,color:"#444"}}>📷</span>
                      <span style={{fontSize:9,color:"#444"}}>Add photo</span>
                      <input type="file" accept="image/*" multiple onChange={handlePhotoUpload} style={{display:"none"}}/>
                    </label>
                  )}
                </div>
              </div>

              {error && <div style={{fontSize:12,color:"#f87171",marginBottom:12}}>{error}</div>}

              <div style={{display:"flex",gap:8}}>
                <button onClick={()=>{setShowForm(false);setError("");}}
                  style={{background:"none",border:"1px solid #252525",borderRadius:10,color:"#666",cursor:"pointer",fontFamily:"inherit",fontSize:13,fontWeight:600,padding:"9px 20px"}}>
                  Cancel
                </button>
                <button onClick={handleSubmit}
                  style={{flex:1,background:"linear-gradient(135deg,#f87171,#dc2626)",border:"none",borderRadius:10,color:"#fff",cursor:"pointer",fontFamily:"inherit",fontSize:13,fontWeight:700,padding:"9px 0"}}>
                  Submit Report
                </button>
              </div>
            </>
          )}
        </div>
      )}

      {/* Scammer list */}
      {(() => {
        const q = search.toLowerCase().trim();
        const filtered = q ? confirmedScammers.filter(s =>
          s.username.toLowerCase().includes(q) ||
          s.robloxUsername?.toLowerCase().includes(q) ||
          s.discordUsername?.toLowerCase().includes(q)
        ) : confirmedScammers;

        if (confirmedScammers.length === 0) return (
          <div style={{background:"#111",border:"1px solid #1e1e1e",borderRadius:16,padding:"48px 24px",textAlign:"center"}}>
            <div style={{fontSize:36,marginBottom:12}}>✅</div>
            <div style={{fontSize:15,fontWeight:600,color:"#4ade80",marginBottom:6}}>No confirmed scammers</div>
            <div style={{fontSize:13,color:"#555"}}>No reports have been verified yet. Trade safely!</div>
          </div>
        );

        if (filtered.length === 0) return (
          <div style={{background:"#111",border:"1px solid #1e1e1e",borderRadius:16,padding:"32px 24px",textAlign:"center"}}>
            <div style={{fontSize:28,marginBottom:10}}>🔍</div>
            <div style={{fontSize:13,color:"#555"}}>No results for <strong style={{color:"#888"}}>"{search}"</strong></div>
          </div>
        );

        return (
          <div style={{display:"flex",flexDirection:"column",gap:10}}>
            {q && <div style={{fontSize:12,color:"#555",marginBottom:4}}>{filtered.length} result{filtered.length!==1?"s":""} for "{search}"</div>}
            {filtered.map(s => (
            <div key={s.id} style={{background:"#111",border:"1px solid rgba(248,113,113,0.2)",borderRadius:14,padding:"18px 20px"}}>
              <div style={{display:"flex",alignItems:"flex-start",gap:14,flexWrap:"wrap"}}>
                <div style={{width:42,height:42,background:"rgba(248,113,113,0.1)",border:"1px solid rgba(248,113,113,0.25)",borderRadius:10,display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,flexShrink:0}}>🚫</div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{display:"flex",alignItems:"center",gap:10,flexWrap:"wrap",marginBottom:6}}>
                    <div style={{fontFamily:"Syne,sans-serif",fontSize:16,fontWeight:800,color:"#f87171"}}>{s.username}</div>
                    <span style={{background:"rgba(248,113,113,0.1)",border:"1px solid rgba(248,113,113,0.25)",borderRadius:99,fontSize:10,fontWeight:700,color:"#f87171",padding:"2px 8px"}}>Confirmed Scammer</span>
                  </div>
                  {s.robloxUsername && (
                    <div style={{fontSize:12,color:"#666",marginBottom:3}}>🎮 Roblox: <span style={{color:"#aaa",fontWeight:600}}>{s.robloxUsername}</span></div>
                  )}
                  {s.discordUsername && (
                    <div style={{fontSize:12,color:"#666",marginBottom:6}}>💬 Discord: <span style={{color:"#aaa",fontWeight:600}}>{s.discordUsername}</span></div>
                  )}
                  <div style={{fontSize:13,color:"#888",lineHeight:1.7,marginBottom:10}}>{s.description}</div>
                  {s.photos?.length > 0 && (
                    <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:10}}>
                      {s.photos.map((src,i)=>(
                        <img key={i} src={src} alt={`Evidence ${i+1}`}
                          style={{width:80,height:60,objectFit:"cover",borderRadius:8,border:"1px solid #252525",cursor:"pointer"}}
                          onClick={()=>window.open(src,"_blank")}/>
                      ))}
                    </div>
                  )}
                  <div style={{fontSize:11,color:"#444"}}>Confirmed {s.confirmedAt} · Reported by <span style={{color:"#888"}}>{s.reportedBy}</span></div>
                </div>
              </div>
            </div>
          ))}
          </div>
        );
      })()}
    </div>
  );
}

const INIT_REPORTED_POSTS = [];
const INIT_ADMIN_LOG = [];

// ─────────────────────────────────────────────────────────────
//  ADMIN PANEL
// ─────────────────────────────────────────────────────────────
function AdminPage({ allSkins, submissions, setSubmissions, bracketSubs, setBracketSubs, disputes, setDisputes, frozen, setFrozen, forumPosts, setForumPosts, profiles, setProfiles, onViewProfile, onViewSkin, setNotifications, siteMode, setSiteMode, scamReports, setScamReports, confirmedScammers, setConfirmedScammers, communityVotes, setCommunityVotes, traderRequests, setTraderRequests, announcement, setAnnouncement }) {
  const [activeSection, setActiveSection] = useState("sitemode");
  const [reportedPosts, setReportedPosts] = useState(INIT_REPORTED_POSTS);
  const [adminLog,      setAdminLog]      = useState(INIT_ADMIN_LOG);
  const [dismissed,     setDismissed]     = useState(new Set());
  const [announceInput, setAnnounceInput] = useState("");
  const [announceType,  setAnnounceType]  = useState("info");
  const [userSearch,    setUserSearch]    = useState("");
  const [banReason,     setBanReason]     = useState("");

  const log = (action) => setAdminLog(prev=>[{ id:`l${Date.now()}`, action, time: new Date().toLocaleString("en-US",{month:"short",day:"numeric",hour:"2-digit",minute:"2-digit"}), admin:"AdminUser" }, ...prev]);

  // ── Pending flagged submissions (base + bracket) ──
  const pendingSubs = useMemo(() => [
    ...Object.entries(submissions).flatMap(([skinId, subs]) =>
      subs.map((s,i) => ({...s, skinId, idx:i, source:"base", bracketId:null})).filter(s => s.flagged)
    ),
    ...Object.entries(bracketSubs).flatMap(([skinId, brackets]) =>
      Object.entries(brackets).flatMap(([bracketId, subs]) =>
        subs.map((s,i) => ({...s, skinId, idx:i, source:"bracket", bracketId})).filter(s => s.flagged)
      )
    ),
  ], [submissions, bracketSubs]);

  const approveSub = (skinId, idx, source, bracketId) => {
    const sub = pendingSubs.find(s=>s.skinId===skinId&&s.idx===idx&&s.source===source&&s.bracketId===bracketId);
    if (source === "bracket") {
      setBracketSubs(prev => {
        const next = [...(prev[skinId]?.[bracketId]||[])];
        next[idx] = {...next[idx], flagged:false};
        return {...prev, [skinId]:{...prev[skinId], [bracketId]:next}};
      });
    } else {
      setSubmissions(prev => {
        const next = [...(prev[skinId]||[])];
        next[idx] = {...next[idx], flagged:false};
        return {...prev, [skinId]:next};
      });
    }
    const skin = allSkins.find(s=>s.id===skinId);
    const bLabel = bracketId ? SERIAL_BRACKETS.find(b=>b.id===bracketId)?.label : null;
    log(`Approved flagged submission by ${sub?.traderId} for ${skin?.name}${bLabel?` (${bLabel})`:""}`);
    if (sub?.traderId) {
      setNotifications(prev => [{
        id: `notif_approve_${skinId}_${Date.now()}`,
        type: "submission_approved",
        skinId, skinName: skin?.name ?? skinId, skinEmoji: skin?.emoji ?? "🎮",
        value: sub.value, bracketLabel: bLabel,
        time: "just now", read: false,
      }, ...prev]);
    }
  };

  const rejectSub = (skinId, idx, source, bracketId) => {
    const sub = pendingSubs.find(s=>s.skinId===skinId&&s.idx===idx&&s.source===source&&s.bracketId===bracketId);
    if (source === "bracket") {
      setBracketSubs(prev => {
        const next = (prev[skinId]?.[bracketId]||[]).filter((_,i)=>i!==idx);
        return {...prev, [skinId]:{...prev[skinId], [bracketId]:next}};
      });
    } else {
      setSubmissions(prev => {
        const next = (prev[skinId]||[]).filter((_,i)=>i!==idx);
        return {...prev, [skinId]:next};
      });
    }
    const skin = allSkins.find(s=>s.id===skinId);
    const bLabel = bracketId ? SERIAL_BRACKETS.find(b=>b.id===bracketId)?.label : null;
    log(`Rejected submission by ${sub?.traderId} for ${skin?.name}${bLabel?` (${bLabel})`:""} (value: ${fmt(sub?.value)})`);
    if (sub?.traderId) {
      setNotifications(prev => [{
        id: `notif_reject_${skinId}_${Date.now()}`,
        type: "submission_rejected",
        skinId, skinName: skin?.name ?? skinId, skinEmoji: skin?.emoji ?? "🎮",
        value: sub.value, bracketLabel: bLabel,
        time: "just now", read: false,
      }, ...prev]);
    }
  };

  // ── Price spike detection (>12% swing between last two history points) ──
  const SPIKE_THRESHOLD = 0.12;
  const VALUE_HISTORY_ALL = {};
  const spikes = allSkins.map(skin => {
    const hist = VALUE_HISTORY_ALL[skin.id] || [];
    if (hist.length < 2) return null;
    const prev = hist[hist.length-2].v, curr = hist[hist.length-1].v;
    const pct  = (curr - prev) / prev;
    if (Math.abs(pct) < SPIKE_THRESHOLD) return null;
    return { skin, prev, curr, pct };
  }).filter(Boolean).filter(s => !dismissed.has(s.skin.id));

  // ── Dispute queue ──
  const allDisputes = useMemo(() =>
    Object.entries(disputes).flatMap(([skinId, list]) =>
      list.map((d,i) => ({...d, skinId, idx:i}))
    )
  , [disputes]);

  const resolveDispute = (skinId, idx, action) => {
    const d = allDisputes.find(x=>x.skinId===skinId&&x.idx===idx);
    setDisputes(prev => {
      const next = (prev[skinId]||[]).filter((_,i)=>i!==idx);
      return {...prev,[skinId]:next};
    });
    const skin = allSkins.find(s=>s.id===skinId);
    log(`${action==="confirm"?"Confirmed":"Dismissed"} dispute on ${skin?.name} — "${d?.reason?.slice(0,40)}…"`);
  };

  // ── Reported posts ──
  const dismissReport = (rId, action) => {
    const r = reportedPosts.find(x=>x.id===rId);
    const post = forumPosts.find(p=>p.id===r?.postId);
    if (action === "remove") {
      setForumPosts(prev=>prev.filter(p=>p.id!==r?.postId));
      log(`Removed forum post "${post?.title?.slice(0,40)}" (reported by ${r?.reportedBy})`);
    } else {
      log(`Dismissed report on "${post?.title?.slice(0,40)}" — no action taken`);
    }
    setReportedPosts(prev=>prev.filter(x=>x.id!==rId));
  };

  // ── Trader management ──
  const traders = Object.entries(profiles).filter(([,p])=>p.role==="trader"||p.role==="admin");
  const members = Object.entries(profiles).filter(([,p])=>p.role==="community");

  const setRole = async (username, newRole) => {
    setProfiles(prev=>({...prev,[username]:{...prev[username],role:newRole}}));
    log(`Changed ${username}'s role to ${newRole}`);
    const { data: p } = await supabase.from("profiles").select("id").eq("username", username).single();
    if (p) {
      await supabase.from("profiles").update({ role: newRole, badge: newRole==="trader"?"Trusted Trader":newRole==="admin"?"Admin":null }).eq("id", p.id);
      await supabase.from("admin_log").insert({ admin:"AdminUser", action:`Changed ${username}'s role to ${newRole}`, details:{ username, newRole } });
    }
  };

  const banUser = async (username, reason="") => {
    setProfiles(prev=>({...prev,[username]:{...prev[username],banned:true,bannedReason:reason}}));
    log(`Banned ${username}${reason?` — ${reason}`:""}`);
    const { data: p } = await supabase.from("profiles").select("id").eq("username", username).single();
    if (p) {
      await supabase.from("profiles").update({ banned: true, banned_reason: reason, banned_at: new Date().toISOString() }).eq("id", p.id);
      await supabase.from("admin_log").insert({ admin:"AdminUser", action:`Banned ${username}`, details:{ username, reason } });
    }
  };

  const unbanUser = async (username) => {
    setProfiles(prev=>({...prev,[username]:{...prev[username],banned:false,bannedReason:""}}));
    log(`Unbanned ${username}`);
    const { data: p } = await supabase.from("profiles").select("id").eq("username", username).single();
    if (p) {
      await supabase.from("profiles").update({ banned: false, banned_reason: "", banned_at: null }).eq("id", p.id);
      await supabase.from("admin_log").insert({ admin:"AdminUser", action:`Unbanned ${username}`, details:{ username } });
    }
  };

  const adjustRep = async (username, delta) => {
    const current = profiles[username]?.reputation ?? 0;
    const newRep = Math.max(0, Math.min(1000, current + delta));
    setProfiles(prev=>({...prev,[username]:{...prev[username],reputation:newRep}}));
    log(`${delta>0?"Increased":"Decreased"} ${username}'s reputation by ${Math.abs(delta)} (now ${newRep})`);
    await supabase.rpc("adjust_reputation", { target_username: username, delta });
    await supabase.from("admin_log").insert({ admin:"AdminUser", action:`Adjusted ${username}'s reputation by ${delta>0?"+":""}${delta}`, details:{ username, delta, newRep } });
  };

  const activeVotes = Object.values(communityVotes||{}).filter(v=>!v.resolved);

  const SECTIONS = [
    { id:"sitemode",    label:"Site Mode",        emoji:"🌐",  badge: siteMode!=="live"?1:null,      badgeColor:"#f97316" },
    { id:"submissions", label:"Submissions",       emoji:"📋",  badge: pendingSubs.length||null,      badgeColor:"#fbbf24" },
    { id:"commvotes",   label:"Community Votes",   emoji:"🗳️", badge: activeVotes.length||null,      badgeColor:"#a855f7" },
    { id:"traderrequests", label:"Trader Requests",emoji:"⭐",  badge: traderRequests.filter(r=>r.status==="pending").length||null, badgeColor:"#a855f7" },
    { id:"spikes",      label:"Price Alerts",      emoji:"⚠️",  badge: spikes.length||null,           badgeColor:"#f87171" },
    { id:"disputes",    label:"Disputes",          emoji:"🚩",  badge: allDisputes.length||null,      badgeColor:"#f97316" },
    { id:"reports",     label:"Reports",           emoji:"🔴",  badge: reportedPosts.length||null,    badgeColor:"#f87171" },
    { id:"scamreports", label:"Scam Reports",      emoji:"🚨",  badge: scamReports.length||null,      badgeColor:"#f87171" },
    { id:"users",       label:"User Management",   emoji:"👥",  badge: Object.values(profiles).filter(p=>p.banned).length||null, badgeColor:"#f87171" },
    { id:"suspicious",  label:"Suspicious Users",  emoji:"🕵️", badge: null },
    { id:"announce",    label:"Announce",          emoji:"📢",  badge: null },
    { id:"market",      label:"Market Intel",      emoji:"📊",  badge: null },
    { id:"traders",     label:"Traders",           emoji:"🔑",  badge: null },
    { id:"log",         label:"Activity Log",      emoji:"📜",  badge: null },
  ];

  // ── Suspicious user analysis ──
  const suspiciousUsers = useMemo(() => {
    const userMap = {};
    // Gather all submissions (base + bracket) per user
    const allSubs = [
      ...Object.entries(submissions).flatMap(([skinId, subs]) =>
        subs.map(s => ({...s, skinId, source:"base", bracketId:null}))
      ),
      ...Object.entries(bracketSubs).flatMap(([skinId, brackets]) =>
        Object.entries(brackets).flatMap(([bracketId, subs]) =>
          subs.map(s => ({...s, skinId, source:"bracket", bracketId}))
        )
      ),
    ];
    allSubs.forEach(s => {
      if (!userMap[s.traderId]) userMap[s.traderId] = { subs:[], flagged:0, total:0, skinsSeen:new Set(), directions:[], deviations:[] };
      const u = userMap[s.traderId];
      u.total++;
      u.skinsSeen.add(s.skinId + (s.bracketId||""));
      if (s.flagged) u.flagged++;
      // Direction: compare to bracket/base avg
      const skin = allSkins.find(sk=>sk.id===s.skinId);
      const baseAvgU = skin?.val?.avg ?? 0;
      const refVal = s.source==="bracket"
        ? getBracketValue(s.bracketId, baseAvgU, skin?.bSubs).value
        : baseAvgU;
      if (refVal > 0) {
        const dev = (s.value - refVal) / refVal;
        u.directions.push(dev > 0 ? "up" : "down");
        u.deviations.push(Math.abs(dev));
      }
      u.subs.push(s);
    });
    const results = [];
    Object.entries(userMap).forEach(([username, u]) => {
      const flags = [];
      const flagRate = u.total > 0 ? u.flagged / u.total : 0;
      const avgDev   = u.deviations.length > 0 ? u.deviations.reduce((a,b)=>a+b,0)/u.deviations.length : 0;
      const upCount  = u.directions.filter(d=>d==="up").length;
      const downCount= u.directions.filter(d=>d==="down").length;
      const dirBias  = u.directions.length >= 3 ? Math.max(upCount,downCount)/u.directions.length : 0;
      // Flag: high outlier rate
      if (u.total >= 2 && flagRate >= 0.4)
        flags.push({ type:"High outlier rate", detail:`${u.flagged} of ${u.total} submissions auto-flagged (${Math.round(flagRate*100)}%)`, severity:"high" });
      // Flag: consistent direction bias (pump or dump)
      if (u.directions.length >= 3 && dirBias >= 0.85)
        flags.push({ type: upCount > downCount ? "Consistent price pumping" : "Consistent price dumping",
          detail:`${Math.round(dirBias*100)}% of submissions push prices ${upCount>downCount?"up":"down"} — possible coordinated manipulation`, severity:"medium" });
      // Flag: submitting across many targets quickly
      if (u.skinsSeen.size >= 4 && u.total >= 5)
        flags.push({ type:"Broad submission activity", detail:`Submitted values across ${u.skinsSeen.size} distinct skin/bracket targets — unusual spread`, severity:"low" });
      // Flag: extreme outlier magnitude
      if (avgDev >= 0.35 && u.total >= 2)
        flags.push({ type:"Extreme outlier magnitude", detail:`Average deviation from reference value is ${Math.round(avgDev*100)}% — far above normal variance`, severity:"high" });
      if (flags.length > 0)
        results.push({ username, flags, total:u.total, flagged:u.flagged, skinsSeen:u.skinsSeen.size, avgDev, dirBias, upCount, downCount, profile:profiles[username] });
    });
    return results.sort((a,b) => b.flags.filter(f=>f.severity==="high").length - a.flags.filter(f=>f.severity==="high").length);
  }, [submissions, bracketSubs, allSkins, profiles]);

  // ── Market-wide pattern analysis ──
  const marketPatterns = useMemo(() => {
    const patterns = [];
    // 1. Coordinated spikes — multiple skins spiking in same direction recently
    const recentSpikes = allSkins.filter(sk => {
      const h = VALUE_HISTORY_ALL[sk.id] || [];
      if (h.length < 2) return false;
      return (h[h.length-1].v - h[h.length-2].v) / h[h.length-2].v > 0.08;
    });
    if (recentSpikes.length >= 3)
      patterns.push({ id:"coordinated_pump", type:"Coordinated Pump Signal", severity:"high",
        detail:`${recentSpikes.length} skins showing simultaneous upward movement (>8% each). May indicate coordinated buying or wash trading across multiple items.`,
        skins: recentSpikes, chartData: recentSpikes.map(sk => {
          const h = VALUE_HISTORY_ALL[sk.id]||[];
          return { name:skinLabel(sk), points: h.map((p,i)=>({i, v:p.v, pct:Math.round((p.v/h[0].v-1)*100)})) };
        })
      });
    // 2. High submission variance skins — price being pushed in multiple directions
    const highVariance = allSkins.filter(sk => {
      const subs = [...(submissions[sk.id]||[]), ...Object.values(bracketSubs[sk.id]||{}).flat()].filter(s=>!s.flagged);
      if (subs.length < 3) return false;
      const avg = subs.reduce((a,s)=>a+s.value,0)/subs.length;
      const stddev = Math.sqrt(subs.reduce((a,s)=>a+(s.value-avg)**2,0)/subs.length);
      return (stddev/avg) > 0.15;
    });
    if (highVariance.length > 0)
      patterns.push({ id:"high_variance", type:"High Submission Variance", severity:"medium",
        detail:`${highVariance.length} skin${highVariance.length!==1?"s":""} have a coefficient of variation above 15% in their submissions — traders disagree significantly on value, or values are being pulled in opposite directions.`,
        skins: highVariance, chartData: highVariance.map(sk => {
          const subs = [...(submissions[sk.id]||[]), ...Object.values(bracketSubs[sk.id]||{}).flat()].filter(s=>!s.flagged);
          const avg = subs.reduce((a,s)=>a+s.value,0)/subs.length;
          return { name:skinLabel(sk), points: subs.map((s,i)=>({i, v:s.value, pct:Math.round((s.value/avg-1)*100)})), avg };
        })
      });
    // 3. Declining skins with flagged subs — possible dump + flag to suppress price
    const dumpCandidates = allSkins.filter(sk => {
      const h = VALUE_HISTORY_ALL[sk.id]||[];
      if (h.length < 3) return false;
      const trending = h.slice(-3).every((p,i,arr)=>i===0||p.v<=arr[i-1].v);
      const hasFlagged = (submissions[sk.id]||[]).some(s=>s.flagged);
      return trending && hasFlagged;
    });
    if (dumpCandidates.length > 0)
      patterns.push({ id:"dump_suppress", type:"Price Suppression Pattern", severity:"medium",
        detail:`${dumpCandidates.length} skin${dumpCandidates.length!==1?"s":""} show a consistent downward price trend alongside flagged outlier submissions — flagged submissions on declining items can indicate artificial suppression attempts.`,
        skins: dumpCandidates, chartData: dumpCandidates.map(sk => {
          const h = VALUE_HISTORY_ALL[sk.id]||[];
          return { name:skinLabel(sk), points: h.map((p,i)=>({i, v:p.v, pct:Math.round((p.v/h[0].v-1)*100)})) };
        })
      });
    // 4. Single-trader dominated skins
    const dominated = allSkins.filter(sk => {
      const subs = (submissions[sk.id]||[]).filter(s=>!s.flagged);
      if (subs.length < 2) return false;
      const counts = {};
      subs.forEach(s=>{counts[s.traderId]=(counts[s.traderId]||0)+1;});
      const max = Math.max(...Object.values(counts));
      return max/subs.length >= 0.7;
    });
    if (dominated.length > 0)
      patterns.push({ id:"dominated", type:"Single-Trader Price Control", severity:"low",
        detail:`${dominated.length} skin${dominated.length!==1?"s":""} have 70%+ of their verified submissions from one trader. Low submission diversity reduces price reliability.`,
        skins: dominated, chartData: dominated.map(sk => {
          const subs = (submissions[sk.id]||[]).filter(s=>!s.flagged);
          const counts = {};
          subs.forEach(s=>{counts[s.traderId]=(counts[s.traderId]||0)+1;});
          return { name:skinLabel(sk), points: Object.entries(counts).map(([t,c],i)=>({i,v:c,label:t})) };
        })
      });
    return patterns;
  }, [allSkins, submissions, bracketSubs]);

  const Row = ({children, accent="#1e1e1e"}) => (
    <div style={{background:"#141414",border:`1px solid ${accent}`,borderRadius:14,padding:"14px 16px",marginBottom:10}}>
      {children}
    </div>
  );

  const ActionBtn = ({label, color, onClick}) => (
    <button onClick={onClick} style={{background:color+"18",border:`1px solid ${color}40`,borderRadius:8,color,cursor:"pointer",fontFamily:"inherit",fontSize:11,fontWeight:700,padding:"5px 12px",transition:"all 0.15s"}}
      onMouseEnter={e=>{e.currentTarget.style.background=color+"30";}}
      onMouseLeave={e=>{e.currentTarget.style.background=color+"18";}}>
      {label}
    </button>
  );

  const EmptyState = ({msg}) => (
    <div style={{textAlign:"center",padding:"40px 0",color:"#333",fontSize:13}}>
      <div style={{fontSize:28,marginBottom:8}}>✅</div>{msg}
    </div>
  );

  return (
    <div style={{maxWidth:1100,margin:"0 auto"}}>
      <div style={{display:"flex",gap:20,alignItems:"flex-start"}}>

        {/* ── SIDEBAR ── */}
        <div style={{width:220,flexShrink:0,position:"sticky",top:88}}>
          {/* Header */}
          <div style={{background:"#111",border:"1px solid #1e1e1e",borderRadius:16,padding:"16px",marginBottom:12}}>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
              <div style={{width:32,height:32,background:"linear-gradient(135deg,#f87171,#dc2626)",borderRadius:9,display:"flex",alignItems:"center",justifyContent:"center",fontSize:15}}>🛡️</div>
              <div>
                <div style={{fontFamily:"Syne,sans-serif",fontSize:14,fontWeight:800,color:"#fff",lineHeight:1.1}}>Admin Panel</div>
                <div style={{fontSize:10,color:"#f87171",fontWeight:600}}>AdminUser</div>
              </div>
            </div>
            <div style={{fontSize:10,color:"#444",lineHeight:1.5}}>Moderation &amp; site management</div>
          </div>

          {/* Nav groups */}
          {[
            { label:"Overview", items: SECTIONS.filter(s=>["sitemode","announce"].includes(s.id)) },
            { label:"Moderation", items: SECTIONS.filter(s=>["submissions","commvotes","disputes","reports","scamreports"].includes(s.id)) },
            { label:"Community", items: SECTIONS.filter(s=>["traderrequests","users","suspicious","traders"].includes(s.id)) },
            { label:"Analytics", items: SECTIONS.filter(s=>["spikes","market"].includes(s.id)) },
            { label:"System",   items: SECTIONS.filter(s=>["log"].includes(s.id)) },
          ].map(group => (
            <div key={group.label} style={{marginBottom:8}}>
              <div style={{fontSize:9,fontWeight:700,color:"#333",textTransform:"uppercase",letterSpacing:"0.08em",padding:"0 4px 6px"}}>{group.label}</div>
              <div style={{background:"#111",border:"1px solid #1e1e1e",borderRadius:12,overflow:"hidden"}}>
                {group.items.map((s, i) => {
                  const active = activeSection === s.id;
                  return (
                    <button key={s.id} onClick={()=>setActiveSection(s.id)}
                      style={{width:"100%",display:"flex",alignItems:"center",gap:8,padding:"9px 12px",background:active?"rgba(249,115,22,0.08)":"transparent",border:"none",borderBottom:i<group.items.length-1?"1px solid #1a1a1a":"none",color:active?"#f97316":"#666",cursor:"pointer",fontFamily:"inherit",fontSize:12,fontWeight:active?700:500,textAlign:"left",transition:"all 0.12s",position:"relative"}}
                      onMouseEnter={e=>{if(!active)e.currentTarget.style.background="#1a1a1a";}}
                      onMouseLeave={e=>{if(!active)e.currentTarget.style.background="transparent";}}>
                      {active && <div style={{position:"absolute",left:0,top:"20%",bottom:"20%",width:2,background:"#f97316",borderRadius:1}}/>}
                      <span style={{fontSize:14,flexShrink:0}}>{s.emoji}</span>
                      <span style={{flex:1,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{s.label}</span>
                      {s.badge!=null&&s.badge>0&&(
                        <span style={{background:s.badgeColor,borderRadius:99,color:"#000",fontSize:9,fontWeight:800,minWidth:15,height:15,display:"inline-flex",alignItems:"center",justifyContent:"center",padding:"0 4px",flexShrink:0}}>{s.badge}</span>
                      )}
                    </button>
                  );
                })}
              </div>
            </div>
          ))}
        </div>

        {/* ── MAIN CONTENT ── */}
        <div style={{flex:1,minWidth:0}}>
          {/* Section title */}
          <div style={{marginBottom:20}}>
            {(()=>{const s=SECTIONS.find(x=>x.id===activeSection);return s?(
              <div style={{display:"flex",alignItems:"center",gap:10}}>
                <span style={{fontSize:22}}>{s.emoji}</span>
                <div>
                  <div style={{fontFamily:"Syne,sans-serif",fontSize:18,fontWeight:800,color:"#fff"}}>{s.label}</div>
                </div>
                {s.badge!=null&&s.badge>0&&<span style={{background:s.badgeColor,borderRadius:99,color:"#000",fontSize:11,fontWeight:800,padding:"2px 10px",marginLeft:4}}>{s.badge}</span>}
              </div>
            ):null;})()}
          </div>

      {/* ── PENDING SUBMISSIONS ── */}
      {activeSection==="submissions" && (
        <div>
          <div style={{fontSize:10,fontWeight:700,color:"#555",textTransform:"uppercase",letterSpacing:"0.07em",marginBottom:6}}>
            Flagged Submissions
          </div>
          <div style={{fontSize:12,color:"#444",marginBottom:16,lineHeight:1.6}}>
            These submissions deviated more than 20% from the current average and are excluded from the price calculation. Each one automatically opens a <strong style={{color:"#a855f7"}}>community vote</strong> — see the Community Votes section for live vote status and admin overrides. Submissions here are the raw flagged data.
          </div>
          {pendingSubs.length===0 ? <EmptyState msg="No pending submissions"/> : pendingSubs.map(sub=>{
            const skin    = allSkins.find(s=>s.id===sub.skinId);
            const baseAvg = skin?.val?.avg ?? 0;
            const avg     = sub.source==="bracket"
              ? getBracketValue(sub.bracketId, baseAvg, skin?.bSubs).value
              : baseAvg || null;
            const pct  = avg ? Math.round(Math.abs(sub.value-avg)/avg*100) : null;
            return (
              <Row key={`${sub.skinId}-${sub.idx}`} accent="rgba(251,191,36,0.2)">
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:10}}>
                  <div>
                    <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
                      <span style={{fontSize:18}}>{skin?.emoji}</span>
                      <span style={{fontSize:14,fontWeight:700,color:"#f0f0f0"}}>{skin?.name}</span>
                      {sub.bracketId && (
                        <span style={{background:"rgba(129,140,248,0.12)",border:"1px solid rgba(129,140,248,0.3)",borderRadius:99,fontSize:10,fontWeight:700,color:"#818cf8",padding:"1px 8px"}}>
                          {SERIAL_BRACKETS.find(b=>b.id===sub.bracketId)?.label ?? sub.bracketId}
                        </span>
                      )}
                      <span style={{background:"rgba(251,191,36,0.12)",border:"1px solid rgba(251,191,36,0.3)",borderRadius:99,fontSize:10,fontWeight:700,color:"#fbbf24",padding:"1px 8px"}}>⚠ FLAGGED</span>
                    </div>
                    <div style={{display:"flex",gap:16,flexWrap:"wrap"}}>
                      <div>
                        <div style={{fontSize:10,color:"#555",marginBottom:2}}>Submitted value</div>
                        <div style={{fontSize:16,fontWeight:800,color:"#fbbf24"}}>{fmt(sub.value)} coins</div>
                      </div>
                      {avg&&<div>
                        <div style={{fontSize:10,color:"#555",marginBottom:2}}>Current avg</div>
                        <div style={{fontSize:16,fontWeight:700,color:"#888"}}>{fmt(avg)} coins</div>
                      </div>}
                      {pct&&<div>
                        <div style={{fontSize:10,color:"#555",marginBottom:2}}>Deviation</div>
                        <div style={{fontSize:16,fontWeight:700,color:"#f87171"}}>+{pct}%</div>
                      </div>}
                    </div>
                    <div style={{fontSize:11,color:"#555",marginTop:8}}>
                      By <button onClick={()=>onViewProfile(sub.traderId)} style={{background:"none",border:"none",color:"#f97316",cursor:"pointer",fontFamily:"inherit",fontSize:11,fontWeight:600,padding:0}}>{sub.traderId}</button>
                      {" · "}{sub.submittedAt}
                      {sub.source==="bracket"&&<span style={{color:"#444"}}> · Serial bracket submission</span>}
                    </div>
                  </div>
                  <div style={{display:"flex",gap:8,alignItems:"center"}}>
                    <ActionBtn label="✓ Approve" color="#4ade80" onClick={()=>approveSub(sub.skinId,sub.idx,sub.source,sub.bracketId)}/>
                    <ActionBtn label="✕ Reject"  color="#f87171" onClick={()=>rejectSub(sub.skinId,sub.idx,sub.source,sub.bracketId)}/>
                  </div>
                </div>
              </Row>
            );
          })}
        </div>
      )}

      {/* ── PRICE SPIKE ALERTS ── */}
      {/* ── COMMUNITY VOTES ── */}
      {activeSection==="commvotes" && (
        <div>
          <div style={{fontSize:10,fontWeight:700,color:"#555",textTransform:"uppercase",letterSpacing:"0.07em",marginBottom:6}}>Community Price Votes</div>
          <div style={{fontSize:12,color:"#444",marginBottom:16,lineHeight:1.6}}>
            Flagged submissions are voted on by community members with 30+ reputation over 7 days. Votes require a minimum of {MIN_VOTES} to be valid. You can override a vote result here, but community votes are the primary resolution mechanism.
          </div>
          {activeVotes.length === 0 ? <EmptyState msg="No active community votes"/> : activeVotes.map(vote => {
            const skin = allSkins.find(s=>s.id===vote.skinId);
            const now = Date.now();
            const msLeft = Math.max(0, vote.expiresAt - now);
            const daysLeft = Math.ceil(msLeft / (24*60*60*1000));
            const total = vote.keep.length + vote.reject.length;
            const keepPct = total > 0 ? Math.round(vote.keep.length/total*100) : 50;
            const bracketLabel = vote.bracketId ? (SERIAL_BRACKETS.find(b=>b.id===vote.bracketId)?.label ?? vote.bracketId) : "Base price";
            return (
              <Row key={vote.id} accent="rgba(168,85,247,0.12)">
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:12}}>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6,flexWrap:"wrap"}}>
                      <span style={{fontSize:18}}>{skin?.emoji||"❓"}</span>
                      <span style={{fontSize:14,fontWeight:700,color:"#f0f0f0"}}>{skin ? skinLabel(skin) : vote.skinId}</span>
                      <span style={{background:"rgba(168,85,247,0.12)",color:"#a855f7",border:"1px solid rgba(168,85,247,0.25)",borderRadius:99,fontSize:10,fontWeight:700,padding:"1px 8px"}}>{bracketLabel}</span>
                    </div>
                    <div style={{fontSize:12,color:"#888",marginBottom:8}}>
                      Submitted by <span style={{color:"#f97316"}}>{vote.traderId}</span> · Value: <strong style={{color:"#e0e0e0"}}>{fmt(vote.value)} coins</strong> · {daysLeft}d remaining
                    </div>
                    {/* Vote bar */}
                    <div style={{marginBottom:6}}>
                      <div style={{display:"flex",borderRadius:99,overflow:"hidden",height:6,background:"#1a1a1a",marginBottom:4}}>
                        <div style={{width:`${keepPct}%`,background:"#4ade80",transition:"width 0.4s"}}/>
                        <div style={{width:`${100-keepPct}%`,background:"#f87171",transition:"width 0.4s"}}/>
                      </div>
                      <div style={{display:"flex",justifyContent:"space-between",fontSize:10,color:"#555"}}>
                        <span style={{color:"#4ade80"}}>✓ Keep: {vote.keep.length}</span>
                        <span style={{color:"#888"}}>{total} votes{total < MIN_VOTES ? ` (${MIN_VOTES-total} more needed)` : ""}</span>
                        <span style={{color:"#f87171"}}>✕ Reject: {vote.reject.length}</span>
                      </div>
                    </div>
                  </div>
                  {/* Admin override */}
                  <div style={{display:"flex",flexDirection:"column",gap:6,flexShrink:0}}>
                    <div style={{fontSize:9,color:"#444",textTransform:"uppercase",fontWeight:700,letterSpacing:"0.05em",textAlign:"center",marginBottom:2}}>Admin Override</div>
                    <ActionBtn label="✓ Force Keep" color="#4ade80" onClick={()=>{
                      // Unflag the submission
                      if (vote.source==="base") {
                        setSubmissions(prev=>{
                          const subs=[...(prev[vote.skinId]||[])];
                          if(subs[vote.subIdx]) subs[vote.subIdx]={...subs[vote.subIdx],flagged:false};
                          return {...prev,[vote.skinId]:subs};
                        });
                      } else {
                        setBracketSubs(prev=>{
                          const sb={...(prev[vote.skinId]||{})};
                          const arr=[...(sb[vote.bracketId]||[])];
                          if(arr[vote.subIdx]) arr[vote.subIdx]={...arr[vote.subIdx],flagged:false};
                          sb[vote.bracketId]=arr;
                          return {...prev,[vote.skinId]:sb};
                        });
                      }
                      setCommunityVotes(cv=>({...cv,[vote.id]:{...cv[vote.id],resolved:true,resolvedAt:now,overriddenBy:"AdminUser",overrideResult:"keep"}}));
                      log(`Admin overrode community vote on ${skin?skinLabel(skin):vote.skinId} — forced KEEP`);
                    }}/>
                    <ActionBtn label="✕ Force Reject" color="#f87171" onClick={()=>{
                      setCommunityVotes(cv=>({...cv,[vote.id]:{...cv[vote.id],resolved:true,resolvedAt:now,overriddenBy:"AdminUser",overrideResult:"reject"}}));
                      log(`Admin overrode community vote on ${skin?skinLabel(skin):vote.skinId} — forced REJECT`);
                    }}/>
                  </div>
                </div>
              </Row>
            );
          })}

          {/* Resolved votes history */}
          {Object.values(communityVotes||{}).filter(v=>v.resolved).length > 0 && (
            <div style={{marginTop:20}}>
              <div style={{fontSize:10,fontWeight:700,color:"#444",textTransform:"uppercase",letterSpacing:"0.07em",marginBottom:10}}>Resolved Votes</div>
              {Object.values(communityVotes||{}).filter(v=>v.resolved).map(vote=>{
                const skin = allSkins.find(s=>s.id===vote.skinId);
                const total = vote.keep.length + vote.reject.length;
                const kept  = vote.overrideResult==="keep" || (!vote.overrideResult && total>=MIN_VOTES && vote.keep.length>vote.reject.length);
                return (
                  <Row key={vote.id} accent={kept?"rgba(74,222,128,0.08)":"rgba(248,113,113,0.08)"}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:8}}>
                      <div>
                        <div style={{fontSize:13,fontWeight:600,color:"#e0e0e0",marginBottom:2}}>
                          {skin?skinLabel(skin):vote.skinId} — {fmt(vote.value)} coins
                        </div>
                        <div style={{fontSize:11,color:"#555"}}>
                          {vote.overrideResult ? `Admin override: ${vote.overrideResult}` : `${total} votes · ${vote.keep.length} keep / ${vote.reject.length} reject`}
                        </div>
                      </div>
                      <span style={{background:kept?"rgba(74,222,128,0.12)":"rgba(248,113,113,0.12)",color:kept?"#4ade80":"#f87171",border:`1px solid ${kept?"rgba(74,222,128,0.3)":"rgba(248,113,113,0.3)"}`,borderRadius:99,fontSize:10,fontWeight:700,padding:"2px 10px"}}>
                        {kept?"✓ Kept":"✕ Rejected"}
                      </span>
                    </div>
                  </Row>
                );
              })}
            </div>
          )}
        </div>
      )}

      {/* ── TRADER REQUESTS ── */}
      {activeSection==="traderrequests" && (
        <div>
          <div style={{fontSize:10,fontWeight:700,color:"#555",textTransform:"uppercase",letterSpacing:"0.07em",marginBottom:6}}>Trusted Trader Applications</div>
          <div style={{fontSize:12,color:"#444",marginBottom:16,lineHeight:1.6}}>
            Members who meet the minimum requirements (50+ rep, 14+ days, 1+ forum post) can apply for Trusted Trader status. Approving grants them submission privileges.
          </div>

          {/* Pending requests */}
          {traderRequests.filter(r=>r.status==="pending").length === 0
            ? <EmptyState msg="No pending trader applications"/>
            : traderRequests.filter(r=>r.status==="pending").map(req => {
              const p = profiles[req.username];
              return (
                <Row key={req.id} accent="rgba(168,85,247,0.12)">
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:12}}>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:8,flexWrap:"wrap"}}>
                        {p && <Avatar profile={p} size={36}/>}
                        <div>
                          <button onClick={()=>onViewProfile(req.username)} style={{background:"none",border:"none",color:"#f97316",cursor:"pointer",fontFamily:"inherit",fontSize:14,fontWeight:700,padding:0,marginBottom:2,display:"block"}}>{req.username}</button>
                          <div style={{fontSize:11,color:"#555"}}>Applied {req.requestedAt}</div>
                        </div>
                      </div>
                      {/* Stats */}
                      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8,marginBottom:8}}>
                        {[
                          { label:"Reputation", value:req.reputation, color:req.reputation>=50?"#4ade80":"#f87171", req:50 },
                          { label:"Member age", value:`${req.joinedDaysAgo}d`, color:req.joinedDaysAgo>=14?"#4ade80":"#f87171", req:"14d" },
                          { label:"Forum posts", value:req.posts, color:req.posts>=1?"#4ade80":"#f87171", req:1 },
                        ].map(s=>(
                          <div key={s.label} style={{background:"#111",borderRadius:8,padding:"8px 10px",textAlign:"center"}}>
                            <div style={{fontSize:10,color:"#444",marginBottom:3}}>{s.label}</div>
                            <div style={{fontSize:14,fontWeight:800,color:s.color}}>{s.value}</div>
                            <div style={{fontSize:9,color:"#333"}}>min {s.req}</div>
                          </div>
                        ))}
                      </div>
                    </div>
                    {/* Actions */}
                    <div style={{display:"flex",flexDirection:"column",gap:6,flexShrink:0}}>
                      <ActionBtn label="✓ Approve" color="#4ade80" onClick={async ()=>{
                        setProfiles(prev=>({...prev,[req.username]:{...prev[req.username],role:"trader"}}));
                        setTraderRequests(prev=>prev.map(r=>r.id===req.id?{...r,status:"approved"}:r));
                        log(`Approved Trusted Trader application for ${req.username}`);
                        // Persist to Supabase
                        const { data: p } = await supabase.from("profiles").select("id").eq("username", req.username).single();
                        if (p) await supabase.from("profiles").update({ role:"trader", badge:"Trusted Trader" }).eq("id", p.id);
                        await supabase.from("trader_requests").update({ status:"approved", resolved_at: new Date().toISOString() }).eq("id", req.id);
                      }}/>
                      <ActionBtn label="✕ Deny" color="#f87171" onClick={async ()=>{
                        setTraderRequests(prev=>prev.map(r=>r.id===req.id?{...r,status:"denied"}:r));
                        log(`Denied Trusted Trader application for ${req.username}`);
                        await supabase.from("trader_requests").update({ status:"denied", resolved_at: new Date().toISOString() }).eq("id", req.id);
                      }}/>
                    </div>
                  </div>
                </Row>
              );
          })}

          {/* Past decisions */}
          {traderRequests.filter(r=>r.status!=="pending").length > 0 && (
            <div style={{marginTop:20}}>
              <div style={{fontSize:10,fontWeight:700,color:"#444",textTransform:"uppercase",letterSpacing:"0.07em",marginBottom:10}}>Past Decisions</div>
              {traderRequests.filter(r=>r.status!=="pending").map(req=>(
                <Row key={req.id} accent={req.status==="approved"?"rgba(74,222,128,0.06)":"rgba(248,113,113,0.06)"}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:8}}>
                    <div>
                      <div style={{fontSize:13,fontWeight:600,color:"#e0e0e0",marginBottom:2}}>{req.username}</div>
                      <div style={{fontSize:11,color:"#555"}}>Applied {req.requestedAt} · Rep {req.reputation}</div>
                    </div>
                    <span style={{
                      background:req.status==="approved"?"rgba(74,222,128,0.12)":"rgba(248,113,113,0.12)",
                      color:req.status==="approved"?"#4ade80":"#f87171",
                      border:`1px solid ${req.status==="approved"?"rgba(74,222,128,0.3)":"rgba(248,113,113,0.3)"}`,
                      borderRadius:99,fontSize:10,fontWeight:700,padding:"2px 10px"
                    }}>{req.status==="approved"?"✓ Approved":"✕ Denied"}</span>
                  </div>
                </Row>
              ))}
            </div>
          )}
        </div>
      )}

      {/* ── PRICE ALERTS (spikes) ── */}
      {activeSection==="spikes" && (
        <div>
          <div style={{fontSize:10,fontWeight:700,color:"#555",textTransform:"uppercase",letterSpacing:"0.07em",marginBottom:14}}>
            Skins with price movement {'>'}{Math.round(SPIKE_THRESHOLD*100)}% between last two snapshots
          </div>
          {spikes.length===0 ? <EmptyState msg="No price spikes detected"/> : spikes.map(({skin,prev,curr,pct})=>{
            const up = pct>0;
            return (
              <Row key={skin.id} accent={up?"rgba(74,222,128,0.15)":"rgba(248,113,113,0.15)"}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:10}}>
                  <div>
                    <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
                      <span style={{fontSize:18}}>{skin.emoji}</span>
                      <span style={{fontSize:14,fontWeight:700,color:"#f0f0f0"}}>{skinLabel(skin)}</span>
                      <span style={{background:up?"rgba(74,222,128,0.12)":"rgba(248,113,113,0.12)",border:`1px solid ${up?"rgba(74,222,128,0.3)":"rgba(248,113,113,0.3)"}`,borderRadius:99,fontSize:10,fontWeight:700,color:up?"#4ade80":"#f87171",padding:"1px 8px"}}>{up?"📈":"📉"} {up?"+":""}{(pct*100).toFixed(1)}%</span>
                    </div>
                    <div style={{display:"flex",gap:20,flexWrap:"wrap"}}>
                      <div>
                        <div style={{fontSize:10,color:"#555",marginBottom:2}}>Previous</div>
                        <div style={{fontSize:15,fontWeight:700,color:"#888"}}>{fmt(prev)}</div>
                      </div>
                      <div style={{fontSize:18,color:"#444",alignSelf:"flex-end",paddingBottom:2}}>→</div>
                      <div>
                        <div style={{fontSize:10,color:"#555",marginBottom:2}}>Current</div>
                        <div style={{fontSize:15,fontWeight:800,color:up?"#4ade80":"#f87171"}}>{fmt(curr)}</div>
                      </div>
                      <div>
                        <div style={{fontSize:10,color:"#555",marginBottom:2}}>Rarity</div>
                        <div style={{fontSize:12,fontWeight:600,color:RARITY_COLOR[skin.rarity]}}>{skin.rarity}</div>
                      </div>
                    </div>
                  </div>
                  <div style={{display:"flex",gap:8,alignItems:"center"}}>
                    <ActionBtn label="🔒 Freeze"  color="#60a5fa" onClick={()=>{setFrozen(prev=>({...prev,[skin.id]:true}));setDismissed(d=>new Set([...d,skin.id]));log(`Froze ${skin.name} due to ${(pct*100).toFixed(1)}% price spike`);}}/>
                    <ActionBtn label="Dismiss"    color="#666"    onClick={()=>{setDismissed(d=>new Set([...d,skin.id]));log(`Dismissed spike alert for ${skin.name}`);}}/>
                  </div>
                </div>
              </Row>
            );
          })}
        </div>
      )}

      {/* ── DISPUTE QUEUE ── */}
      {activeSection==="disputes" && (
        <div>
          <div style={{fontSize:10,fontWeight:700,color:"#555",textTransform:"uppercase",letterSpacing:"0.07em",marginBottom:14}}>
            Community-submitted value disputes
          </div>
          {allDisputes.length===0 ? <EmptyState msg="No open disputes"/> : allDisputes.map(d=>{
            const skin = allSkins.find(s=>s.id===d.skinId);
            return (
              <Row key={`${d.skinId}-${d.idx}`} accent="rgba(249,115,22,0.2)">
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:10}}>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
                      <span style={{fontSize:18}}>{skin?.emoji}</span>
                      <span style={{fontSize:14,fontWeight:700,color:"#f0f0f0"}}>{skin?.name}</span>
                      {skin?.val&&<span style={{fontSize:11,color:"#555"}}>Current avg: <strong style={{color:"#ccc"}}>{fmt(skin.val.avg)}</strong></span>}
                    </div>
                    <div style={{fontSize:13,color:"#aaa",lineHeight:1.6,marginBottom:6}}>"{d.reason}"</div>
                    <div style={{fontSize:11,color:"#555"}}>
                      By <button onClick={()=>onViewProfile(d.user)} style={{background:"none",border:"none",color:"#f97316",cursor:"pointer",fontFamily:"inherit",fontSize:11,fontWeight:600,padding:0}}>{d.user}</button>
                      {" · "}{d.time}
                    </div>
                  </div>
                  <div style={{display:"flex",gap:8,alignItems:"center",flexShrink:0}}>
                    <ActionBtn label="🔒 Freeze skin" color="#60a5fa" onClick={()=>{setFrozen(prev=>({...prev,[d.skinId]:true}));resolveDispute(d.skinId,d.idx,"freeze");}}/>
                    <ActionBtn label="✓ Resolve"    color="#4ade80" onClick={()=>resolveDispute(d.skinId,d.idx,"confirm")}/>
                    <ActionBtn label="Dismiss"      color="#666"    onClick={()=>resolveDispute(d.skinId,d.idx,"dismiss")}/>
                  </div>
                </div>
              </Row>
            );
          })}
        </div>
      )}

      {/* ── REPORTED POSTS ── */}
      {activeSection==="reports" && (
        <div>
          <div style={{fontSize:10,fontWeight:700,color:"#555",textTransform:"uppercase",letterSpacing:"0.07em",marginBottom:14}}>
            User-reported forum posts
          </div>
          {reportedPosts.length===0 ? <EmptyState msg="No reported posts"/> : reportedPosts.map(r=>{
            const post = forumPosts.find(p=>p.id===r.postId);
            return (
              <Row key={r.id} accent="rgba(248,113,113,0.2)">
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:10}}>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6,flexWrap:"wrap"}}>
                      <span style={{background:post?TAG_COLOR[post.tag]+"22":"#1a1a1a",border:`1px solid ${post?TAG_COLOR[post.tag]+"44":"#252525"}`,borderRadius:6,fontSize:10,fontWeight:700,color:post?TAG_COLOR[post.tag]:"#555",padding:"2px 7px"}}>{post?.tag||"Unknown"}</span>
                      <span style={{fontSize:13,fontWeight:700,color:"#f0f0f0"}}>{post?.title||"[Post removed]"}</span>
                    </div>
                    {post&&<div style={{fontSize:12,color:"#555",marginBottom:6,lineHeight:1.5}}>By <strong style={{color:"#888"}}>{post.user}</strong> · {post.replies} replies</div>}
                    <div style={{background:"rgba(248,113,113,0.06)",border:"1px solid rgba(248,113,113,0.15)",borderRadius:8,padding:"8px 12px",fontSize:12,color:"#aaa",marginBottom:6}}>
                      <strong style={{color:"#f87171"}}>Report reason:</strong> {r.reason}
                    </div>
                    <div style={{fontSize:11,color:"#555"}}>
                      Reported by <button onClick={()=>onViewProfile(r.reportedBy)} style={{background:"none",border:"none",color:"#f97316",cursor:"pointer",fontFamily:"inherit",fontSize:11,fontWeight:600,padding:0}}>{r.reportedBy}</button>
                      {" · "}{r.time}
                    </div>
                  </div>
                  <div style={{display:"flex",gap:8,alignItems:"center",flexShrink:0}}>
                    <ActionBtn label="📌 Pin post"     color="#f97316" onClick={()=>{setForumPosts(prev=>prev.map(p=>p.id===r.postId?{...p,pinned:!p.pinned}:p));log(`${forumPosts.find(p=>p.id===r.postId)?.pinned?"Unpinned":"Pinned"} post "${forumPosts.find(p=>p.id===r.postId)?.title?.slice(0,30)}"`);}}/>
                    <ActionBtn label="🗑 Remove post" color="#f87171" onClick={()=>dismissReport(r.id,"remove")}/>
                    <ActionBtn label="Dismiss"        color="#666"    onClick={()=>dismissReport(r.id,"keep")}/>
                  </div>
                </div>
              </Row>
            );
          })}
        </div>
      )}

      {/* ── SCAM REPORTS ── */}
      {activeSection==="scamreports" && (
        <div>
          <div style={{fontSize:10,fontWeight:700,color:"#555",textTransform:"uppercase",letterSpacing:"0.07em",marginBottom:6}}>Pending Scam Reports</div>
          <div style={{fontSize:12,color:"#444",marginBottom:16,lineHeight:1.6}}>Review user-submitted scam reports. Approving a report adds the user to the public confirmed scammers list.</div>

          {scamReports.length===0 ? <EmptyState msg="No pending scam reports"/> : scamReports.map(r=>(
            <Row key={r.id} accent="rgba(248,113,113,0.15)">
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:12}}>
                <div style={{flex:1,minWidth:0}}>
                  {/* Header */}
                  <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8,flexWrap:"wrap"}}>
                    <span style={{fontSize:20}}>🚨</span>
                    <div>
                      <div style={{fontSize:14,fontWeight:700,color:"#f0f0f0"}}>
                        Report against: <span style={{color:"#f87171"}}>{r.accusedUsername}</span>
                      </div>
                      <div style={{fontSize:11,color:"#555"}}>Reported by <span style={{color:"#f97316",cursor:"pointer"}} onClick={()=>onViewProfile(r.reportedBy)}>{r.reportedBy}</span> · {r.time}</div>
                    </div>
                  </div>
                  {/* Roblox username if provided */}
                  {r.robloxUsername && (
                    <div style={{fontSize:12,color:"#666",marginBottom:3}}>
                      Roblox: <span style={{color:"#aaa",fontWeight:600}}>{r.robloxUsername}</span>
                    </div>
                  )}
                  {r.discordUsername && (
                    <div style={{fontSize:12,color:"#666",marginBottom:6}}>
                      Discord: <span style={{color:"#aaa",fontWeight:600}}>{r.discordUsername}</span>
                    </div>
                  )}
                  {/* Description */}
                  <div style={{background:"rgba(248,113,113,0.06)",border:"1px solid rgba(248,113,113,0.15)",borderRadius:8,padding:"10px 12px",fontSize:12,color:"#aaa",marginBottom:8,lineHeight:1.6}}>
                    <strong style={{color:"#f87171",display:"block",marginBottom:4}}>Description:</strong>
                    {r.description}
                  </div>
                  {/* Photos */}
                  {r.photos?.length > 0 && (
                    <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:8}}>
                      {r.photos.map((src,i)=>(
                        <img key={i} src={src} alt={`Evidence ${i+1}`}
                          style={{width:80,height:60,objectFit:"cover",borderRadius:6,border:"1px solid #252525",cursor:"pointer"}}
                          onClick={()=>window.open(src,"_blank")}/>
                      ))}
                    </div>
                  )}
                </div>
                {/* Actions */}
                <div style={{display:"flex",flexDirection:"column",gap:8,flexShrink:0}}>
                  <ActionBtn label="✓ Confirm Scammer" color="#f87171" onClick={async ()=>{
                    const confirmed = {
                      id:`sc_${Date.now()}`,
                      username: r.accusedUsername,
                      robloxUsername: r.robloxUsername||"",
                      discordUsername: r.discordUsername||"",
                      description: r.description,
                      photos: r.photos||[],
                      reportedBy: r.reportedBy,
                      confirmedAt: new Date().toLocaleDateString("en-GB",{day:"numeric",month:"short",year:"numeric"}),
                    };
                    setConfirmedScammers(prev=>[confirmed,...prev]);
                    setScamReports(prev=>prev.filter(x=>x.id!==r.id));
                    log(`Confirmed scam report — ${r.accusedUsername} added to scammer list`);
                    // Persist to Supabase
                    await supabase.from("confirmed_scammers").insert({
                      username: r.accusedUsername,
                      roblox_username: r.robloxUsername||"",
                      discord_username: r.discordUsername||"",
                      description: r.description,
                      photo_urls: r.photos||[],
                      reported_by: r.reportedBy,
                    });
                    await supabase.from("scam_reports").update({ status:"approved" }).eq("id", r.id);
                  }}/>
                  <ActionBtn label="✕ Deny" color="#666" onClick={async ()=>{
                    setScamReports(prev=>prev.filter(x=>x.id!==r.id));
                    log(`Denied scam report against ${r.accusedUsername}`);
                    await supabase.from("scam_reports").update({ status:"denied" }).eq("id", r.id);
                  }}/>
                </div>
              </div>
            </Row>
          ))}

          {/* Confirmed scammers list */}
          {confirmedScammers.length > 0 && (
            <div style={{marginTop:24}}>
              <div style={{fontSize:10,fontWeight:700,color:"#555",textTransform:"uppercase",letterSpacing:"0.07em",marginBottom:12}}>Confirmed Scammers ({confirmedScammers.length})</div>
              {confirmedScammers.map(s=>(
                <Row key={s.id} accent="rgba(248,113,113,0.08)">
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:8}}>
                    <div>
                      <div style={{fontSize:13,fontWeight:700,color:"#f87171",marginBottom:2}}>{s.username}</div>
                      {s.robloxUsername && <div style={{fontSize:11,color:"#555"}}>Roblox: {s.robloxUsername}</div>}
                      <div style={{fontSize:11,color:"#444",marginTop:2}}>Confirmed {s.confirmedAt} · reported by {s.reportedBy}</div>
                    </div>

      {activeSection==="log" && (
