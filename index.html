function GifPicker({ onSelect, onClose }) {
  const [q,     setQ]     = useState("");
  const [gifs,  setGifs]  = useState([]);
  const [loading,setLoad] = useState(false);
  const tenor = "AIzaSyDummyKeyForDemo"; // replaced by real key in prod

  // Use placeholder gifs since we can't call Tenor without a key
  const PLACEHOLDER_GIFS = [
    { id:"g1", url:"https://media.tenor.com/images/placeholder1/tenor.gif", preview:"https://via.placeholder.com/150x100/1a1a1a/f97316?text=GIF+1" },
  ];

  const search = async (term) => {
    setLoad(true);
    try {
      // Tenor API — works with a real key; falls back to stubs here
      const r = await fetch(`https://tenor.googleapis.com/v2/search?q=${encodeURIComponent(term||"gaming")}&key=AIzaSyC7P2aNzS4MCsHxuXq_tJUzRCuaAflXBpQ&limit=20&media_filter=gif`);
      const d = await r.json();
      if (d.results?.length) {
        setGifs(d.results.map(g=>({ id:g.id, url:g.media_formats?.gif?.url, preview:g.media_formats?.tinygif?.url||g.media_formats?.gif?.url, dims:g.media_formats?.tinygif?.dims })));
      } else setGifs([]);
    } catch {
      setGifs([]);
    }
    setLoad(false);
  };

  useEffect(()=>{ search("gaming reaction"); }, []);

  const inp = {background:"#111",border:"1px solid #252525",borderRadius:10,color:"#e0e0e0",fontFamily:"inherit",fontSize:13,padding:"9px 13px",outline:"none",width:"100%"};

  return (
    <div style={{position:"absolute",bottom:"calc(100% + 8px)",left:0,zIndex:300,background:"#161616",border:"1px solid #252525",borderRadius:16,width:340,boxShadow:"0 16px 48px rgba(0,0,0,0.7)",overflow:"hidden"}}>
      <div style={{padding:"12px 12px 8px",borderBottom:"1px solid #1e1e1e",display:"flex",gap:8,alignItems:"center"}}>
        <input autoFocus value={q} onChange={e=>setQ(e.target.value)} onKeyDown={e=>e.key==="Enter"&&search(q)}
          placeholder="Search GIFs…" style={{...inp,flex:1,padding:"7px 11px"}}/>
        <button onClick={()=>search(q)} style={{background:"#f97316",border:"none",borderRadius:8,color:"#000",cursor:"pointer",fontFamily:"inherit",fontSize:12,fontWeight:700,padding:"7px 12px"}}>Go</button>
        <button onClick={onClose} style={{background:"none",border:"none",color:"#555",cursor:"pointer",fontSize:16,lineHeight:1,padding:4}}>✕</button>
      </div>
      <div style={{height:260,overflowY:"auto",padding:8}}>
        {loading && <div style={{textAlign:"center",padding:"40px 0",color:"#444",fontSize:12}}>Searching…</div>}
        {!loading && gifs.length===0 && <div style={{textAlign:"center",padding:"40px 0",color:"#444",fontSize:12}}>No results. Try another search.</div>}
        {!loading && (
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:4}}>
            {gifs.map(g=>(
              <img key={g.id} src={g.preview} alt="gif" onClick={()=>onSelect(g.url)}
                style={{width:"100%",aspectRatio:"4/3",objectFit:"cover",borderRadius:8,cursor:"pointer",border:"2px solid transparent",transition:"border-color 0.12s"}}
                onMouseEnter={e=>e.currentTarget.style.borderColor="#f97316"}
                onMouseLeave={e=>e.currentTarget.style.borderColor="transparent"}
                onError={e=>{ e.currentTarget.style.display="none"; }}
              />
            ))}
          </div>
        )}
      </div>
      <div style={{padding:"6px 12px",background:"#111",fontSize:10,color:"#333",textAlign:"right"}}>Powered by Tenor</div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
//  REACTION BAR
// ─────────────────────────────────────────────────────────────
function ReactionBar({ targetId, reactions, currentUser, onReact }) {
  const [showPicker, setShowPicker] = useState(false);
  const counts = reactions[targetId] || {};

  return (
    <div style={{display:"flex",gap:4,alignItems:"center",flexWrap:"wrap",position:"relative"}}>
      {EMOJI_REACTIONS.map(emoji => {
        const users = counts[emoji] || [];
        if (users.length === 0 && !showPicker) return null;
        const reacted = currentUser && users.includes(currentUser.username);
        return (
          <button key={emoji} onClick={()=>currentUser&&onReact(targetId,emoji)}
            style={{background:reacted?"rgba(249,115,22,0.15)":"#1a1a1a",border:`1px solid ${reacted?"#f9731660":"#252525"}`,borderRadius:99,padding:"3px 10px",cursor:currentUser?"pointer":"default",fontFamily:"inherit",fontSize:12,color:reacted?"#f97316":"#888",display:"flex",alignItems:"center",gap:5,transition:"all 0.15s"}}
            onMouseEnter={e=>{if(currentUser){e.currentTarget.style.borderColor="#f97316";e.currentTarget.style.background="rgba(249,115,22,0.1)";}}}
            onMouseLeave={e=>{if(!reacted){e.currentTarget.style.borderColor="#252525";e.currentTarget.style.background="#1a1a1a";}}}>
            <span>{emoji}</span>
            {users.length>0&&<span style={{fontSize:11,fontWeight:700}}>{users.length}</span>}
          </button>
        );
      })}
      {/* Add reaction button */}
      {currentUser && (
        <button onClick={()=>setShowPicker(p=>!p)}
          style={{background:"#1a1a1a",border:"1px solid #252525",borderRadius:99,padding:"3px 10px",cursor:"pointer",fontSize:13,color:"#555",transition:"all 0.15s",lineHeight:1}}
          onMouseEnter={e=>{e.currentTarget.style.borderColor="#f97316";e.currentTarget.style.color="#f97316";}}
          onMouseLeave={e=>{e.currentTarget.style.borderColor="#252525";e.currentTarget.style.color="#555";}}>
          {showPicker?"✕":"＋"}
        </button>
      )}
      {showPicker && (
        <div style={{position:"absolute",bottom:"calc(100% + 6px)",left:0,background:"#1a1a1a",border:"1px solid #252525",borderRadius:12,padding:"8px 10px",display:"flex",gap:6,zIndex:50,boxShadow:"0 8px 24px rgba(0,0,0,0.5)"}}>
          {EMOJI_REACTIONS.map(e=>(
            <button key={e} onClick={()=>{onReact(targetId,e);setShowPicker(false);}}
              style={{background:"none",border:"none",fontSize:20,cursor:"pointer",borderRadius:8,padding:"4px 6px",transition:"background 0.1s"}}
              onMouseEnter={e2=>e2.currentTarget.style.background="#252525"}
              onMouseLeave={e2=>e2.currentTarget.style.background="none"}>{e}</button>
          ))}
        </div>
      )}
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
//  REPLY COMPOSER
// ─────────────────────────────────────────────────────────────
function ReplyComposer({ currentUser, onSubmit, profiles }) {
  const [text,       setText]       = useState("");
  const [image,      setImage]      = useState(null); // base64
  const [imagePreview, setImagePreview] = useState(null);
  const [gif,        setGif]        = useState(null); // url string
  const [showGif,    setShowGif]    = useState(false);
  const fileRef = useRef(null);

  const handleImage = e => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => { setImage(ev.target.result); setImagePreview(ev.target.result); };
    reader.readAsDataURL(file);
  };

  const handleSubmit = () => {
    if (!text.trim() && !image && !gif) return;
    onSubmit({ body:text, image, gif });
    setText(""); setImage(null); setImagePreview(null); setGif(null);
  };

  const profile = profiles[currentUser?.username];

  const inp = {background:"#111",border:"1px solid #1e1e1e",borderRadius:12,color:"#e0e0e0",fontFamily:"inherit",fontSize:13,fontWeight:500,padding:"12px 14px",outline:"none",width:"100%",resize:"none",lineHeight:1.6,transition:"border-color 0.2s"};

  return (
    <div style={{display:"flex",gap:12,alignItems:"flex-start"}}>
      <div style={{flexShrink:0,marginTop:4}}><Avatar profile={profile||currentUser} size={36}/></div>
      <div style={{flex:1}}>
        <textarea value={text} onChange={e=>setText(e.target.value.slice(0,10000))} rows={3}
          placeholder="Write a reply…" style={inp}
          onFocus={e=>e.target.style.borderColor="#f9731660"}
          onBlur={e=>e.target.style.borderColor="#1e1e1e"}/>

        {/* Attachment previews */}
        {(imagePreview||gif) && (
          <div style={{marginTop:8,display:"flex",gap:8,flexWrap:"wrap"}}>
            {imagePreview && (
              <div style={{position:"relative",display:"inline-block"}}>
                <img src={imagePreview} alt="attachment" style={{height:120,borderRadius:10,objectFit:"cover",border:"1px solid #252525"}}/>
                <button onClick={()=>{setImage(null);setImagePreview(null);}} style={{position:"absolute",top:4,right:4,background:"rgba(0,0,0,0.7)",border:"none",borderRadius:"50%",color:"#fff",cursor:"pointer",fontSize:12,width:22,height:22,display:"flex",alignItems:"center",justifyContent:"center"}}>✕</button>
                <span style={{position:"absolute",bottom:6,left:8,background:"rgba(0,0,0,0.6)",borderRadius:6,fontSize:10,color:"#ccc",padding:"2px 6px"}}>📎 Image</span>
              </div>
            )}
            {gif && (
              <div style={{position:"relative",display:"inline-block"}}>
                <img src={gif} alt="gif" style={{height:120,borderRadius:10,objectFit:"cover",border:"1px solid #252525"}}/>
                <button onClick={()=>setGif(null)} style={{position:"absolute",top:4,right:4,background:"rgba(0,0,0,0.7)",border:"none",borderRadius:"50%",color:"#fff",cursor:"pointer",fontSize:12,width:22,height:22,display:"flex",alignItems:"center",justifyContent:"center"}}>✕</button>
                <span style={{position:"absolute",bottom:6,left:8,background:"rgba(0,0,0,0.6)",borderRadius:6,fontSize:10,color:"#ccc",padding:"2px 6px"}}>GIF</span>
              </div>
            )}
          </div>
        )}

        {/* Toolbar + submit */}
        <div style={{marginTop:10,display:"flex",alignItems:"center",gap:8,position:"relative"}}>
          <input ref={fileRef} type="file" accept="image/*" style={{display:"none"}} onChange={handleImage}/>
          <Tip content="Attach an image">
            <button onClick={()=>fileRef.current.click()} style={{background:"#1a1a1a",border:"1px solid #252525",borderRadius:8,color:"#666",cursor:"pointer",fontSize:16,padding:"6px 10px",lineHeight:1,transition:"all 0.15s"}}
              onMouseEnter={e=>{e.currentTarget.style.borderColor="#f97316";e.currentTarget.style.color="#f97316";}}
              onMouseLeave={e=>{e.currentTarget.style.borderColor="#252525";e.currentTarget.style.color="#666";}}>📎</button>
          </Tip>
          <Tip content="Add a GIF">
            <button onClick={()=>setShowGif(s=>!s)} style={{background:showGif?"rgba(249,115,22,0.1)":"#1a1a1a",border:`1px solid ${showGif?"#f97316":"#252525"}`,borderRadius:8,color:showGif?"#f97316":"#666",cursor:"pointer",fontSize:13,fontWeight:700,padding:"6px 10px",lineHeight:1,transition:"all 0.15s"}}>GIF</button>
          </Tip>

          {showGif && <GifPicker onSelect={url=>{setGif(url);setShowGif(false);}} onClose={()=>setShowGif(false)}/>}

          <div style={{flex:1}}/>
          <button onClick={handleSubmit} disabled={!text.trim()&&!image&&!gif}
            style={{background:(!text.trim()&&!image&&!gif)?"#1a1a1a":"linear-gradient(135deg,#f97316,#c2410c)",border:"none",borderRadius:10,color:(!text.trim()&&!image&&!gif)?"#444":"#000",cursor:(!text.trim()&&!image&&!gif)?"default":"pointer",fontFamily:"inherit",fontSize:13,fontWeight:700,padding:"8px 20px",transition:"all 0.15s"}}>
            Reply
          </button>
        </div>
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
//  POST PAGE (full thread view)
// ─────────────────────────────────────────────────────────────
function PostPage({ post, replies, postReactions, replyReactions, currentUser, profiles, onBack, onAddReply, onReactPost, onReactReply, onViewProfile, onVotePoll, onPinPost }) {
  const tc = TAG_COLOR[post.tag]||"#666";
  const authorProfile = profiles[post.user];
  const [lightbox, setLightbox] = useState(null);

  const MediaAttachment = ({ image, gif }) => {
    const src = image || gif;
    if (!src) return null;
    return (
      <div style={{marginTop:12}}>
        <img src={src} alt={gif?"gif":"attachment"} onClick={()=>setLightbox(src)}
          style={{maxWidth:"100%",maxHeight:360,borderRadius:12,objectFit:"contain",border:"1px solid #1e1e1e",cursor:"zoom-in",display:"block"}}
          onError={e=>e.currentTarget.style.display="none"}/>
        {gif&&<div style={{fontSize:10,color:"#555",marginTop:4,fontWeight:600}}>GIF</div>}
      </div>
    );
  };

  // Poll component with live voting
  const PollWidget = ({ poll, postId }) => {
    if (!poll) return null;
    const votes = poll.votes || {};
    const totalVotes = Object.values(votes).reduce((a,arr)=>a+(arr?.length||0),0);
    const myVote = currentUser ? Object.entries(votes).find(([,arr])=>arr?.includes(currentUser.username))?.[0] : null;
    const hasVoted = !!myVote;

    return (
      <div style={{background:"#111",border:"1px solid #1e1e1e",borderRadius:14,padding:"16px",marginTop:16}}>
        <div style={{fontSize:13,fontWeight:700,color:"#e0e0e0",marginBottom:14,display:"flex",alignItems:"center",gap:8}}>
          <span style={{fontSize:16}}>📊</span> {poll.question}
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:8}}>
          {poll.options.map((opt,i) => {
            const count = votes[opt]?.length || 0;
            const pct   = totalVotes > 0 ? Math.round((count/totalVotes)*100) : 0;
            const isMyVote = myVote === opt;
            return (
              <button key={i} onClick={()=>!hasVoted&&currentUser&&onVotePoll(postId,opt)}
                disabled={hasVoted||!currentUser}
                style={{background:"transparent",border:`1px solid ${isMyVote?"#f97316":"#252525"}`,borderRadius:10,padding:0,cursor:hasVoted||!currentUser?"default":"pointer",overflow:"hidden",position:"relative",textAlign:"left",transition:"border-color 0.2s"}}
                onMouseEnter={e=>{if(!hasVoted&&currentUser)e.currentTarget.style.borderColor="#f9731660";}}
                onMouseLeave={e=>{if(!isMyVote)e.currentTarget.style.borderColor="#252525";}}>
                {/* Progress bar fill */}
                <div style={{position:"absolute",inset:0,width:`${pct}%`,background:isMyVote?"rgba(249,115,22,0.12)":"rgba(255,255,255,0.03)",borderRadius:10,transition:"width 0.5s ease"}}/>
                <div style={{position:"relative",display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 14px"}}>
                  <div style={{display:"flex",alignItems:"center",gap:8}}>
                    <div style={{width:16,height:16,borderRadius:"50%",border:`2px solid ${isMyVote?"#f97316":"#333"}`,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                      {isMyVote&&<div style={{width:8,height:8,borderRadius:"50%",background:"#f97316"}}/>}
                    </div>
                    <span style={{fontSize:13,color:isMyVote?"#f0f0f0":"#aaa",fontWeight:isMyVote?600:400}}>{opt}</span>
                  </div>
                  {hasVoted && <span style={{fontSize:12,fontWeight:700,color:isMyVote?"#f97316":"#555"}}>{pct}% <span style={{fontSize:11,fontWeight:400,color:"#444"}}>({count})</span></span>}
                </div>
              </button>
            );
          })}
        </div>
        <div style={{marginTop:10,fontSize:11,color:"#444",display:"flex",gap:12}}>
          <span>{totalVotes} vote{totalVotes!==1?"s":""}</span>
          {!currentUser&&<span>· Log in to vote</span>}
          {currentUser&&!hasVoted&&<span style={{color:"#f97316"}}>· Choose an option above</span>}
          {hasVoted&&<span style={{color:"#4ade80"}}>· ✓ You voted</span>}
        </div>
      </div>
    );
  };

  return (
    <div>
      {/* Lightbox */}
      {lightbox && (
        <div onClick={()=>setLightbox(null)} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.9)",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center",cursor:"zoom-out"}}>
          <img src={lightbox} alt="full" style={{maxWidth:"90vw",maxHeight:"90vh",borderRadius:12,objectFit:"contain"}}/>
        </div>
      )}

      <button onClick={onBack} style={{background:"none",border:"1px solid #252525",borderRadius:10,color:"#888",cursor:"pointer",fontFamily:"inherit",fontSize:13,fontWeight:600,padding:"7px 16px",marginBottom:24,transition:"color 0.15s"}}
        onMouseEnter={e=>e.currentTarget.style.color="#f97316"} onMouseLeave={e=>e.currentTarget.style.color="#888"}>
        ← Back to Forum
      </button>

      {/* Post header */}
      <Panel style={{marginBottom:14}}>
        <div style={{display:"flex",gap:8,flexWrap:"wrap",alignItems:"center",marginBottom:14,justifyContent:"space-between"}}>
          <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
            {post.pinned && <span style={{fontSize:9,fontWeight:700,color:"#f97316",background:"rgba(249,115,22,0.12)",border:"1px solid rgba(249,115,22,0.25)",borderRadius:4,padding:"2px 8px",textTransform:"uppercase",letterSpacing:"0.05em"}}>📌 Pinned</span>}
            <span style={{background:tc+"18",color:tc,border:`1px solid ${tc}35`,borderRadius:99,fontSize:11,fontWeight:700,padding:"3px 12px"}}>{post.tag}</span>
            <span style={{fontSize:12,color:"#444"}}>{post.time}</span>
            {post.views > 0 && <span style={{fontSize:11,color:"#333"}}>👁 {post.views} views</span>}
          </div>
          {currentUser?.role==="admin" && onPinPost && (
            <button onClick={()=>onPinPost(post.id)}
              style={{background:post.pinned?"rgba(249,115,22,0.12)":"#1a1a1a",border:`1px solid ${post.pinned?"rgba(249,115,22,0.3)":"#252525"}`,borderRadius:8,color:post.pinned?"#f97316":"#666",cursor:"pointer",fontFamily:"inherit",fontSize:11,fontWeight:700,padding:"4px 12px",transition:"all 0.15s"}}>
              {post.pinned ? "📌 Unpin" : "📌 Pin"}
            </button>
          )}
        </div>
        <h1 style={{fontFamily:"Syne,sans-serif",fontSize:22,fontWeight:800,color:"#fff",lineHeight:1.3,marginBottom:18}}>{post.title}</h1>

        {/* Author */}
        <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:20,paddingBottom:18,borderBottom:"1px solid #1a1a1a"}}>
          <Avatar profile={authorProfile} size={42} onClick={()=>onViewProfile(post.user)}/>
          <div>
            <button onClick={()=>onViewProfile(post.user)} style={{background:"none",border:"none",color:"#f97316",cursor:"pointer",fontFamily:"inherit",fontSize:14,fontWeight:700,padding:0,marginBottom:2,display:"block"}}>{post.user}</button>
            <div style={{display:"flex",gap:8,alignItems:"center"}}>
              {authorProfile&&<RoleBadge role={authorProfile.role}/>}
              {authorProfile&&<span style={{fontSize:11,color:"#555"}}>{authorProfile.joinedDaysAgo}d member</span>}
            </div>
          </div>
        </div>

        {/* Body */}
        {post.richText
          ? <div style={{fontSize:14,color:"#aaa",lineHeight:1.85,marginBottom:16}} dangerouslySetInnerHTML={{__html:sanitiseHTML(post.body)}}/>
          : <div style={{fontSize:14,color:"#aaa",lineHeight:1.85,whiteSpace:"pre-line",marginBottom:16}}>{post.body}</div>
        }

        {/* Post images */}
        {post.images?.length>0 && (
          <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:16}}>
            {post.images.map((img,i)=>(
              <img key={i} src={img.preview||img} alt={`img${i+1}`} onClick={()=>setLightbox(img.preview||img)}
                style={{height:180,borderRadius:12,objectFit:"cover",border:"1px solid #1e1e1e",cursor:"zoom-in",maxWidth:"100%"}}
                onError={e=>e.currentTarget.style.display="none"}/>
            ))}
          </div>
        )}

        {/* Poll */}
        <PollWidget poll={post.poll} postId={post.id}/>

        {/* Reactions on OP */}
        <ReactionBar targetId={String(post.id)} reactions={postReactions} currentUser={currentUser} onReact={onReactPost}/>
      </Panel>

      {/* Replies */}
      <div style={{marginBottom:14}}>
        <div style={{fontSize:12,fontWeight:700,color:"#555",textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:12}}>{replies.length} {replies.length===1?"Reply":"Replies"}</div>
        {replies.length===0&&<div style={{fontSize:13,color:"#333",padding:"24px 0",textAlign:"center"}}>No replies yet. Be the first!</div>}
        {replies.map((r,i)=>{
          const rp = profiles[r.user];
          return (
            <Panel key={r.id} style={{marginBottom:10,borderLeft:`3px solid ${i%2===0?"#f9731620":"#a855f720"}`}}>
              <div style={{display:"flex",gap:12,alignItems:"flex-start"}}>
                <Avatar profile={rp} size={36} onClick={()=>onViewProfile(r.user)}/>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{display:"flex",gap:10,alignItems:"center",marginBottom:8,flexWrap:"wrap"}}>
                    <button onClick={()=>onViewProfile(r.user)} style={{background:"none",border:"none",color:"#f97316",cursor:"pointer",fontFamily:"inherit",fontSize:13,fontWeight:700,padding:0}}>{r.user}</button>
                    {rp&&<RoleBadge role={rp.role}/>}
                    <span style={{fontSize:11,color:"#444"}}>{r.time}</span>
                  </div>
                  {r.body&&<div style={{fontSize:13,color:"#aaa",lineHeight:1.8,whiteSpace:"pre-line",marginBottom:8}}>{r.body}</div>}
                  <MediaAttachment image={r.image} gif={r.gif}/>
                  <div style={{marginTop:10}}>
                    <ReactionBar targetId={r.id} reactions={replyReactions} currentUser={currentUser} onReact={onReactReply}/>
                  </div>
                </div>
              </div>
            </Panel>
          );
        })}
      </div>

      {/* Reply composer */}
      <Panel>
        <div style={{fontSize:10,fontWeight:700,color:"#555",textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:14}}>
          {currentUser ? "Post a Reply" : "Log in to reply"}
        </div>
        {currentUser ? (
          <ReplyComposer currentUser={currentUser} profiles={profiles} onSubmit={data=>onAddReply(post.id, data)}/>
        ) : (
          <div style={{padding:"20px",textAlign:"center",background:"#111",borderRadius:12,fontSize:13,color:"#555"}}>
            You need to be logged in to reply to this post.
          </div>
        )}
      </Panel>
    </div>
  );
}
// ─────────────────────────────────────────────────────────────
//  RICH TEXT TOOLBAR
// ─────────────────────────────────────────────────────────────
const TEXT_COLORS = ["#ffffff","#f97316","#f87171","#fbbf24","#4ade80","#60a5fa","#a855f7","#e879f9","#34d399","#fb923c"];

function RichTextEditor({ value, onChange, placeholder="Write your post body here…", minHeight=200 }) {
  const editorRef = useRef(null);
  const [activeColor, setActiveColor] = useState("#ffffff");
  const [showColors, setShowColors] = useState(false);

  const exec = (cmd, val=null) => {
    editorRef.current.focus();
    document.execCommand(cmd, false, val);
  };

  const applyColor = (color) => {
    setActiveColor(color);
    setShowColors(false);
    exec("foreColor", color);
  };

  const handleInput = () => {
    const html = editorRef.current.innerHTML;
    if (html.length > 50000) {
      // Truncate to limit — rare edge case
      editorRef.current.innerHTML = html.slice(0, 50000);
      return;
    }
    if (onChange) onChange(html);
  };

  // Sync initial value
  useEffect(() => {
    if (editorRef.current && editorRef.current.innerHTML !== value) {
      editorRef.current.innerHTML = value || "";
    }
  }, []);

  const ToolBtn = ({ cmd, val=null, children, title, active=false }) => (
    <Tip content={title}>
      <button onMouseDown={e=>{e.preventDefault();exec(cmd,val);}}
        style={{background:active?"rgba(249,115,22,0.2)":"transparent",border:`1px solid ${active?"#f9731660":"#252525"}`,borderRadius:7,color:active?"#f97316":"#888",cursor:"pointer",fontFamily:"inherit",fontSize:13,fontWeight:700,padding:"5px 9px",lineHeight:1,transition:"all 0.12s",minWidth:30}}
        onMouseEnter={e=>{e.currentTarget.style.borderColor="#f97316";e.currentTarget.style.color="#f97316";}}
        onMouseLeave={e=>{if(!active){e.currentTarget.style.borderColor="#252525";e.currentTarget.style.color="#888";}}}>
        {children}
      </button>
    </Tip>
  );

  return (
    <div style={{border:"1px solid #1e1e1e",borderRadius:14,overflow:"hidden",background:"#0e0e0e",transition:"border-color 0.2s"}}
      onFocus={e=>e.currentTarget.style.borderColor="#f9731660"}
      onBlur={e=>e.currentTarget.style.borderColor="#1e1e1e"}>

      {/* Toolbar */}
      <div style={{display:"flex",gap:4,padding:"8px 10px",borderBottom:"1px solid #1a1a1a",background:"#141414",flexWrap:"wrap",alignItems:"center"}}>
        {/* Format */}
        <div style={{display:"flex",gap:3}}>
          <ToolBtn cmd="bold"   title="Bold (Ctrl+B)"><b>B</b></ToolBtn>
          <ToolBtn cmd="italic" title="Italic (Ctrl+I)"><i style={{fontStyle:"italic"}}>I</i></ToolBtn>
          <ToolBtn cmd="underline" title="Underline (Ctrl+U)"><u>U</u></ToolBtn>
          <ToolBtn cmd="strikeThrough" title="Strikethrough"><s>S</s></ToolBtn>
        </div>

        <div style={{width:1,height:22,background:"#252525",margin:"0 4px"}}/>

        {/* Align */}
        <div style={{display:"flex",gap:3}}>
          <ToolBtn cmd="justifyLeft"   title="Align left">⬅</ToolBtn>
          <ToolBtn cmd="justifyCenter" title="Center">↔</ToolBtn>
          <ToolBtn cmd="justifyRight"  title="Align right">➡</ToolBtn>
        </div>

        <div style={{width:1,height:22,background:"#252525",margin:"0 4px"}}/>

        {/* Lists */}
        <div style={{display:"flex",gap:3}}>
          <ToolBtn cmd="insertUnorderedList" title="Bullet list">• List</ToolBtn>
          <ToolBtn cmd="insertOrderedList"   title="Numbered list">1. List</ToolBtn>
        </div>

        <div style={{width:1,height:22,background:"#252525",margin:"0 4px"}}/>

        {/* Headings */}
        <div style={{display:"flex",gap:3}}>
          <ToolBtn cmd="formatBlock" val="H2" title="Heading">H2</ToolBtn>
          <ToolBtn cmd="formatBlock" val="P"  title="Paragraph">¶</ToolBtn>
        </div>

        <div style={{width:1,height:22,background:"#252525",margin:"0 4px"}}/>

        {/* Color picker */}
        <div style={{position:"relative"}}>
          <Tip content="Text colour">
            <button onMouseDown={e=>{e.preventDefault();setShowColors(s=>!s);}}
              style={{background:"transparent",border:"1px solid #252525",borderRadius:7,cursor:"pointer",padding:"4px 8px",display:"flex",alignItems:"center",gap:5,transition:"border-color 0.12s"}}
              onMouseEnter={e=>e.currentTarget.style.borderColor="#f97316"}
              onMouseLeave={e=>e.currentTarget.style.borderColor="#252525"}>
              <span style={{fontSize:13,fontWeight:700,color:activeColor,textShadow:"0 0 4px rgba(0,0,0,0.8)"}}>A</span>
              <div style={{width:14,height:4,borderRadius:2,background:activeColor}}/>
              <span style={{fontSize:10,color:"#555"}}>▾</span>
            </button>
          </Tip>
          {showColors && (
            <div style={{position:"absolute",top:"calc(100% + 6px)",left:0,background:"#1a1a1a",border:"1px solid #252525",borderRadius:12,padding:"10px",display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:5,zIndex:50,boxShadow:"0 8px 24px rgba(0,0,0,0.6)",minWidth:140}}>
              {TEXT_COLORS.map(c=>(
                <button key={c} onMouseDown={e=>{e.preventDefault();applyColor(c);}}
                  style={{width:22,height:22,borderRadius:6,background:c,border:activeColor===c?"2px solid #fff":"2px solid transparent",cursor:"pointer",transition:"transform 0.1s"}}
                  onMouseEnter={e=>e.currentTarget.style.transform="scale(1.2)"}
                  onMouseLeave={e=>e.currentTarget.style.transform="scale(1)"}/>
              ))}
            </div>
          )}
        </div>

        <div style={{width:1,height:22,background:"#252525",margin:"0 4px"}}/>

        {/* Clear */}
        <Tip content="Clear formatting">
          <button onMouseDown={e=>{e.preventDefault();exec("removeFormat");}}
            style={{background:"transparent",border:"1px solid #252525",borderRadius:7,color:"#555",cursor:"pointer",fontSize:11,fontWeight:600,padding:"5px 8px",transition:"all 0.12s"}}
            onMouseEnter={e=>{e.currentTarget.style.borderColor="#f87171";e.currentTarget.style.color="#f87171";}}
            onMouseLeave={e=>{e.currentTarget.style.borderColor="#252525";e.currentTarget.style.color="#555";}}>✕ Clear</button>
        </Tip>
      </div>

      {/* Editable area */}
      <div
        ref={editorRef}
        contentEditable
        suppressContentEditableWarning
        onInput={handleInput}
        data-placeholder={placeholder}
        style={{minHeight,padding:"16px",color:"#d0d0d0",fontSize:14,lineHeight:1.8,outline:"none",fontFamily:"'DM Sans',sans-serif",caretColor:"#f97316"}}
      />

      <style>{`
        [contenteditable]:empty:before{content:attr(data-placeholder);color:#333;pointer-events:none;}
        [contenteditable] h2{font-family:'Syne',sans-serif;font-size:18px;font-weight:800;color:#fff;margin:8px 0 4px;}
        [contenteditable] ul{padding-left:20px;margin:4px 0;}
        [contenteditable] ol{padding-left:20px;margin:4px 0;}
        [contenteditable] li{margin-bottom:3px;}
      `}</style>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
//  NEW POST PAGE
// ─────────────────────────────────────────────────────────────
function NewPostPage({ currentUser, profiles, onBack, onSubmit }) {
  const [title,       setTitle]       = useState("");
  const [bodyHtml,    setBodyHtml]    = useState("");
  const [tag,         setTag]         = useState("Discussion");
  const [images,      setImages]      = useState([]); // [{preview, data}] max 3
  const [poll,        setPoll]        = useState(null); // null | {question, options:[string]}
  const [pollQ,       setPollQ]       = useState("");
  const [pollOpts,    setPollOpts]    = useState(["",""]);
  const [showPollBuilder, setShowPollBuilder] = useState(false);
  const [errors,      setErrors]      = useState({});
  const fileRef = useRef(null);
  const profile = profiles[currentUser?.username];

  const tags = Object.keys(TAG_COLOR);

  const handleImages = e => {
    const files = Array.from(e.target.files).slice(0, 3 - images.length);
    files.forEach(file => {
      const reader = new FileReader();
      reader.onload = ev => {
        setImages(prev => prev.length < 3 ? [...prev, { preview: ev.target.result, data: ev.target.result }] : prev);
      };
      reader.readAsDataURL(file);
    });
    e.target.value = "";
  };

  const removeImage = idx => setImages(prev => prev.filter((_,i) => i !== idx));

  const addPollOption = () => { if (pollOpts.length < 6) setPollOpts(p => [...p, ""]); };
  const removePollOption = idx => { if (pollOpts.length > 2) setPollOpts(p => p.filter((_,i) => i !== idx)); };
  const updatePollOpt = (idx, val) => setPollOpts(p => p.map((o,i) => i===idx ? val : o));

  const confirmPoll = () => {
    const validOpts = pollOpts.map(o => o.trim()).filter(Boolean);
    if (!pollQ.trim() || validOpts.length < 2) return;
    setPoll({ question: pollQ.trim(), options: validOpts });
    setShowPollBuilder(false);
  };

  const validate = () => {
    const e = {};
    if (!title.trim()) e.title = "A title is required.";
    if (!bodyHtml.replace(/<[^>]*>/g,"").trim()) e.body = "Post body cannot be empty.";
    setErrors(e);
    return Object.keys(e).length === 0;
  };

  const handleSubmit = () => {
    if (!validate()) return;
    const newPost = {
      id: Date.now(),
      user: currentUser.username,
      title: title.trim(),
      body: bodyHtml,
      richText: true,
      tag,
      time: "just now",
      replies: 0,
      images,
      poll: poll ? { ...poll, votes: {} } : null,
    };
    onSubmit(newPost);
  };

  const inp = { background:"#111", border:"1px solid #1e1e1e", borderRadius:12, color:"#e0e0e0", fontFamily:"inherit", fontSize:14, fontWeight:500, padding:"11px 14px", outline:"none", width:"100%", transition:"border-color 0.2s" };

  return (
    <div>
      <button onClick={onBack} style={{background:"none",border:"1px solid #252525",borderRadius:10,color:"#888",cursor:"pointer",fontFamily:"inherit",fontSize:13,fontWeight:600,padding:"7px 16px",marginBottom:28,transition:"color 0.15s"}}
        onMouseEnter={e=>e.currentTarget.style.color="#f97316"} onMouseLeave={e=>e.currentTarget.style.color="#888"}>
        ← Back to Forum
      </button>

      <div style={{display:"grid",gridTemplateColumns:"1fr 300px",gap:20,alignItems:"start"}}>

        {/* Main editor */}
        <div style={{display:"flex",flexDirection:"column",gap:14}}>
          {/* Header */}
          <div>
            <div style={{fontFamily:"Syne,sans-serif",fontSize:22,fontWeight:800,color:"#fff",marginBottom:4}}>New Post</div>
            <div style={{fontSize:13,color:"#555"}}>Share your thoughts with the community.</div>
          </div>

          {/* Title */}
          <div>
            <div style={{fontSize:11,fontWeight:700,color:"#555",textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:8}}>Post Title *</div>
            <input value={title} onChange={e=>{setTitle(e.target.value.slice(0,300));setErrors(p=>({...p,title:null}));}}
              placeholder="Give your post a clear, descriptive title…"
              style={{...inp,fontSize:16,fontWeight:600,borderColor:errors.title?"#f87171":"#1e1e1e"}}
              onFocus={e=>e.target.style.borderColor=errors.title?"#f87171":"#f9731660"}
              onBlur={e=>e.target.style.borderColor=errors.title?"#f87171":"#1e1e1e"}
              maxLength={120}/>
            <div style={{display:"flex",justifyContent:"space-between",marginTop:5}}>
              {errors.title ? <span style={{fontSize:11,color:"#f87171"}}>⚠ {errors.title}</span> : <span/>}
              <span style={{fontSize:11,color:"#444"}}>{title.length}/120</span>
            </div>
          </div>

          {/* Body */}
          <div>
            <div style={{fontSize:11,fontWeight:700,color:"#555",textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:8}}>Body *</div>
            <RichTextEditor value={bodyHtml} onChange={v=>{setBodyHtml(v);setErrors(p=>({...p,body:null}));}} minHeight={220}/>
            {errors.body && <span style={{fontSize:11,color:"#f87171",marginTop:4,display:"block"}}>⚠ {errors.body}</span>}
          </div>

          {/* Image attachments */}
          <div>
            <div style={{fontSize:11,fontWeight:700,color:"#555",textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:8}}>
              Images <span style={{color:"#333",fontWeight:500,textTransform:"none"}}>— up to 3</span>
            </div>
            <input ref={fileRef} type="file" accept="image/*" multiple style={{display:"none"}} onChange={handleImages}/>
            <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
              {images.map((img,i) => (
                <div key={i} style={{position:"relative",width:140,height:100,borderRadius:12,overflow:"hidden",border:"1px solid #252525"}}>
                  <img src={img.preview} alt={`img ${i+1}`} style={{width:"100%",height:"100%",objectFit:"cover"}}/>
                  <button onClick={()=>removeImage(i)} style={{position:"absolute",top:5,right:5,background:"rgba(0,0,0,0.75)",border:"none",borderRadius:"50%",color:"#fff",cursor:"pointer",width:22,height:22,display:"flex",alignItems:"center",justifyContent:"center",fontSize:11}}>✕</button>
                  <div style={{position:"absolute",bottom:5,left:7,fontSize:10,color:"rgba(255,255,255,0.6)",fontWeight:600}}>#{i+1}</div>
                </div>
              ))}
              {images.length < 3 && (
                <button onClick={()=>fileRef.current.click()}
                  style={{width:140,height:100,borderRadius:12,border:"2px dashed #252525",background:"transparent",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:6,color:"#444",transition:"all 0.15s"}}
                  onMouseEnter={e=>{e.currentTarget.style.borderColor="#f97316";e.currentTarget.style.color="#f97316";}}
                  onMouseLeave={e=>{e.currentTarget.style.borderColor="#252525";e.currentTarget.style.color="#444";}}>
                  <span style={{fontSize:22}}>📎</span>
                  <span style={{fontSize:11,fontWeight:600}}>Add image</span>
                  <span style={{fontSize:10,color:"#333"}}>{images.length}/3</span>
                </button>
              )}
            </div>
          </div>

          {/* Poll builder */}
          <div>
            <div style={{fontSize:11,fontWeight:700,color:"#555",textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:8}}>Poll <span style={{color:"#333",fontWeight:500,textTransform:"none"}}>— optional</span></div>

            {poll ? (
              <div style={{background:"#111",border:"1px solid #1e1e1e",borderRadius:14,padding:"16px"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:12}}>
                  <div>
                    <div style={{fontSize:13,fontWeight:700,color:"#e0e0e0",marginBottom:6}}>{poll.question}</div>
                    <div style={{display:"flex",flexDirection:"column",gap:6}}>
                      {poll.options.map((o,i) => (
                        <div key={i} style={{display:"flex",alignItems:"center",gap:8}}>
                          <div style={{width:14,height:14,borderRadius:"50%",border:"2px solid #333"}}/>
                          <span style={{fontSize:13,color:"#888"}}>{o}</span>
                        </div>
                      ))}
                    </div>
                  </div>
                  <button onClick={()=>setPoll(null)} style={{background:"none",border:"1px solid #252525",borderRadius:8,color:"#f87171",cursor:"pointer",fontFamily:"inherit",fontSize:11,fontWeight:600,padding:"4px 10px"}}>Remove</button>
                </div>
                <div style={{fontSize:11,color:"#555"}}>✓ Poll attached · {poll.options.length} options</div>
              </div>
            ) : showPollBuilder ? (
              <div style={{background:"#111",border:"1px solid #1e1e1e",borderRadius:14,padding:"16px",display:"flex",flexDirection:"column",gap:10}}>
                <input value={pollQ} onChange={e=>setPollQ(e.target.value)} placeholder="Ask a question…"
                  style={{...inp,padding:"9px 13px"}}
                  onFocus={e=>e.target.style.borderColor="#f9731660"} onBlur={e=>e.target.style.borderColor="#1e1e1e"}/>
                {pollOpts.map((o,i) => (
                  <div key={i} style={{display:"flex",gap:8,alignItems:"center"}}>
                    <input value={o} onChange={e=>updatePollOpt(i,e.target.value)} placeholder={`Option ${i+1}`}
                      style={{...inp,padding:"8px 12px",flex:1}}
                      onFocus={e=>e.target.style.borderColor="#f9731660"} onBlur={e=>e.target.style.borderColor="#1e1e1e"}/>
                    {pollOpts.length>2&&<button onClick={()=>removePollOption(i)} style={{background:"none",border:"none",color:"#555",cursor:"pointer",fontSize:16,flexShrink:0}}>✕</button>}
                  </div>
                ))}
                <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                  {pollOpts.length<6 && (
                    <button onClick={addPollOption} style={{background:"#1a1a1a",border:"1px solid #252525",borderRadius:8,color:"#888",cursor:"pointer",fontFamily:"inherit",fontSize:12,fontWeight:600,padding:"6px 12px",transition:"all 0.15s"}}
                      onMouseEnter={e=>{e.currentTarget.style.borderColor="#f97316";e.currentTarget.style.color="#f97316";}}
                      onMouseLeave={e=>{e.currentTarget.style.borderColor="#252525";e.currentTarget.style.color="#888";}}>
                      + Add option
                    </button>
                  )}
                  <button onClick={confirmPoll}
                    style={{background:pollQ.trim()&&pollOpts.filter(o=>o.trim()).length>=2?"linear-gradient(135deg,#f97316,#c2410c)":"#1a1a1a",border:"none",borderRadius:8,color:pollQ.trim()&&pollOpts.filter(o=>o.trim()).length>=2?"#000":"#444",cursor:"pointer",fontFamily:"inherit",fontSize:12,fontWeight:700,padding:"6px 16px"}}>
                    Attach Poll
                  </button>
                  <button onClick={()=>{setShowPollBuilder(false);setPollQ("");setPollOpts(["",""]);}}
                    style={{background:"none",border:"1px solid #252525",borderRadius:8,color:"#666",cursor:"pointer",fontFamily:"inherit",fontSize:12,fontWeight:600,padding:"6px 12px"}}>
                    Cancel
                  </button>
                </div>
              </div>
            ) : (
              <button onClick={()=>setShowPollBuilder(true)}
                style={{background:"#111",border:"2px dashed #252525",borderRadius:14,color:"#555",cursor:"pointer",fontFamily:"inherit",fontSize:13,fontWeight:600,padding:"14px 20px",width:"100%",display:"flex",alignItems:"center",gap:10,transition:"all 0.15s"}}
                onMouseEnter={e=>{e.currentTarget.style.borderColor="#a855f7";e.currentTarget.style.color="#a855f7";}}
                onMouseLeave={e=>{e.currentTarget.style.borderColor="#252525";e.currentTarget.style.color="#555";}}>
                <span style={{fontSize:18}}>📊</span>
                <span>Add a poll to your post</span>
              </button>
            )}
          </div>
        </div>

        {/* Sidebar */}
        <div style={{display:"flex",flexDirection:"column",gap:12,position:"sticky",top:80}}>
          {/* Author */}
          <Panel>
            <SectionLabel>Posting as</SectionLabel>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <Avatar profile={profile} size={36}/>
              <div>
                <div style={{fontSize:13,fontWeight:700,color:"#e0e0e0"}}>{currentUser.username}</div>
                <RoleBadge role={currentUser.role}/>
              </div>
            </div>
          </Panel>

          {/* Tag selector */}
          <Panel>
            <SectionLabel>Post Tag</SectionLabel>
            <div style={{display:"flex",flexDirection:"column",gap:6}}>
              {tags.map(t => {
                const c = TAG_COLOR[t];
                const active = tag===t;
                return (
                  <button key={t} onClick={()=>setTag(t)} style={{background:active?c+"18":"transparent",border:`1px solid ${active?c+"60":"#252525"}`,borderRadius:10,color:active?c:"#666",cursor:"pointer",fontFamily:"inherit",fontSize:13,fontWeight:600,padding:"8px 14px",textAlign:"left",transition:"all 0.15s"}}
                    onMouseEnter={e=>{if(!active){e.currentTarget.style.borderColor=c+"60";e.currentTarget.style.color=c;}}}
                    onMouseLeave={e=>{if(!active){e.currentTarget.style.borderColor="#252525";e.currentTarget.style.color="#666";}}}>
                    {t}
                  </button>
                );
              })}
            </div>
          </Panel>

          {/* Post guidelines */}
          <Panel>
            <SectionLabel>Guidelines</SectionLabel>
            <div style={{display:"flex",flexDirection:"column",gap:7}}>
              {["Be respectful to other members","Back claims with data where possible","No spam or self-promotion","Use the correct tag for your post","Keep trading posts in the Trading tag"].map((g,i)=>(
                <div key={i} style={{display:"flex",gap:8,alignItems:"flex-start"}}>
                  <span style={{color:"#4ade80",fontSize:11,marginTop:1,flexShrink:0}}>✓</span>
                  <span style={{fontSize:12,color:"#555",lineHeight:1.5}}>{g}</span>
                </div>
              ))}
            </div>
          </Panel>

          {/* Submit */}
          <button onClick={handleSubmit}
            style={{background:"linear-gradient(135deg,#f97316,#c2410c)",border:"none",borderRadius:14,color:"#000",cursor:"pointer",fontFamily:"inherit",fontSize:14,fontWeight:800,padding:"14px",boxShadow:"0 4px 20px rgba(249,115,22,0.3)",transition:"all 0.2s"}}
            onMouseEnter={e=>e.currentTarget.style.boxShadow="0 6px 28px rgba(249,115,22,0.5)"}
            onMouseLeave={e=>e.currentTarget.style.boxShadow="0 4px 20px rgba(249,115,22,0.3)"}>
            Publish Post →
          </button>

          <button onClick={onBack} style={{background:"none",border:"1px solid #1e1e1e",borderRadius:12,color:"#555",cursor:"pointer",fontFamily:"inherit",fontSize:13,fontWeight:600,padding:"10px"}}>
            Discard
          </button>
        </div>
      </div>
    </div>
  );
}

function ForumPage({ currentUser, profiles, onViewProfile, onOpenPost, posts, onNewPost, onViewScammers }) {
  const [activeTag,        setActiveTag]        = useState("All");
  const [sort,             setSort]             = useState("latest"); // latest | replies | hot
  const [search,           setSearch]           = useState("");
  const [memberSearch,     setMemberSearch]     = useState("");
  const [showMemberSearch, setShowMemberSearch] = useState(false);

  const TAGS = ["All", ...Object.keys(TAG_COLOR)];

  // Filter + sort posts
  const filtered = posts
    .filter(p => activeTag === "All" || p.tag === activeTag)
    .filter(p => {
      const q = search.toLowerCase().trim();
      return !q || p.title.toLowerCase().includes(q) || p.user.toLowerCase().includes(q);
    })
    .sort((a, b) => {
      if (a.pinned && !b.pinned) return -1;
      if (!a.pinned && b.pinned) return 1;
      if (sort === "replies") return b.replies - a.replies;
      if (sort === "hot") return (b.replies + (b.views||0)/10) - (a.replies + (a.views||0)/10);
      return 0; // latest — keep original order (newest first from state)
    });

  const tagCount = tag => tag === "All" ? posts.length : posts.filter(p => p.tag === tag).length;

  const matchingMembers = memberSearch.trim().length > 0
    ? Object.keys(profiles).filter(u => u.toLowerCase().includes(memberSearch.toLowerCase()))
    : [];

  const sel = {background:"#141414",border:"1px solid #1e1e1e",borderRadius:12,color:"#ccc",fontFamily:"inherit",fontSize:13,fontWeight:500,padding:"9px 14px",outline:"none",width:"100%"};

  return (
    <>
      {/* Header */}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:20,flexWrap:"wrap",gap:12}}>
        <div>
          <div style={{fontFamily:"Syne,sans-serif",fontSize:22,fontWeight:800,color:"#fff",marginBottom:4}}>Community Forum</div>
          <div style={{fontSize:13,color:"#555"}}>Discuss values, trades and market trends.</div>
        </div>
        <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
          <button onClick={()=>setShowMemberSearch(s=>!s)}
            style={{background:showMemberSearch?"rgba(249,115,22,0.1)":"#141414",border:`1px solid ${showMemberSearch?"#f97316":"#1e1e1e"}`,borderRadius:12,color:showMemberSearch?"#f97316":"#888",cursor:"pointer",fontFamily:"inherit",fontSize:13,fontWeight:600,padding:"9px 18px",transition:"all 0.15s"}}>
            👥 Members
          </button>
          <button onClick={onViewScammers}
            style={{background:"#141414",border:"1px solid #1e1e1e",borderRadius:12,color:"#888",cursor:"pointer",fontFamily:"inherit",fontSize:13,fontWeight:600,padding:"9px 18px",transition:"all 0.15s"}}
            onMouseEnter={e=>{e.currentTarget.style.borderColor="#f87171";e.currentTarget.style.color="#f87171";}}
            onMouseLeave={e=>{e.currentTarget.style.borderColor="#1e1e1e";e.currentTarget.style.color="#888";}}>
            🚨 Scammers
          </button>
          {currentUser
            ? <button onClick={onNewPost} style={{background:"#f97316",border:"none",borderRadius:12,padding:"9px 20px",fontFamily:"inherit",fontSize:13,fontWeight:700,color:"#000",cursor:"pointer"}}>+ New Post</button>
            : <div style={{fontSize:12,color:"#666",alignSelf:"center"}}>Log in to post</div>}
        </div>
      </div>

      {/* Search + Sort bar */}
      <div style={{display:"flex",gap:10,marginBottom:16,flexWrap:"wrap"}}>
        <div style={{flex:1,minWidth:180,display:"flex",alignItems:"center",gap:8,background:"#111",border:"1px solid #1e1e1e",borderRadius:10,padding:"8px 14px"}}>
          <span style={{fontSize:14,color:"#444",flexShrink:0}}>🔍</span>
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search posts…"
            style={{flex:1,background:"none",border:"none",outline:"none",color:"#e0e0e0",fontFamily:"inherit",fontSize:13}}/>
          {search && <button onClick={()=>setSearch("")} style={{background:"none",border:"none",color:"#555",cursor:"pointer",fontSize:13}}>✕</button>}
        </div>
        <select value={sort} onChange={e=>setSort(e.target.value)}
          style={{background:"#111",border:"1px solid #1e1e1e",borderRadius:10,color:"#888",fontFamily:"inherit",fontSize:13,padding:"8px 14px",outline:"none",cursor:"pointer"}}>
          <option value="latest">🕐 Latest</option>
          <option value="replies">💬 Most Replied</option>
          <option value="hot">🔥 Hot</option>
        </select>
      </div>

      {/* Category tabs */}
      <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:20}}>
        {TAGS.map(tag => {

                    <div style={{display:"flex",alignItems:"center",gap:10}}>
                      <Avatar profile={p} size={34}/>
                      <div>
                        <div style={{fontSize:13,fontWeight:600,color:"#e0e0e0"}}>{username}</div>
                        <RoleBadge role={p.role}/>

                    <span style={{fontSize:11,color:"#555"}}>{p.joinedDaysAgo}d · rep {p.reputation}</span>

          <div style={{fontSize:28,marginBottom:10}}>💬</div>
          <div style={{fontSize:14,color:"#444"}}>
            {search ? `No posts matching "${search}"` : `No posts in ${activeTag} yet — be the first!`}
          </div>
        </div>
      ) : (
        <Panel style={{padding:0,overflow:"hidden"}}>
          {/* Column headers */}
          <div style={{display:"grid",gridTemplateColumns:"1fr 70px 90px 80px",gap:12,padding:"10px 22px",borderBottom:"1px solid #1a1a1a"}}>
            {["Topic","Replies","Category","Posted"].map(h=>(
              <div key={h} style={{fontSize:10,fontWeight:700,color:"#3a3a3a",textTransform:"uppercase",letterSpacing:"0.06em"}}>{h}</div>

          </div>

            const tc = TAG_COLOR[p.tag] || "#666";
            return (
              <div key={p.id} onClick={()=>onOpenPost(p)}

                onMouseEnter={e=>e.currentTarget.style.background=p.pinned?"rgba(249,115,22,0.06)":"#181818"}
                onMouseLeave={e=>e.currentTarget.style.background=p.pinned?"rgba(249,115,22,0.03)":"transparent"}>

function ComingSoonPage({ onBypass }) {
  const [clickCount,  setClickCount]  = useState(0);
  const [showBypass,  setShowBypass]  = useState(false);
  const [email,       setEmail]       = useState("");
  const [pass,        setPass]        = useState("");
  const [error,       setError]       = useState("");
  const [loading,     setLoading]     = useState(false);
  const [visible,     setVisible]     = useState(false);

  useEffect(() => { setTimeout(() => setVisible(true), 60); }, []);

  const handleLogoClick = () => {
    const next = clickCount + 1;
    setClickCount(next);
    if (next >= 5) { setShowBypass(true); setClickCount(0); }
  };

  const handleBypass = async () => {
    if (!email || !pass) { setError("Enter your admin email and password."); return; }
    setLoading(true); setError("");
    try {
      const { data, error: authErr } = await supabase.auth.signInWithPassword({ email, password: pass });
      if (authErr) { setError("Incorrect credentials."); return; }
      const { data: profile } = await supabase.from("profiles").select("*").eq("id", data.user.id).single();
      if (profile?.role === "admin") onBypass(normaliseProfile(profile));
      else { setError("Admin access only."); await supabase.auth.signOut(); }
    } catch(e) {
      setError("Something went wrong.");
    } finally {
      setLoading(false);
    }
  };

  const fade = (delay=0) => ({
    opacity:    visible ? 1 : 0,
    transform:  visible ? "translateY(0)" : "translateY(20px)",
    transition: `opacity 0.7s ease ${delay}s, transform 0.7s ease ${delay}s`,
  });

  const features = [
    { icon:"📊", text:"Community price index" },
    { icon:"⚖️", text:"Trade calculator"      },
    { icon:"💬", text:"Trading forums"         },
    { icon:"🔔", text:"Price alerts"           },
  ];

  return (
    <div style={{position:"fixed",inset:0,background:"#0a0a0a",zIndex:500,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",overflow:"hidden"}}>

      {/* Ambient glow */}
      <div style={{position:"absolute",top:"30%",left:"50%",transform:"translate(-50%,-50%)",width:600,height:600,background:"radial-gradient(circle,rgba(249,115,22,0.06) 0%,transparent 70%)",pointerEvents:"none"}}/>
      <div style={{position:"absolute",bottom:0,left:0,right:0,height:1,background:"linear-gradient(90deg,transparent,rgba(249,115,22,0.15),transparent)"}}/>

      <div style={{position:"relative",zIndex:1,display:"flex",flexDirection:"column",alignItems:"center",textAlign:"center",padding:"0 24px",maxWidth:560}}>

        {/* Logo — click 5x for bypass */}
        <div onClick={handleLogoClick} style={{...fade(0),cursor:"default",marginBottom:32,userSelect:"none"}}>
          <div style={{width:64,height:64,background:"linear-gradient(135deg,#f97316,#c2410c)",borderRadius:18,display:"flex",alignItems:"center",justifyContent:"center",fontSize:30,margin:"0 auto 16px",boxShadow:"0 0 40px rgba(249,115,22,0.2)"}}>⚔</div>
          <div style={{fontFamily:"'Oxanium',sans-serif",fontWeight:700,fontSize:28,color:"#fff",letterSpacing:"0.02em"}}>CA Market</div>
        </div>

        {/* Headline */}
        <div style={{...fade(0.1),fontFamily:"Syne,sans-serif",fontWeight:800,fontSize:38,color:"#fff",lineHeight:1.15,marginBottom:16}}>
          Something is<br/><span style={{color:"#f97316"}}>coming.</span>
        </div>

        {/* Subtext — vague but intriguing */}
        <div style={{...fade(0.2),fontSize:15,color:"#555",lineHeight:1.8,marginBottom:40,maxWidth:420}}>
          A new way to track, trade, and talk about Combat Arena skins. Built by the community, for the community.
        </div>

        {/* Feature pills */}
        <div style={{...fade(0.3),display:"flex",flexWrap:"wrap",gap:8,justifyContent:"center",marginBottom:48}}>
          {features.map((f,i) => (
            <div key={i} style={{background:"#141414",border:"1px solid #1e1e1e",borderRadius:99,padding:"6px 14px",fontSize:12,color:"#666",display:"flex",alignItems:"center",gap:6}}>
              <span style={{fontSize:13}}>{f.icon}</span>{f.text}
            </div>
          ))}
        </div>

        {/* Status line */}
        <div style={{...fade(0.4),display:"flex",alignItems:"center",gap:8,fontSize:12,color:"#333"}}>
          <div style={{width:6,height:6,borderRadius:"50%",background:"#f97316",boxShadow:"0 0 8px #f97316",animation:"pulse-dot 2s ease-in-out infinite"}}/>
          Under construction
        </div>

      </div>

      {/* Bypass modal */}
      {showBypass && (
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.85)",zIndex:600,display:"flex",alignItems:"center",justifyContent:"center",backdropFilter:"blur(4px)"}}>
          <div style={{background:"#111",border:"1px solid #1e1e1e",borderRadius:16,padding:"28px",width:320,position:"relative"}}>
            <button onClick={()=>{setShowBypass(false);setEmail("");setPass("");setError("");}}
              style={{position:"absolute",top:12,right:12,background:"none",border:"none",color:"#444",cursor:"pointer",fontSize:16}}>✕</button>
            <div style={{fontSize:12,color:"#444",fontWeight:600,marginBottom:14,letterSpacing:"0.05em",textTransform:"uppercase"}}>Admin Access</div>
            <input type="email" value={email} onChange={e=>setEmail(e.target.value)}
              onKeyDown={e=>e.key==="Enter"&&handleBypass()}
              autoFocus placeholder="Admin email"
              style={{width:"100%",background:"#0e0e0e",border:"1px solid #252525",borderRadius:10,color:"#e0e0e0",fontFamily:"inherit",fontSize:13,padding:"10px 14px",outline:"none",marginBottom:8,boxSizing:"border-box"}}/>
            <input type="password" value={pass} onChange={e=>setPass(e.target.value)}
              onKeyDown={e=>e.key==="Enter"&&handleBypass()}
              placeholder="Password"
              style={{width:"100%",background:"#0e0e0e",border:"1px solid #252525",borderRadius:10,color:"#e0e0e0",fontFamily:"inherit",fontSize:13,padding:"10px 14px",outline:"none",marginBottom:10,boxSizing:"border-box"}}/>
            {error && <div style={{fontSize:12,color:"#f87171",marginBottom:10}}>{error}</div>}
            <button onClick={handleBypass} disabled={loading}
              style={{width:"100%",background:loading?"#333":"linear-gradient(135deg,#f97316,#c2410c)",border:"none",borderRadius:10,color:loading?"#666":"#000",cursor:loading?"default":"pointer",fontFamily:"inherit",fontSize:13,fontWeight:700,padding:"10px 0"}}>
              {loading ? "Checking…" : "Enter"}
            </button>
          </div>
        </div>
      )}
    </div>
  );
}

              onKeyDown={e=>e.key==="Enter"&&handleBypass()}
              autoFocus placeholder="Admin email"
              style={{width:"100%",background:"#0e0e0e",border:"1px solid #252525",borderRadius:10,color:"#e0e0e0",fontFamily:"inherit",fontSize:13,padding:"10px 14px",outline:"none",marginBottom:8,boxSizing:"border-box"}}/>
            <input type="password" value={pass} onChange={e=>setPass(e.target.value)}
              onKeyDown={e=>e.key==="Enter"&&handleBypass()}
              placeholder="Password"
              style={{width:"100%",background:"#0e0e0e",border:"1px solid #252525",borderRadius:10,color:"#e0e0e0",fontFamily:"inherit",fontSize:13,padding:"10px 14px",outline:"none",marginBottom:10,boxSizing:"border-box"}}/>
            {error && <div style={{fontSize:12,color:"#f87171",marginBottom:10}}>{error}</div>}
            <button onClick={handleBypass} disabled={loading}
              style={{width:"100%",background:loading?"#333":"linear-gradient(135deg,#f97316,#c2410c)",border:"none",borderRadius:10,color:loading?"#666":"#000",cursor:loading?"default":"pointer",fontFamily:"inherit",fontSize:13,fontWeight:700,padding:"10px 0"}}>
              {loading ? "Checking…" : "Enter"}
            </button>
          </div>
        </div>
      )}
    </div>
  );
}

function LandingPage({ onNavigate }) {

  // Intersection observer state for each section
  const featRef   = useRef(null);
  const statsRef  = useRef(null);
  const ctaRef    = useRef(null);
  const [featVis,  setFeatVis]  = useState(false);
  const [statsVis, setStatsVis] = useState(false);

  useEffect(() => {
    setTimeout(() => setHeroVisible(true), 80);
    const onScroll = () => setScrollY(window.scrollY);
    window.addEventListener("scroll", onScroll, { passive:true });

    const makeObs = (ref, setter) => {
      const obs = new IntersectionObserver(([e]) => { if (e.isIntersecting) setter(true); }, { threshold:0.12 });
      if (ref.current) obs.observe(ref.current);
      return obs;
    };
    const obs1 = makeObs(featRef,  setFeatVis);
    const obs2 = makeObs(statsRef, setStatsVis);
    const obs3 = makeObs(ctaRef,   setCtaVis);

    return () => {
      window.removeEventListener("scroll", onScroll);
      obs1.disconnect(); obs2.disconnect(); obs3.disconnect();

function StatsPage({ allSkins, submissions, profiles, votes, forumPosts }) {
  const stats = useMemo(() => {
    const allSubs        = Object.values(submissions).flat();
    const totalSubs      = allSubs.length;
    const flaggedTotal   = allSubs.filter(s=>s.flagged).length;
    const verifiedTotal  = totalSubs - flaggedTotal;
    const memberCount    = Object.keys(profiles).length;
    const traderCount    = Object.values(profiles).filter(p=>p.role==="trader"||p.role==="admin").length;
    const frozenCount    = allSkins.filter(s=>s.isFrozen).length;
    const skinsWithPrice = allSkins.filter(s=>s.val).length;
    const highConfidence   = allSkins.filter(s=>s.conf.label==="High").length;
    const medConfidence    = allSkins.filter(s=>s.conf.label==="Medium").length;
    const lowConfidence    = allSkins.filter(s=>s.conf.label==="Low").length;
    const unverifiedCount  = allSkins.filter(s=>s.conf.label==="Unverified").length;
    const skinsWithVal     = allSkins.filter(s=>s.val);
    const topGainer   = [...skinsWithVal].sort((a,b)=>b.weekly-a.weekly)[0];
    const topLoser    = [...skinsWithVal].sort((a,b)=>a.weekly-b.weekly)[0];
    const highestVal  = [...skinsWithVal].sort((a,b)=>b.val.avg-a.val.avg)[0];
    const mostDemanded = [...allSkins].sort((a,b)=>b.demand-a.demand)[0];
    const rarityBreakdown = ["Artifact","Legendary","Rare","Uncommon","Common"].map(r=>{
      const skins = allSkins.filter(s=>s.rarity===r);
      const valid = skins.filter(s=>s.val);
      return { rarity:r, count:skins.length, withPrice:valid.length,
        avgVal: valid.length ? Math.round(valid.reduce((a,s)=>a+s.val.avg,0)/valid.length) : 0,
        color: RARITY_META[r].color };
    });
    const tierBreakdown = ["S","A","B","C","D"].map(t=>({
      tier:t, count:allSkins.filter(s=>s.tier===t).length, ...TIER_META[t],
    }));
    const weaponMap = {};
    allSkins.forEach(s => {
      const w = s.specificWeapon || s.weapon;
      if (!weaponMap[w]) weaponMap[w] = { count:0, withPrice:0, totalVal:0 };
      weaponMap[w].count++;
      if (s.val) { weaponMap[w].withPrice++; weaponMap[w].totalVal += s.val.avg; }
    });
    const weaponBreakdown = Object.entries(weaponMap)
      .map(([w, d]) => ({ weapon:w, count:d.count, withPrice:d.withPrice, avgVal: d.withPrice ? Math.round(d.totalVal/d.withPrice) : 0 }))
      .sort((a,b) => b.count - a.count);
    const traderSubs = {};
    allSubs.forEach(s=>{ traderSubs[s.traderId]=(traderSubs[s.traderId]||0)+1; });
    const topTraders = Object.entries(traderSubs).sort((a,b)=>b[1]-a[1]).slice(0,5);
    const demandDist = [0,1,2,3,4].map(i=>({
      label: DEMAND_LABELS[i], count: allSkins.filter(s=>s.demand===i).length, color: DEMAND_COLORS[i],
    }));
    const totalPosts   = forumPosts?.length || 0;
    const totalReplies = forumPosts?.reduce((a,p)=>a+p.replies,0) || 0;
    const totalViews   = forumPosts?.reduce((a,p)=>a+(p.views||0),0) || 0;
    const postsByUser  = {};
    forumPosts?.forEach(p=>{ postsByUser[p.user]=(postsByUser[p.user]||0)+1; });
    const topPoster = Object.entries(postsByUser).sort((a,b)=>b[1]-a[1])[0];
    const tagDist = Object.entries(TAG_COLOR).map(([tag,color])=>({
      tag, color, count: forumPosts?.filter(p=>p.tag===tag).length||0,
    })).sort((a,b)=>b.count-a.count);
    return { allSubs, totalSubs, flaggedTotal, verifiedTotal, memberCount, traderCount,
      frozenCount, skinsWithPrice, highConfidence, medConfidence, lowConfidence,
      unverifiedCount, topGainer, topLoser, highestVal, mostDemanded,
      rarityBreakdown, tierBreakdown, weaponBreakdown, topTraders, demandDist,
      totalPosts, totalReplies, totalViews, topPoster, tagDist };
  }, [allSkins, submissions, profiles, forumPosts]);

  const { allSubs, totalSubs, flaggedTotal, verifiedTotal, memberCount, traderCount,
    frozenCount, skinsWithPrice, highConfidence, medConfidence, lowConfidence,
    unverifiedCount, topGainer, topLoser, highestVal, mostDemanded,
    rarityBreakdown, tierBreakdown, weaponBreakdown, topTraders, demandDist,
    totalPosts, totalReplies, totalViews, topPoster, tagDist } = stats;

  const bigNum = { fontSize:26, fontWeight:800, letterSpacing:"-0.03em", lineHeight:1.1 };
  const subTxt = { fontSize:12, color:"#555", marginTop:4 };

  return (
    <div>
      <div style={{marginBottom:28}}>
        <div style={{fontFamily:"Syne,sans-serif",fontSize:22,fontWeight:800,color:"#fff",marginBottom:4}}>Site Statistics</div>
        <div style={{fontSize:13,color:"#555"}}>Live overview of the CA Market price index and community.</div>
      </div>

      {/* Top-line numbers */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:12,marginBottom:20}}>
        {[
          { label:"Skins Tracked",      value:allSkins.length,  sub:`${skinsWithPrice} with prices`,           color:"#fff"    },
          { label:"Total Submissions",  value:totalSubs,        sub:`${verifiedTotal} verified · ${flaggedTotal} flagged`, color:"#f97316" },
          { label:"Members",            value:memberCount,      sub:`${traderCount} trusted traders`,          color:"#a855f7" },
          { label:"Forum Posts",        value:totalPosts,       sub:`${totalReplies} replies · ${totalViews} views`, color:"#60a5fa" },
        ].map(c=>(
          <Panel key={c.label}>
            <div style={{fontSize:10,color:"#555",fontWeight:700,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:10}}>{c.label}</div>
            <div style={{...bigNum,color:c.color}}>{c.value}</div>
            <div style={subTxt}>{c.sub}</div>
          </Panel>
        ))}
      </div>

      {/* Highlights */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:12,marginBottom:20}}>
        {[
          { label:"🏆 Highest Value",    skin:highestVal,  value: highestVal?.val ? `${fmt(highestVal.val.avg)} coins` : "No data" },
          { label:"📈 Top Weekly Gainer",skin:topGainer,   value: topGainer?.weekly ? `+${fmt(topGainer.weekly)} coins` : "No data" },
          { label:"📉 Top Weekly Loser", skin:topLoser,    value: topLoser?.weekly  ? `${fmt(topLoser.weekly)} coins`  : "No data" },
        ].map(h=>(
          <Panel key={h.label}>
            <div style={{fontSize:10,color:"#555",fontWeight:700,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:12}}>{h.label}</div>
            {h.skin ? (
              <div style={{display:"flex",alignItems:"center",gap:12}}>
                <div style={{width:44,height:44,background:"#1a1a1a",borderRadius:12,display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,flexShrink:0}}>{h.skin.emoji}</div>
                <div style={{minWidth:0}}>
                  <div style={{fontSize:13,fontWeight:700,color:"#f0f0f0",marginBottom:2,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{skinLabel(h.skin)}</div>
                  <div style={{fontSize:11,color:"#555",marginBottom:4}}>{h.skin.specificWeapon||h.skin.weapon}</div>
                  <div style={{fontSize:14,fontWeight:800,color:"#f97316"}}>{h.value}</div>
                </div>
              </div>
            ) : <div style={{fontSize:13,color:"#444"}}>No data yet</div>}
          </Panel>
        ))}
      </div>

      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16,marginBottom:16}}>

        {/* Rarity breakdown */}
        <Panel>
          <StatLabel text="Rarity Breakdown"/>
          <div style={{display:"flex",flexDirection:"column",gap:14}}>
            {rarityBreakdown.filter(r=>r.count>0).map(r=>(
              <div key={r.rarity}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:2}}>
                  <div style={{display:"flex",alignItems:"center",gap:8}}>
                    <span style={{background:r.color+"18",color:r.color,border:`1px solid ${r.color}35`,borderRadius:99,fontSize:10,fontWeight:700,padding:"1px 9px"}}>{r.rarity}</span>
                    <span style={{fontSize:12,color:"#666"}}>{r.count} skin{r.count!==1?"s":""}</span>
                  </div>
                  <span style={{fontSize:12,fontWeight:700,color:"#888"}}>{r.avgVal > 0 ? `avg ${fmt(r.avgVal)}` : "no data"}</span>
                </div>
                <MiniBar pct={(r.count/allSkins.length)*100} color={r.color}/>
              </div>
            ))}
          </div>
        </Panel>

        {/* Weapon breakdown */}
        <Panel>
          <StatLabel text="Skins by Weapon"/>
          <div style={{display:"flex",flexDirection:"column",gap:10}}>
            {weaponBreakdown.map(w=>(
              <div key={w.weapon}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:2}}>
                  <div style={{display:"flex",alignItems:"center",gap:8}}>
                    <span style={{fontSize:12,fontWeight:700,color:"#ccc"}}>{w.weapon}</span>
                    <span style={{fontSize:11,color:"#555"}}>{w.count} skin{w.count!==1?"s":""}</span>
                  </div>
                  <span style={{fontSize:11,color:"#666"}}>{w.withPrice > 0 ? `avg ${fmt(w.avgVal)}` : "no data"}</span>
                </div>
                <MiniBar pct={(w.count/allSkins.length)*100} color="#f97316"/>
              </div>
            ))}
          </div>
        </Panel>

        {/* Confidence coverage */}
        <Panel>
          <StatLabel text="Price Confidence"/>
          <div style={{display:"flex",flexDirection:"column",gap:12,marginBottom:16}}>
            {[
              {label:"High",       count:highConfidence,  color:"#4ade80"},
              {label:"Medium",     count:medConfidence,   color:"#fbbf24"},
              {label:"Low",        count:lowConfidence,   color:"#f87171"},
              {label:"Unverified", count:unverifiedCount, color:"#6b7280"},
            ].map(c=>(
              <div key={c.label}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:2}}>
                  <span style={{fontSize:12,color:c.color,fontWeight:700}}>{c.label}</span>
                  <span style={{fontSize:12,color:"#666"}}>{c.count} skin{c.count!==1?"s":""}</span>
                </div>
                <MiniBar pct={(c.count/allSkins.length)*100} color={c.color}/>
              </div>
            ))}
          </div>
          <div style={{borderTop:"1px solid #1e1e1e",paddingTop:12,display:"flex",gap:20}}>
            <div><div style={{fontSize:18,fontWeight:800,color:"#4ade80"}}>{verifiedTotal}</div><div style={{fontSize:11,color:"#555"}}>verified subs</div></div>
            <div><div style={{fontSize:18,fontWeight:800,color:"#fbbf24"}}>{flaggedTotal}</div><div style={{fontSize:11,color:"#555"}}>flagged</div></div>
            {frozenCount>0&&<div><div style={{fontSize:18,fontWeight:800,color:"#60a5fa"}}>{frozenCount}</div><div style={{fontSize:11,color:"#555"}}>frozen</div></div>}
          </div>
        </Panel>

        {/* Demand distribution */}
        <Panel>
          <StatLabel text="Demand Distribution"/>
          <div style={{display:"flex",flexDirection:"column",gap:12,marginBottom:16}}>
            {demandDist.map(d=>(
              <div key={d.label}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:2}}>
                  <span style={{fontSize:12,color:d.color,fontWeight:700}}>{d.label}</span>
                  <span style={{fontSize:12,color:"#666"}}>{d.count} skin{d.count!==1?"s":""}</span>
                </div>
                <MiniBar pct={(d.count/allSkins.length)*100} color={d.color}/>
              </div>
            ))}
          </div>
          <div style={{borderTop:"1px solid #1e1e1e",paddingTop:12}}>
            <StatLabel text="Most Demanded"/>
            {mostDemanded && (
              <div style={{display:"flex",alignItems:"center",gap:10}}>
                <span style={{fontSize:20}}>{mostDemanded.emoji}</span>
                <div>
                  <div style={{fontSize:13,fontWeight:700,color:"#e0e0e0"}}>{mostDemanded.name}</div>
                  <div style={{fontSize:11,color:"#555"}}>{mostDemanded.specificWeapon||mostDemanded.weapon} · {DEMAND_LABELS[mostDemanded.demand]}</div>
                </div>
              </div>
            )}
          </div>
        </Panel>
      </div>

      {/* Forum breakdown */}
      {totalPosts > 0 && (
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16,marginBottom:16}}>
          <Panel>
            <StatLabel text="Forum by Category"/>
            <div style={{display:"flex",flexDirection:"column",gap:10}}>
              {tagDist.filter(t=>t.count>0).map(t=>(
                <div key={t.tag}>
                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:2}}>
                    <span style={{background:t.color+"18",color:t.color,border:`1px solid ${t.color}35`,borderRadius:99,fontSize:10,fontWeight:700,padding:"1px 8px"}}>{t.tag}</span>
                    <span style={{fontSize:12,color:"#666"}}>{t.count} post{t.count!==1?"s":""}</span>
                  </div>
                  <MiniBar pct={(t.count/totalPosts)*100} color={t.color}/>
                </div>
              ))}
            </div>
          </Panel>
          <Panel>
            <StatLabel text="Community Activity"/>
            <div style={{display:"flex",flexDirection:"column",gap:12}}>
              {[
                {label:"Total posts",   value:totalPosts,   color:"#60a5fa"},
                {label:"Total replies", value:totalReplies, color:"#f97316"},
                {label:"Total views",   value:totalViews,   color:"#a855f7"},
              ].map(s=>(
                <div key={s.label} style={{display:"flex",justifyContent:"space-between",alignItems:"center",background:"#111",borderRadius:10,padding:"10px 14px"}}>
                  <span style={{fontSize:12,color:"#888"}}>{s.label}</span>
                  <span style={{fontSize:16,fontWeight:800,color:s.color}}>{fmt(s.value)}</span>
                </div>
              ))}
              {topPoster && (
                <div style={{background:"#111",borderRadius:10,padding:"10px 14px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <span style={{fontSize:12,color:"#888"}}>Top poster</span>
                  <div style={{textAlign:"right"}}>
                    <div style={{fontSize:13,fontWeight:700,color:"#f97316"}}>{topPoster[0]}</div>
                    <div style={{fontSize:11,color:"#555"}}>{topPoster[1]} posts</div>
                  </div>
                </div>
              )}
            </div>
          </Panel>
        </div>
      )}

      {/* Top traders */}
      {topTraders.length > 0 && (
        <Panel>
          <StatLabel text="Most Active Traders"/>
          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            {topTraders.map(([username,count],i)=>{
              const p = profiles[username];
              return (
                <div key={username} style={{display:"flex",alignItems:"center",gap:12,background:"#111",borderRadius:12,padding:"10px 14px"}}>
                  <div style={{width:24,height:24,borderRadius:"50%",background:i===0?"linear-gradient(135deg,#f97316,#c2410c)":i===1?"linear-gradient(135deg,#a855f7,#7e22ce)":"linear-gradient(135deg,#60a5fa,#1d4ed8)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:800,color:"#000",flexShrink:0}}>{i+1}</div>
                  {p && <Avatar profile={p} size={32}/>}
                  <div style={{flex:1}}>
                    <div style={{fontSize:13,fontWeight:600,color:"#e0e0e0"}}>{username}</div>
                    <div style={{fontSize:11,color:"#555"}}>{p?.role==="admin"?"Admin":"Trusted Trader"}</div>
                  </div>
                  <div style={{textAlign:"right"}}>
                    <div style={{fontSize:16,fontWeight:800,color:"#f97316"}}>{count}</div>
                    <div style={{fontSize:11,color:"#555"}}>submissions</div>
                  </div>
                </div>
              );
            })}
          </div>
        </Panel>
      )}

      {/* Empty state if no data yet */}
      {totalSubs === 0 && (
        <Panel>
          <div style={{textAlign:"center",padding:"32px 0",color:"#444",fontSize:13}}>
            <div style={{fontSize:28,marginBottom:10}}>📊</div>
            No submission data yet — stats will populate as traders submit prices.
          </div>
        </Panel>
      )}
    </div>
  );
}
