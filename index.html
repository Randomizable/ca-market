// ── Responsive hook ──────────────────────────────────────────
function useWindowWidth() {
  const [w, setW] = useState(() => window.innerWidth);
  useEffect(() => {
    const handler = () => setW(window.innerWidth);
    window.addEventListener("resize", handler);
    return () => window.removeEventListener("resize", handler);
  }, []);
  return w;
}
// Use this anywhere: const isMobile = useWindowWidth() < 768;
// Sanitise HTML from rich text editor — strips scripts and dangerous attributes
function sanitiseHTML(html) {
  if (!html) return "";
  // Remove script tags and their content
  let s = html.replace(/<script[\s\S]*?<\/script>/gi, "");
  // Remove event handlers and javascript: hrefs
  s = s.replace(/\s(on\w+|href|src|action|formaction|data)\s*=\s*["'][^"']*["']/gi, (m) => {
    const attr = m.trim().split("=")[0].toLowerCase();
    if (attr === "href" || attr === "src") {
      // Allow safe hrefs/srcs, block javascript:
      if (/javascript:/i.test(m)) return "";
      return m;
    }
    return "";
  });
  // Remove dangerous tags entirely
  s = s.replace(/<(iframe|object|embed|form|input|button|meta|link|style|base)[^>]*>/gi, "");
  // Remove data: URIs from src attributes
  s = s.replace(/src\s*=\s*["']data:[^"']*["']/gi, "");
  return s;
}

function timeAgo(ts) {
  const s = Math.floor((Date.now() - new Date(ts)) / 1000);
  if (s < 60)   return "just now";
  if (s < 3600)  return `${Math.floor(s/60)}m ago`;
  if (s < 86400) return `${Math.floor(s/3600)}h ago`;
  return `${Math.floor(s/86400)}d ago`;
}

function getBracket(serial) {
  return SERIAL_BRACKETS.find(b => serial >= b.range[0] && serial <= b.range[1]) ?? SERIAL_BRACKETS[SERIAL_BRACKETS.length-1];
}

// Get value for a bracket: verified avg from submissions, or recommended (base * mult)
function getBracketValue(bracketId, baseAvg, bracketSubs) {
  const subs = (bracketSubs?.[bracketId] ?? []).filter(s => !s.flagged);
  if (subs.length > 0) {
    const avg = Math.round(subs.reduce((a,s) => a+s.value, 0) / subs.length);
    return { value: avg, verified: true, count: subs.length,
             min: Math.min(...subs.map(s=>s.value)), max: Math.max(...subs.map(s=>s.value)),
             impliedMult: baseAvg > 0 ? +(avg/baseAvg).toFixed(2) : null };
  }
  const b = SERIAL_BRACKETS.find(b => b.id === bracketId);
  const recommended = b ? Math.round(baseAvg * b.mult) : baseAvg;
  return { value: recommended, verified: false, count: 0, min: recommended, max: recommended, impliedMult: b?.mult ?? 1 };
}

function serialValue(baseAvg, bracketId) {
  const b = SERIAL_BRACKETS.find(b => b.id === bracketId);
  return b ? Math.round(baseAvg * b.mult) : baseAvg;
}

const WEEK_MS = 7*24*60*60*1000;

function hasSubmittedThisWeek(traderId,subs) {

function voteWeight(days) {
  if (days<30)  return 0.5;
  if (days<90)  return 0.75;
  if (days<180) return 1.0;
  return 1.25;
}
function weightLabel(days) {
  if (days<30)  return { w:"0.5×", color:"#f87171", note:"New account — reduced vote weight" };
  if (days<90)  return { w:"0.75×",color:"#fbbf24", note:"Growing account — partial weight"  };

  return               { w:"1.25×",color:"#4ade80", note:"Veteran — boosted weight"           };
}
function calcDemand(base,net) {
  const shift = Math.max(-1,Math.min(1,Math.round(net/25)));
  return Math.max(0,Math.min(4,base+shift));
}
function calcValue(subs) {
  const valid = subs.filter(s=>!s.flagged);
  if (!valid.length) return null;
  // Require at least 2 distinct traders before price is considered verified
  const distinctTraders = new Set(valid.map(s=>s.traderId)).size;
  if (distinctTraders < 2) return { avg: valid[0].value, min: valid[0].value, max: valid[0].value, flaggedCount: subs.filter(s=>s.flagged).length, unverified: true };
  const vals = valid.map(s=>s.value);
  const avg  = Math.round(vals.reduce((a,b)=>a+b,0)/vals.length);
  return { avg, min:Math.min(...vals), max:Math.max(...vals), flaggedCount:subs.filter(s=>s.flagged).length, unverified: false };
}
function calcWeeklyChange(hist) {
  if (!hist||hist.length<2) return 0;
  return hist[hist.length-1].v - hist[hist.length-2].v;
}
function calcConfidence(subs) {
  const valid = subs.filter(s=>!s.flagged);
  const n = valid.length;
  const distinctTraders = new Set(valid.map(s=>s.traderId)).size;
  if (distinctTraders < 2) return { label:"Unverified", color:"#f87171", pct:15, desc:`Only 1 trader has submitted. Needs a 2nd trader to verify.` };
  if (n>=6) return { label:"High",   color:"#4ade80", pct:100, desc:`Based on ${n} verified submissions.` };
  if (n>=3) return { label:"Medium", color:"#fbbf24", pct:60,  desc:`Based on ${n} verified submissions.` };
  return           { label:"Low",    color:"#f87171", pct:25,  desc:`Only ${n} verified submission${n!==1?"s":""}.` };
}
function calcTier(avg,rarity) {
  if (rarity==="Artifact")                                    return "S";
  if (rarity==="Legendary" && avg>=10000)                    return "A";
  if (rarity==="Legendary" || (rarity==="Rare" && avg>=5000)) return "B";
  if (rarity==="Rare" || rarity==="Uncommon")                return "C";
  return "D";
}
function canUserVote(account) {
  if (!account)                  return { ok:false, reason:"You must be logged in to vote." };
  if (account.joinedDaysAgo<7)  return { ok:false, reason:`Account must be 7+ days old. (${7-account.joinedDaysAgo} days remaining)` };
  return { ok:true, reason:null };
}
function buildSkins(submissions, votes, frozen, bracketSubs) {
  return SKINS_DB.map(skin=>{
    const subs    = submissions[skin.id]??[];
    const val     = calcValue(subs);
    const hist    = VALUE_HISTORY_DB[skin.id]??[];
    const weekly  = calcWeeklyChange(hist);
    const conf    = calcConfidence(subs);
    const tier    = val?calcTier(val.avg,skin.rarity):"C";
    const base    = TRADER_DEMAND_BASE[skin.id]??2;
    const net     = votes[skin.id]??0;
    const demand  = calcDemand(base,net);
    const demHist = DEMAND_HISTORY_DB[skin.id]??[];
    const isFrozen= !!frozen[skin.id];
    const flaggedCount = subs.filter(s=>s.flagged).length;
    const bSubs   = bracketSubs?.[skin.id] ?? {};
    return {...skin,subs,val,hist,weekly,conf,tier,base,net,demand,demHist,isFrozen,flaggedCount,bSubs};
  });
}

// Get all submissions by a trader across all skins
function getTraderSubmissions(username, submissions) {
  return Object.entries(submissions).flatMap(([skinId,subs])=>
    subs.filter(s=>s.traderId===username).map(s=>({...s,skinId}))
  ).sort((a,b)=>new Date(b.submittedAt)-new Date(a.submittedAt));
}

// ─────────────────────────────────────────────────────────────
//  TOOLTIP
// ─────────────────────────────────────────────────────────────
function Tip({ content, children }) {
  const [vis,setVis] = useState(false);
  const [pos,setPos] = useState({x:0,y:0});
  const show = e => {
    const r=e.currentTarget.getBoundingClientRect();
    setPos({x:r.left+r.width/2,y:r.top-8});
    setVis(true);
  };
  return (
    <span style={{position:"relative",display:"inline-flex"}} onMouseEnter={show} onMouseLeave={()=>setVis(false)}>
      {children}
      {vis&&<span style={{position:"fixed",left:pos.x,top:pos.y,transform:"translate(-50%,-100%)",background:"#1e1e1e",border:"1px solid #303030",borderRadius:10,padding:"8px 12px",fontSize:12,color:"#ccc",lineHeight:1.55,maxWidth:220,whiteSpace:"normal",zIndex:9999,pointerEvents:"none",boxShadow:"0 8px 24px rgba(0,0,0,0.5)"}}>{content}</span>}
    </span>
  );
}

  return (
    <Tip content={<><strong style={{color:m.color}}>{tier} Tier — {m.label}</strong></>}>
      <span style={{background:m.bg,color:m.color,border:`1px solid ${m.color}40`,borderRadius:8,fontWeight:800,fontSize:large?13:11,padding:large?"4px 12px":"2px 9px",letterSpacing:"0.04em",cursor:"default"}}>{tier} Tier</span>
    </Tip>
  );
}
function RarityPill({ rarity }) {
  const m = RARITY_META[rarity];
  return (
    <Tip content={<><strong style={{color:m.color}}>{rarity}</strong><br/>{m.desc}</>}>
      <span style={{background:m.color+"18",color:m.color,border:`1px solid ${m.color}35`,borderRadius:99,fontSize:10,fontWeight:700,padding:"2px 9px",cursor:"default"}}>{rarity}</span>
    </Tip>

}
function ConfidenceBadge({ conf }) {
  const meta = CONFIDENCE_META.find(c=>c.label===conf.label)||CONFIDENCE_META[2];
  return (
    <Tip content={<><strong style={{color:meta.color}}>{meta.label} Confidence</strong><br/>{meta.desc}</>}>
      <span style={{background:conf.color+"18",color:conf.color,border:`1px solid ${conf.color}40`,borderRadius:99,fontSize:11,fontWeight:700,padding:"2px 10px",cursor:"default"}}>{conf.label} Confidence</span>
    </Tip>
  );
}
function DemandMeter({ score, showLabel=true, size="md" }) {
  const color=DEMAND_COLORS[score], meta=DEMAND_META[score];
  const segW=size==="lg"?22:16, segH=size==="lg"?10:7;
  return (
    <Tip content={<><strong style={{color}}>{meta.label} Demand</strong><br/>{meta.desc}</>}>
      <div style={{display:"flex",alignItems:"center",gap:8,cursor:"default"}}>
        <div style={{display:"flex",gap:3}}>
          {[0,1,2,3,4].map(i=><div key={i} style={{width:segW,height:segH,borderRadius:3,background:i<=score?color:"#252525",transition:"background 0.3s"}}/>)}
        </div>
        {showLabel&&<span style={{fontSize:size==="lg"?14:12,color,fontWeight:700}}>{DEMAND_LABELS[score]}</span>}
      </div>
    </Tip>
  );
}

function ToastContainer({ toasts }) {
  if (!toasts.length) return null;
  const colors = { info:"#60a5fa", warn:"#fbbf24", success:"#4ade80", error:"#f87171" };
  return (
    <div style={{position:"fixed",bottom:24,right:24,zIndex:9999,display:"flex",flexDirection:"column",gap:8,alignItems:"flex-end",pointerEvents:"none"}}>
      {toasts.map(t => (
        <div key={t.id} style={{
          background:"#1a1a1a",border:`1px solid ${colors[t.type]||colors.info}40`,
          borderLeft:`3px solid ${colors[t.type]||colors.info}`,
          borderRadius:10,padding:"10px 16px",maxWidth:320,
          boxShadow:"0 8px 24px rgba(0,0,0,0.5)",
          animation:"toast-in 0.25s ease",fontSize:13,color:"#e0e0e0",lineHeight:1.5,
        }}>
          {t.message}
        </div>
      ))}
    </div>
  );
}

function AuthModal({ onLogin, onClose }) {
  const [user,    setUser]    = useState("");
  const [email,   setEmail]   = useState("");
  const [pass,    setPass]    = useState("");
  const [error,   setError]   = useState("");
  const [loading, setLoading] = useState(false);
  const [mode,    setMode]    = useState("login");
  const inp = {background:"#111",border:"1px solid #252525",borderRadius:10,color:"#e0e0e0",fontFamily:"inherit",fontSize:14,fontWeight:500,padding:"10px 14px",outline:"none",width:"100%"};

  const handle = async () => {
    setError(""); setLoading(true);
    try {
      if (mode === "login") {
        const { data, error: err } = await supabase.auth.signInWithPassword({ email, password: pass });
        if (err) { setError("Incorrect email or password."); return; }
        const { data: profile } = await supabase.from("profiles").select("*").eq("id", data.user.id).single();
        if (profile?.banned) {
          await supabase.auth.signOut();
          setError(`This account has been suspended.${profile.banned_reason ? ` Reason: ${profile.banned_reason}` : ""}`);
          return;
        }
        if (profile) onLogin(normaliseProfile(profile));
      } else {
        if (user.trim().length < 3) { setError("Username must be 3+ characters."); return; }
        if (!email.includes("@"))   { setError("Please enter a valid email."); return; }
        if (pass.length < 6)        { setError("Password must be 6+ characters."); return; }
        // Check username not taken
        const { data: existing } = await supabase.from("profiles").select("id").eq("username", user.trim()).single();
        if (existing) { setError("Username already taken."); return; }
        const { data, error: err } = await supabase.auth.signUp({
          email, password: pass,
          options: { data: { username: user.trim() } }
        });
        if (err) { setError(err.message); return; }
        if (!data.user) { setError("Signup failed. Please try again."); return; }

        // Try to upsert profile — may fail if RLS blocks it, trigger may have already created it
        const profileData = {
          id: data.user.id,
          username: user.trim(),
          role: "community",
          avatar_emoji: "🎮",
          avatar_color: 0,
          bio: "",
          roblox_username: "",
          discord_name: "",
          favorite_weapon: "",
          reputation: 10,
          total_submissions: 0,
          badge: null,
        };
        const { error: profileErr } = await supabase.from("profiles").upsert(profileData);

        if (profileErr) {
          // Upsert failed — wait briefly for trigger then try to fetch
          await new Promise(r => setTimeout(r, 1200));
          const { data: existing } = await supabase.from("profiles").select("*").eq("id", data.user.id).single();
          if (existing) {
            onLogin(normaliseProfile(existing));
            return;
          }
          // Trigger also failed — still log them in with local profile, they can update later
        }

        onLogin({ username: user.trim(), role:"community", avatarColor:0, avatarEmoji:"🎮",
          bio:"", robloxUsername:"", discordName:"", favoriteWeapon:"",
          totalSubmissions:0, reputation:10, badge:null, joinedDaysAgo:0 });
      }
    } catch(e) {
      setError("Something went wrong. Please try again.");
    } finally {
      setLoading(false);
    }
  };

  return (
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.75)",zIndex:100,display:"flex",alignItems:"center",justifyContent:"center",backdropFilter:"blur(4px)"}}>
      <div style={{background:"#141414",border:"1px solid #252525",borderRadius:20,padding:"32px",width:380,position:"relative"}}>
        <button onClick={onClose} style={{position:"absolute",top:16,right:16,background:"none",border:"none",color:"#555",cursor:"pointer",fontSize:18}}>✕</button>
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:8}}>
          <div style={{width:36,height:36,background:"linear-gradient(135deg,#f97316,#c2410c)",borderRadius:10,display:"flex",alignItems:"center",justifyContent:"center",fontSize:17}}>⚔</div>
          <div>
            <div style={{fontFamily:"'Oxanium',sans-serif",fontWeight:700,fontSize:16,color:"#fff",letterSpacing:"-0.01em"}}>CA Market</div>
            <div style={{fontSize:10,color:"#444"}}>Community price index · Not affiliated with Combat Arena</div>
          </div>
        </div>
        <div style={{marginBottom:20}}/>
        <div style={{display:"flex",background:"#111",borderRadius:12,padding:3,marginBottom:24}}>
          {["login","register"].map(m=>(
            <button key={m} onClick={()=>{setMode(m);setError("");}} style={{flex:1,background:mode===m?"#1e1e1e":"transparent",border:"none",borderRadius:9,color:mode===m?"#f97316":"#666",cursor:"pointer",fontFamily:"inherit",fontSize:13,fontWeight:600,padding:"7px 0",textTransform:"capitalize"}}>{m==="login"?"Log In":"Register"}</button>
          ))}
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          {mode==="register" && (
            <input style={inp} placeholder="Username" value={user} onChange={e=>{setUser(e.target.value);setError("");}} onKeyDown={e=>e.key==="Enter"&&handle()}/>
          )}
          {mode==="login" ? (
            <input style={inp} placeholder="Email address" value={email} onChange={e=>{setEmail(e.target.value);setError("");}} onKeyDown={e=>e.key==="Enter"&&handle()}/>
          ) : (
            <input style={inp} placeholder="Email address" value={email} onChange={e=>{setEmail(e.target.value);setError("");}} onKeyDown={e=>e.key==="Enter"&&handle()}/>
          )}
          <input style={inp} placeholder="Password" type="password" value={pass} onChange={e=>{setPass(e.target.value);setError("");}} onKeyDown={e=>e.key==="Enter"&&handle()}/>
          {error && <div style={{fontSize:12,color:"#f87171",padding:"4px 0"}}>⚠ {error}</div>}
          <button onClick={handle} disabled={loading}
            style={{background:loading?"#333":"linear-gradient(135deg,#f97316,#c2410c)",border:"none",borderRadius:10,color:loading?"#666":"#000",cursor:loading?"default":"pointer",fontFamily:"inherit",fontSize:14,fontWeight:700,padding:"11px",marginTop:4}}>
            {loading ? "Please wait…" : mode==="login" ? "Log In" : "Create Account"}
          </button>
          {mode==="register" && <div style={{fontSize:11,color:"#444",textAlign:"center",lineHeight:1.5}}>By registering you agree to our Terms of Service. You must be 13+ to join.</div>}
        </div>
      </div>
    </div>
  );
}

// Simple serial labels for non-experts
const SIMPLE_SERIALS = [
  { bracketId:"s1",     label:"#1 — Unique",    emoji:"👑", desc:"The only one ever" },
  { bracketId:"s2-3",   label:"Top 3",          emoji:"💎", desc:"Extremely rare" },
  { bracketId:"s4-9",   label:"Top 10",         emoji:"🌟", desc:"Very rare" },
  { bracketId:"s10-19", label:"Low serial",     emoji:"🔥", desc:"Rare & prestigious" },
  { bracketId:"s20-50", label:"Sub-50",         emoji:"✨", desc:"Rare low serial" },
  { bracketId:"s51-99", label:"Sub-100",        emoji:"⭐", desc:"Below 100" },
  { bracketId:"s100",   label:"Floor range",    emoji:"📦", desc:"100–250 range" },
  { bracketId:"s251",   label:"Standard",       emoji:"🔹", desc:"Base value" },
];

const DEMAND_SIMPLE = ["Very Low","Low","Medium","High","Very High"];
const DEMAND_EMOJI  = ["😴","😕","😐","🙂","🔥"];

function SkinCard({ skin, onClick, viewMode="simple", hasAlert=false }) {
  const [hov,setHov]         = useState(false);
  const [serialNum,setSerial] = useState(500); // default mid-range serial
  const up = skin.weekly >= 0;

  // Derive bracket from the actual serial number
  const bracket    = getBracket(serialNum);
  const bracketIdx = SERIAL_BRACKETS.indexOf(bracket);
  const simple     = SIMPLE_SERIALS[bracketIdx] ?? SIMPLE_SERIALS[SIMPLE_SERIALS.length-1];
  const bv         = skin.val ? getBracketValue(bracket.id, skin.val.avg, skin.bSubs) : null;
  const displayVal = bv?.value ?? null;

  // Rarity label for a given serial number
  const serialRarityLabel = (n) => {
    if (n === 1)    return { label:"One of a kind",   color:"#f97316", stars:"★★★★★" };
    if (n <= 3)     return { label:"Incredibly rare", color:"#f59e0b", stars:"★★★★★" };
    if (n <= 9)     return { label:"Extremely rare",  color:"#fbbf24", stars:"★★★★☆" };
    if (n <= 19)    return { label:"Very rare",       color:"#a3e635", stars:"★★★★☆" };
    if (n <= 50)    return { label:"Rare",            color:"#86efac", stars:"★★★☆☆" };
    if (n <= 99)    return { label:"Low serial",      color:"#4ade80", stars:"★★★☆☆" };
    if (n <= 250)   return { label:"Floor range",     color:"#60a5fa", stars:"★★☆☆☆" };
    return               { label:"Standard",         color:"#818cf8", stars:"★☆☆☆☆" };
  };
  const rarityInfo = serialRarityLabel(serialNum);

  // ── SIMPLE CARD ──────────────────────────────────────────
  if (viewMode === "simple") {
    const demandLabel = DEMAND_SIMPLE[skin.demand] ?? "Medium";
    const demandEmoji = DEMAND_EMOJI[skin.demand]  ?? "😐";
    const trendLabel  = up ? "📈 Going up" : skin.weekly === 0 ? "➡️ Stable" : "📉 Going down";
    const trendColor  = up ? "#4ade80" : skin.weekly === 0 ? "#888" : "#f87171";
    const rarityDesc  = { Artifact:"Rarest tier", Legendary:"Very rare", Rare:"Uncommon find", Uncommon:"Obtainable", Common:"Common drop" };

    return (
      <div onClick={()=>onClick(skin)} onMouseEnter={()=>setHov(true)} onMouseLeave={()=>setHov(false)}
        style={{background:"#141414",border:`1px solid ${hov?"#f9731650":"#1e1e1e"}`,borderRadius:18,padding:"18px",cursor:"pointer",boxShadow:hov?"0 0 20px rgba(249,115,22,0.07)":"none",transition:"all 0.2s",display:"flex",flexDirection:"column",gap:14}}>

        {/* Header row */}
        <div style={{display:"flex",gap:12,alignItems:"center"}}>
          <div style={{width:48,height:48,background:"#1a1a1a",borderRadius:14,display:"flex",alignItems:"center",justifyContent:"center",fontSize:24,flexShrink:0}}>{skin.emoji}</div>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontSize:15,fontWeight:700,color:"#f0f0f0",marginBottom:4,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{skin.name}</div>
            <div style={{display:"flex",gap:5,alignItems:"center"}}>
              <span style={{background:RARITY_COLOR[skin.rarity]+"18",color:RARITY_COLOR[skin.rarity],border:`1px solid ${RARITY_COLOR[skin.rarity]}35`,borderRadius:99,fontSize:10,fontWeight:700,padding:"1px 8px",whiteSpace:"nowrap"}}>{skin.specificWeapon||skin.weapon}</span>
              <span style={{fontSize:10,color:"#444"}}>{skin.weapon}</span>
            </div>
          </div>
          {skin.isFrozen&&<FrozenBadge/>}
          {hasAlert&&<span title="Alert set" style={{fontSize:14,lineHeight:1}}>🔔</span>}
        </div>

        {/* Serial number slider + input */}
        <div onClick={e=>e.stopPropagation()}>
          <div style={{fontSize:11,color:"#666",fontWeight:600,marginBottom:8}}>🔢 Serial number</div>

          {/* Slider and text input side by side */}
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
            <input type="range" min={1} max={500} value={Math.min(serialNum,500)}
              onChange={e=>setSerial(+e.target.value)}
              style={{flex:1,accentColor:rarityInfo.color,cursor:"pointer"}}/>
            <input
              type="number" min={1} max={99999} value={serialNum}
              onChange={e=>{
                const v = Math.max(1, parseInt(e.target.value)||1);
                setSerial(v);
              }}
              style={{width:72,background:"#1a1a1a",border:`1px solid ${rarityInfo.color}55`,borderRadius:8,color:rarityInfo.color,fontFamily:"'DM Sans',sans-serif",fontSize:13,fontWeight:700,padding:"5px 8px",outline:"none",textAlign:"center"}}/>
          </div>
          <div style={{display:"flex",justifyContent:"space-between",fontSize:9,color:"#444",marginBottom:8}}>
            <span>#1</span><span>#50</span><span>#100</span><span>#251+</span>
          </div>

          {/* Rarity rating card */}
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",background:rarityInfo.color+"12",border:`1px solid ${rarityInfo.color}25`,borderRadius:10,padding:"8px 12px"}}>
            <div>
              <div style={{fontSize:12,fontWeight:700,color:rarityInfo.color}}>{rarityInfo.label}</div>
              <div style={{fontSize:10,color:"#555",marginTop:1}}>#{serialNum.toLocaleString()} · {bracket.mult}× base</div>
            </div>
            <div style={{fontSize:15,letterSpacing:2,color:rarityInfo.color,opacity:0.9}}>{rarityInfo.stars}</div>
          </div>
        </div>

        {/* Value — big and clear */}
        <div style={{background:"#111",borderRadius:14,padding:"14px 16px"}}>
          <div style={{fontSize:11,color:"#555",fontWeight:600,marginBottom:8}}>💰 Estimated value</div>
          {displayVal ? (
            <div style={{display:"flex",flexDirection:"column",gap:4}}>
              <div style={{display:"flex",alignItems:"center",gap:6}}>
                <span style={{fontFamily:"'DM Sans',sans-serif",fontSize:20,fontWeight:800,color:rarityInfo.color,letterSpacing:"-0.01em",lineHeight:1,fontVariantNumeric:"tabular-nums"}}>{fmt(displayVal)}</span>
                <span style={{fontSize:11,color:"#555",fontWeight:500}}>coins</span>
              </div>
              {skin.val&&bracket.mult!==1&&(
                <div style={{fontSize:10,color:"#444"}}>{fmt(skin.val.avg)} base × {bracket.mult}</div>
              )}
            </div>
          ) : <span style={{fontSize:14,color:"#444"}}>Not yet valued</span>}
        </div>

        {/* Demand + trend row */}
        <div style={{display:"flex",gap:8}}>
          <div style={{flex:1,background:"#111",borderRadius:10,padding:"10px 12px",textAlign:"center"}}>
            <div style={{fontSize:18,marginBottom:3}}>{demandEmoji}</div>
            <div style={{fontSize:11,fontWeight:700,color:DEMAND_COLORS[skin.demand]}}>{demandLabel}</div>
            <div style={{fontSize:10,color:"#444"}}>Demand</div>
          </div>
          <div style={{flex:1,background:"#111",borderRadius:10,padding:"10px 12px",textAlign:"center"}}>
            <div style={{fontSize:11,fontWeight:700,color:trendColor,marginBottom:3}}>{trendLabel}</div>
            <div style={{fontSize:11,fontWeight:600,color:trendColor}}>{up?"+":""}{fmt(skin.weekly)}</div>
            <div style={{fontSize:10,color:"#444"}}>This week</div>
          </div>
        </div>

        <div style={{fontSize:11,color:"#444",textAlign:"center"}}>Tap to see full details →</div>
      </div>
    );
  }

  // ── ADVANCED CARD ────────────────────────────────────────
  return (
    <div onMouseEnter={()=>setHov(true)} onMouseLeave={()=>setHov(false)}
      style={{background:"#141414",border:`1px solid ${hov?"#f9731650":"#1e1e1e"}`,borderRadius:18,padding:"18px",boxShadow:hov?"0 0 24px rgba(249,115,22,0.08)":"none",transition:"border-color 0.2s,box-shadow 0.2s",display:"flex",flexDirection:"column",gap:12}}>

        <div style={{display:"flex",gap:5,alignItems:"center"}}>
          <span style={{background:RARITY_COLOR[skin.rarity]+"18",color:RARITY_COLOR[skin.rarity],border:`1px solid ${RARITY_COLOR[skin.rarity]}35`,borderRadius:99,fontSize:10,fontWeight:700,padding:"1px 8px"}}>{skin.specificWeapon||skin.weapon}</span>
          <span style={{fontSize:10,color:"#444"}}>{skin.weapon}</span>
        </div>
      </div>

      {/* Badges */}
      <div style={{display:"flex",gap:6,alignItems:"center",flexWrap:"wrap"}}>
        <RarityPill rarity={skin.rarity}/>
        <DemandMeter score={skin.demand} showLabel={false}/>
        {skin.flaggedCount>0&&<Tip content={`${skin.flaggedCount} flagged submission${skin.flaggedCount>1?"s":""}.`}><span style={{background:"rgba(251,191,36,0.1)",color:"#fbbf24",border:"1px solid rgba(251,191,36,0.25)",borderRadius:99,fontSize:10,fontWeight:700,padding:"2px 8px",cursor:"default"}}>⚠ {skin.flaggedCount}</span></Tip>}

        <div style={{fontSize:9,fontWeight:700,color:"#444",textTransform:"uppercase",letterSpacing:"0.07em",marginBottom:5}}>Serial</div>
        <div style={{display:"flex",flexWrap:"wrap",gap:3}}>

              style={{background:bracketIdx===i?b.color+"22":"transparent",border:`1px solid ${bracketIdx===i?b.color:"#252525"}`,borderRadius:6,color:bracketIdx===i?b.color:"#555",cursor:"pointer",fontFamily:"inherit",fontSize:9,fontWeight:700,padding:"3px 5px",transition:"all 0.12s",whiteSpace:"nowrap"}}>
              {b.label}
            </button>
          ))}
        </div>
      </div>

      {/* Value */}
      <div style={{borderTop:"1px solid #1e1e1e",paddingTop:12}}>
        {displayVal ? (
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-end"}}>
            <div>
              <div style={{display:"flex",alignItems:"baseline",gap:4}}>
                <span style={{fontSize:20,fontWeight:800,color:bracket.color,letterSpacing:"-0.02em"}}>{fmt(displayVal)}</span>
                <span style={{fontSize:11,color:"#555"}}>coins</span>
              </div>
              <div style={{fontSize:10,color:"#555",marginTop:2}}>
                {bracketIdx!==SERIAL_BRACKETS.length-1?`${bv?.impliedMult??bracket.mult}× base · serial ${bracket.label}${bv?.verified?" · ✓":""}` : "Base value"}
              </div>
            </div>
            <span style={{fontSize:11,fontWeight:700,color:up?"#4ade80":"#f87171",background:up?"rgba(74,222,128,0.07)":"rgba(248,113,113,0.07)",border:`1px solid ${up?"rgba(74,222,128,0.2)":"rgba(248,113,113,0.2)"}`,borderRadius:99,padding:"3px 8px"}}>{up?"+":""}{fmt(skin.weekly)}</span>
          </div>
        ) : <span style={{fontSize:12,color:"#444"}}>No value yet</span>}
      </div>

      {skin.hist?.length>1&&<div style={{height:40}}><ResponsiveContainer width="100%" height={40}><LineChart data={skin.hist}><Line type="monotone" dataKey="v" stroke={up?"#4ade80":"#f87171"} strokeWidth={2} dot={false}/></LineChart></ResponsiveContainer></div>}
      <ConfidenceBadge conf={skin.conf}/>
    </div>
  );
}

    <Panel>
      <SectionLabel>Community Demand Vote</SectionLabel>

      <div style={{marginBottom:16}}><DemandMeter score={skin.demand} showLabel size="lg"/></div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:16}}>

        <div style={{background:"#111",borderRadius:12,padding:"12px 14px"}}><div style={{fontSize:10,color:"#555",fontWeight:700,textTransform:"uppercase",letterSpacing:"0.05em",marginBottom:6}}>Community Shift</div><div style={{fontSize:18,fontWeight:800,color:shift>0?"#4ade80":shift<0?"#f87171":"#666"}}>{shift>0?`+${shift}`:shift===0?"±0":shift} tier</div><div style={{fontSize:11,color:"#555",marginTop:2}}>{skin.net>0?"+":""}{skin.net.toFixed?skin.net.toFixed(1):skin.net} weighted votes</div></div>
      </div>
      {!currentUser?(<div style={{background:"rgba(249,115,22,0.06)",border:"1px solid rgba(249,115,22,0.2)",borderRadius:12,padding:"12px 16px",fontSize:13,color:"#888",textAlign:"center"}}>🔒 <strong style={{color:"#f97316"}}>Log in</strong> to vote</div>)
      :!voteCheck.ok?(<div style={{background:"rgba(248,113,113,0.06)",border:"1px solid rgba(248,113,113,0.2)",borderRadius:12,padding:"12px 16px",fontSize:13,color:"#888"}}>⏳ {voteCheck.reason}</div>)

        <div>
          <div style={{marginBottom:12,padding:"8px 12px",background:"#111",borderRadius:10,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <span style={{fontSize:11,color:"#555"}}>Your vote weight</span>
            <Tip content={<><strong style={{color:wl.color}}>{wl.w}</strong><br/>{wl.note}<br/>Account age: {getJoinedDaysAgo(currentUser)} days</>}>
              <span style={{fontSize:13,fontWeight:800,color:wl.color,cursor:"default"}}>{wl.w}</span>
            </Tip>
          </div>
          <div style={{fontSize:11,color:"#555",marginBottom:10}}>Your vote: {userVote===1?<strong style={{color:"#4ade80"}}>👍 Upvoted</strong>:userVote===-1?<strong style={{color:"#f87171"}}>👎 Downvoted</strong>:<span style={{color:"#555"}}>Not voted</span>}</div>
          <div style={{display:"flex",gap:8}}>
            {[{dir:1,label:"👍 High Demand",ac:"#4ade80"},{dir:-1,label:"👎 Low Demand",ac:"#f87171"}].map(({dir,label,ac})=>(
              <button key={dir} onClick={()=>onVote(skin.id,dir)} style={{flex:1,background:userVote===dir?`${ac}18`:"#111",border:`1px solid ${userVote===dir?ac:"#252525"}`,borderRadius:10,color:userVote===dir?ac:"#888",cursor:"pointer",fontFamily:"inherit",fontSize:13,fontWeight:700,padding:"10px",transition:"all 0.15s"}}
                onMouseEnter={e=>{if(userVote!==dir){e.currentTarget.style.borderColor=ac;e.currentTarget.style.color=ac;}}}

function AlertModal({ skin, currentAlert, onSave, onClose }) {
  const [bracketId, setBracketId] = useState(currentAlert?.bracketId ?? null);
  const [above, setAbove] = useState(currentAlert?.above ? String(currentAlert.above) : "");
  const [below, setBelow] = useState(currentAlert?.below ? String(currentAlert.below) : "");

  const inp = {background:"#111",border:"1px solid #252525",borderRadius:10,color:"#e0e0e0",fontFamily:"inherit",fontSize:14,fontWeight:500,padding:"9px 13px",outline:"none",width:"100%",boxSizing:"border-box"};
  const hasAlert = above.trim() || below.trim();

  // Compute the current tracked price based on selected bracket
  const baseAvg = skin.val?.avg ?? 0;
  const trackedPrice = bracketId
    ? getBracketValue(bracketId, baseAvg, skin.bSubs).value
    : baseAvg;
  const selectedBracket = SERIAL_BRACKETS.find(b => b.id === bracketId);

  const save = () => {
    const a = above.trim() ? Math.round(Number(above)) : null;
    const b = below.trim() ? Math.round(Number(below)) : null;
    if ((a !== null && (isNaN(a)||a<=0)) || (b !== null && (isNaN(b)||b<=0))) return;
    onSave(a, b, bracketId);
    onClose();
  };
  const clear = () => { onSave(null, null, null); onClose(); };

  return (
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.75)",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center",backdropFilter:"blur(4px)"}}>
      <div style={{background:"#141414",border:"1px solid #252525",borderRadius:20,padding:"28px",width:360,position:"relative"}}>
        <button onClick={onClose} style={{position:"absolute",top:14,right:14,background:"none",border:"none",color:"#555",cursor:"pointer",fontSize:18,lineHeight:1}}>✕</button>

        {/* Header */}
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:20}}>
          <div style={{width:36,height:36,background:"#1a1a1a",borderRadius:10,display:"flex",alignItems:"center",justifyContent:"center",fontSize:20}}>{skin.emoji}</div>
          <div>
            <div style={{fontFamily:"Syne,sans-serif",fontWeight:800,fontSize:15,color:"#fff"}}>{skinLabel(skin)}</div>
            <div style={{fontSize:12,color:"#555"}}>Price Alert</div>
          </div>
        </div>

        {/* Serial bracket selector */}
        <div style={{marginBottom:16}}>
          <div style={{fontSize:12,color:"#888",marginBottom:8,fontWeight:600}}>🔢 Track price for serial</div>
          <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
            <button onClick={()=>setBracketId(null)}
              style={{padding:"4px 10px",borderRadius:8,border:`1px solid ${bracketId===null?"#f97316":"#252525"}`,background:bracketId===null?"rgba(249,115,22,0.12)":"#111",color:bracketId===null?"#f97316":"#555",cursor:"pointer",fontSize:11,fontWeight:700,fontFamily:"inherit",transition:"all 0.15s"}}>
              Base
            </button>
            {SERIAL_BRACKETS.map(b => (
              <button key={b.id} onClick={()=>setBracketId(b.id)}
                style={{padding:"4px 10px",borderRadius:8,border:`1px solid ${bracketId===b.id?b.color:"#252525"}`,background:bracketId===b.id?b.color+"22":"#111",color:bracketId===b.id?b.color:"#555",cursor:"pointer",fontSize:11,fontWeight:700,fontFamily:"inherit",transition:"all 0.15s"}}>
                {b.label}
              </button>
            ))}
          </div>
        </div>

        {/* Current price for selected bracket */}
        {trackedPrice > 0 && (
          <div style={{background:"#111",borderRadius:10,padding:"8px 12px",marginBottom:14,fontSize:12,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
            <span style={{color:"#555"}}>Current {selectedBracket ? selectedBracket.label : "base"} price</span>
            <span style={{color:"#e0e0e0",fontWeight:700}}>{trackedPrice.toLocaleString()}</span>
          </div>
        )}

        {/* Thresholds */}
        <div style={{marginBottom:12}}>
          <div style={{fontSize:12,color:"#888",marginBottom:6,fontWeight:600}}>📈 Alert me when price goes <span style={{color:"#4ade80"}}>above</span></div>
          <input style={inp} type="number" min="1" placeholder={trackedPrice > 0 ? `e.g. ${Math.round(trackedPrice*1.1).toLocaleString()}` : "e.g. 15000"} value={above} onChange={e=>setAbove(e.target.value)}/>
        </div>
        <div style={{marginBottom:20}}>
          <div style={{fontSize:12,color:"#888",marginBottom:6,fontWeight:600}}>📉 Alert me when price drops <span style={{color:"#f87171"}}>below</span></div>
          <input style={inp} type="number" min="1" placeholder={trackedPrice > 0 ? `e.g. ${Math.round(trackedPrice*0.9).toLocaleString()}` : "e.g. 8000"} value={below} onChange={e=>setBelow(e.target.value)}/>
        </div>

        <div style={{display:"flex",gap:8}}>
          {currentAlert && <button onClick={clear} style={{flex:"none",background:"rgba(248,113,113,0.1)",border:"1px solid rgba(248,113,113,0.25)",borderRadius:10,color:"#f87171",cursor:"pointer",fontFamily:"inherit",fontSize:13,fontWeight:600,padding:"9px 14px"}}>Clear</button>}
          <button onClick={save} disabled={!hasAlert} style={{flex:1,background:hasAlert?"linear-gradient(135deg,#f97316,#c2410c)":"#1a1a1a",border:"none",borderRadius:10,color:hasAlert?"#000":"#444",cursor:hasAlert?"pointer":"default",fontFamily:"inherit",fontSize:13,fontWeight:700,padding:"9px 0",transition:"all 0.15s"}}>Set Alert</button>
        </div>
      </div>
    </div>
  );
}

function SkinPage({ skin, currentUser, userVote, onVote, onBack, onTraderSubmit, disputes, onDispute, onAdminFreeze, profiles, onViewProfile, onBracketSubmit, userAlerts, onSetAlert, communityVotes, onCommunityVote, isMobile=false }) {
  const [valInput,setValInput]           = useState("");
  const [note,setNote]                   = useState("");
  const [sent,setSent]                   = useState(false);
  const [submitError,setSubmitError]     = useState("");
  const [activeBracket, setActiveBracket]= useState("s100");
  const [subBracket, setSubBracket]      = useState(SERIAL_BRACKETS[0].id);
  const [showAlertModal, setShowAlertModal] = useState(false);
  const currentAlert = userAlerts?.[skin.id] ?? null;
  const up=skin.weekly>=0, tm=TIER_META[skin.tier];
  const isAdmin=currentUser?.role==="admin", isTrader=currentUser?.role==="trader"||isAdmin;
  const inp={background:"#111",border:"1px solid #252525",borderRadius:10,color:"#e0e0e0",fontFamily:"inherit",fontSize:13,fontWeight:500,padding:"9px 13px",outline:"none",width:"100%"};
  const skinDisputes=disputes[skin.id]??[];

  // Check if trader already submitted for this bracket this week
  const hasSubmittedBracketThisWeek = (traderId, bracketId) => {
    const bsubs = skin.bSubs?.[bracketId] ?? [];
    return bsubs.some(s => s.traderId===traderId && (Date.now()-new Date(s.submittedAt).getTime()) < 7*24*60*60*1000);
  };

  const tryBracketSubmit = () => {
    const n = parseInt(valInput); if (!n||n<1) return;
    if (skin.isFrozen) { setSubmitError("Skin is frozen."); return; }
    if (hasSubmittedBracketThisWeek(currentUser?.username, subBracket)) {
      setSubmitError("Already submitted for this bracket this week."); return;
    }
    // Outlier check: compare against this bracket's current value (verified avg or recommended)
    const bv = getBracketValue(subBracket, baseAvg, skin.bSubs);
    const flagged = bv.value > 0 && Math.abs(n - bv.value) / bv.value > 0.20;
    onBracketSubmit(skin.id, subBracket, n, flagged);
    setSent(flagged?"flagged":"ok"); setTimeout(()=>setSent(false),4000);
    setValInput(""); setNote(""); setSubmitError("");
  };

  const baseAvg = skin.val?.avg ?? 0;
  const selectedBracket = SERIAL_BRACKETS.find(b=>b.id===activeBracket) ?? SERIAL_BRACKETS[SERIAL_BRACKETS.length-1];
  // Use verified bracket value if available, else recommended
  const selBV      = getBracketValue(activeBracket, baseAvg, skin.bSubs);
  const selectedVal= selBV.value;
  const selectedMin= selBV.min;
  const selectedMax= selBV.max;

  return (
    <div>
      <button onClick={onBack} style={{background:"none",border:"1px solid #252525",borderRadius:10,color:"#888",cursor:"pointer",fontFamily:"inherit",fontSize:13,fontWeight:600,padding:"7px 16px",marginBottom:24,transition:"color 0.15s"}} onMouseEnter={e=>e.currentTarget.style.color="#f97316"} onMouseLeave={e=>e.currentTarget.style.color="#888"}>← Back to Tracker</button>

      {/* Header panel */}
      <Panel style={{marginBottom:14,position:"relative",overflow:"hidden"}}>
        <div style={{position:"absolute",top:-60,right:-60,width:220,height:220,background:`radial-gradient(circle,${tm.color}12 0%,transparent 70%)`,pointerEvents:"none"}}/>
        <div style={{display:"flex",alignItems:"center",gap:20,flexWrap:"wrap"}}>
          <div style={{width:70,height:70,background:"#1a1a1a",borderRadius:16,display:"flex",alignItems:"center",justifyContent:"center",fontSize:34,flexShrink:0}}>{skin.emoji}</div>
          <div style={{flex:1}}>
            <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:8,alignItems:"center"}}><TierBadge tier={skin.tier} large/><RarityPill rarity={skin.rarity}/>{skin.isFrozen&&<FrozenBadge/>}{skin.flaggedCount>0&&<span style={{background:"rgba(251,191,36,0.1)",color:"#fbbf24",border:"1px solid rgba(251,191,36,0.25)",borderRadius:8,fontSize:11,fontWeight:700,padding:"2px 10px"}}>⚠ {skin.flaggedCount} outlier{skin.flaggedCount>1?"s":""} excluded</span>}</div>
            <div style={{fontFamily:"Syne,sans-serif",fontSize:24,fontWeight:800,color:"#fff",marginBottom:4}}>{skinLabel(skin)}</div>
            <div style={{fontSize:13,color:"#666"}}>{skinSubLabel(skin)}</div>
          </div>
          <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:12}}>
            <div><div style={{fontSize:10,color:"#555",textTransform:"uppercase",letterSpacing:"0.05em",marginBottom:8}}>Current Demand</div><DemandMeter score={skin.demand} size="lg"/></div>
            <div style={{display:"flex",gap:8,flexWrap:"wrap",justifyContent:"flex-end"}}>
              {currentUser && (
                <button onClick={()=>setShowAlertModal(true)} style={{background:currentAlert?"rgba(251,191,36,0.12)":"rgba(249,115,22,0.08)",border:`1px solid ${currentAlert?"rgba(251,191,36,0.4)":"rgba(249,115,22,0.25)"}`,borderRadius:10,color:currentAlert?"#fbbf24":"#f97316",cursor:"pointer",fontFamily:"inherit",fontSize:12,fontWeight:700,padding:"7px 14px",display:"flex",alignItems:"center",gap:5}}>
                  {currentAlert ? "🔔 Alert Set" : "🔔 Set Alert"}
                </button>
              )}
              {isAdmin&&<button onClick={()=>onAdminFreeze(skin.id)} style={{background:skin.isFrozen?"rgba(74,222,128,0.1)":"rgba(96,165,250,0.1)",border:`1px solid ${skin.isFrozen?"#4ade80":"#60a5fa"}`,borderRadius:10,color:skin.isFrozen?"#4ade80":"#60a5fa",cursor:"pointer",fontFamily:"inherit",fontSize:12,fontWeight:700,padding:"7px 14px"}}>{skin.isFrozen?"🔓 Unfreeze":"🔒 Freeze"}</button>}
            </div>
          </div>
        </div>
      </Panel>

      {/* ── SERIAL PRICE TABLE ── */}
      <Panel style={{marginBottom:14}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14,flexWrap:"wrap",gap:8}}>
          <div>
            <SectionLabel>Serial Price Index</SectionLabel>
            <div style={{fontSize:12,color:"#555",marginTop:2}}>
              Brackets with trader submissions show a <span style={{color:"#4ade80",fontWeight:700}}>Verified</span> price.
              Unsubmitted brackets show a <span style={{color:"#60a5fa",fontWeight:700}}>Recommended</span> price based on the base multiplier.
            </div>
          </div>
          {baseAvg>0&&(
            <div style={{textAlign:"right"}}>
              <div style={{display:"flex",alignItems:"baseline",gap:5}}>
                <span style={{fontFamily:"Syne,sans-serif",fontSize:26,fontWeight:800,color:selectedBracket.color,letterSpacing:"-0.03em"}}>{fmt(selectedVal)}</span>
                <span style={{fontSize:13,color:"#555"}}>coins</span>
              </div>
              <div style={{display:"flex",alignItems:"center",gap:6,justifyContent:"flex-end",marginTop:2}}>
                <span style={{fontSize:11,color:"#555"}}>Serial {selectedBracket.label} · {selBV.impliedMult}× base</span>
                {selBV.verified
                  ? <span style={{background:"rgba(74,222,128,0.12)",border:"1px solid rgba(74,222,128,0.3)",borderRadius:99,fontSize:9,fontWeight:800,color:"#4ade80",padding:"1px 7px"}}>✓ VERIFIED</span>
                  : <span style={{background:"rgba(96,165,250,0.12)",border:"1px solid rgba(96,165,250,0.3)",borderRadius:99,fontSize:9,fontWeight:800,color:"#60a5fa",padding:"1px 7px"}}>~ RECOMMENDED</span>
                }
              </div>
            </div>
          )}
        </div>

        {/* Bracket selector tabs */}
        <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:16}}>
          {SERIAL_BRACKETS.map(b=>{
            const bv     = getBracketValue(b.id, baseAvg, skin.bSubs);
            const active = activeBracket===b.id;
            return (
              <button key={b.id} onClick={()=>setActiveBracket(b.id)}
                style={{background:active?b.color+"20":"#111",border:`1px solid ${active?b.color:"#252525"}`,borderRadius:10,cursor:"pointer",fontFamily:"inherit",padding:"8px 12px",transition:"all 0.15s",textAlign:"left",minWidth:90,position:"relative"}}>
                <div style={{fontSize:11,fontWeight:700,color:active?b.color:"#666",marginBottom:2}}>{b.label}</div>
                <div style={{fontSize:13,fontWeight:800,color:active?"#fff":"#888"}}>{baseAvg>0?fmt(bv.value):"—"}</div>
                <div style={{fontSize:9,color:active?b.color+"aa":"#444",marginTop:1}}>{bv.impliedMult}× {bv.verified?"(verified)":"(rec.)"}</div>
                {bv.verified&&<div style={{position:"absolute",top:5,right:5,width:6,height:6,borderRadius:"50%",background:"#4ade80"}}/>}
              </button>
            );
          })}
        </div>

        {/* Full table */}
        {baseAvg>0&&(
          <div style={{borderRadius:12,overflow:"hidden",border:"1px solid #1a1a1a",overflowX:isMobile?"auto":"visible"}}>
            <div style={{display:"grid",gridTemplateColumns:isMobile?"1fr 80px 80px 70px":"1.2fr 110px 110px 110px 120px 100px",background:"#0e0e0e",padding:"8px 16px",gap:8,minWidth:isMobile?0:undefined}}>
              {(isMobile?["Serial","Min","Avg","Mult"]:["Serial Range","Min","Avg","Max","Multiplier","Status"]).map(h=>(
                <div key={h} style={{fontSize:10,fontWeight:700,color:"#444",textTransform:"uppercase",letterSpacing:"0.06em"}}>{h}</div>
              ))}
            </div>
            {SERIAL_BRACKETS.map((b,i)=>{
              const bv     = getBracketValue(b.id, baseAvg, skin.bSubs);
              const active = activeBracket===b.id;
              const recVal = Math.round(baseAvg * b.mult);
              return (
                <div key={b.id} onClick={()=>setActiveBracket(b.id)}
                  style={{display:"grid",gridTemplateColumns:"1.2fr 110px 110px 110px 120px 100px",padding:"10px 16px",gap:8,cursor:"pointer",borderBottom:i<SERIAL_BRACKETS.length-1?"1px solid #141414":"none",background:active?b.color+"0a":"transparent",transition:"background 0.15s"}}
                  onMouseEnter={e=>{if(!active)e.currentTarget.style.background="#141414"}}
                  onMouseLeave={e=>{if(!active)e.currentTarget.style.background="transparent"}}>
                  <div style={{display:"flex",alignItems:"center",gap:8}}>
                    <div style={{width:8,height:8,borderRadius:"50%",background:b.color,flexShrink:0}}/>
                    <span style={{fontSize:13,fontWeight:active?700:500,color:active?b.color:"#ccc"}}>{b.label}</span>
                  </div>
                  <div style={{fontSize:13,color:"#60a5fa",fontWeight:600}}>{fmt(bv.min)}</div>
                  <div style={{fontSize:13,color:active?b.color:"#e0e0e0",fontWeight:active?800:600}}>{fmt(bv.value)}</div>
                  <div style={{fontSize:13,color:"#a855f7",fontWeight:600}}>{fmt(bv.max)}</div>
                  <div style={{display:"flex",flexDirection:"column",gap:2}}>
                    <span style={{fontSize:13,fontWeight:700,color:b.color}}>{bv.impliedMult}×</span>
                    {bv.verified&&recVal!==bv.value&&(
                      <span style={{fontSize:9,color:"#444"}}>rec. {fmt(recVal)}</span>
                    )}
                  </div>
                  <div>
                    {bv.verified
                      ? <span style={{background:"rgba(74,222,128,0.1)",border:"1px solid rgba(74,222,128,0.25)",borderRadius:99,fontSize:9,fontWeight:800,color:"#4ade80",padding:"2px 8px",whiteSpace:"nowrap"}}>✓ Verified ({bv.count})</span>
                      : <span style={{background:"rgba(96,165,250,0.08)",border:"1px solid rgba(96,165,250,0.2)",borderRadius:99,fontSize:9,fontWeight:700,color:"#60a5fa",padding:"2px 8px",whiteSpace:"nowrap"}}>~ Recommended</span>
                    }
                  </div>
                </div>
              );
            })}
          </div>
        )}
      </Panel>

      {/* Stat cards — serial-aware */}
      {baseAvg>0&&<div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10,marginBottom:14}}>
        <StatCard label={`Value (${selectedBracket.label})`} value={`${fmt(selectedVal)} coins`} accent={selectedBracket.color}/>
        <StatCard label="Min (this bracket)" value={`${fmt(selectedMin)} coins`} accent="#60a5fa"/>
        <StatCard label="Max (this bracket)" value={`${fmt(selectedMax)} coins`} accent="#a855f7"/>
        <StatCard label="Weekly Change" value={`${up?"+":""}${fmt(skin.weekly)} coins`} accent={up?"#4ade80":"#f87171"}/>
      </div>}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14,marginBottom:14}}>
        <Panel><SectionLabel>Value History</SectionLabel>{skin.hist?.length>1?<PriceChart history={skin.hist}/>:<div style={{height:160,display:"flex",alignItems:"center",justifyContent:"center",color:"#333",fontSize:13}}>No history</div>}</Panel>
        <Panel><SectionLabel>Demand History</SectionLabel><DemandHistChart history={skin.demHist}/><div style={{marginTop:12,display:"flex",gap:6,alignItems:"center"}}><div style={{fontSize:11,color:"#555"}}>Current:</div><DemandMeter score={skin.demand} showLabel/></div></Panel>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14,marginBottom:14}}>
        <Panel><SectionLabel>Confidence Score</SectionLabel><ConfidenceBadge conf={skin.conf}/><div style={{fontSize:12,color:"#555",marginTop:10,lineHeight:1.6}}>{skin.conf.desc}</div><div style={{marginTop:12,background:"#1a1a1a",borderRadius:99,height:6}}><div style={{width:`${skin.conf.pct}%`,height:6,borderRadius:99,background:skin.conf.color}}/></div></Panel>
        {baseAvg>0&&selectedMin!==selectedMax&&<Panel><SectionLabel>Value Range — {selectedBracket.label}</SectionLabel><div style={{position:"relative",height:8,background:"#1a1a1a",borderRadius:99,margin:"16px 0 8px"}}><div style={{position:"absolute",left:`${((selectedMin-selectedMin*0.9)/(selectedMax*1.1-selectedMin*0.9))*100}%`,width:`${((selectedMax-selectedMin)/(selectedMax*1.1-selectedMin*0.9))*100}%`,height:8,background:`linear-gradient(90deg,#60a5fa,${selectedBracket.color})`,borderRadius:99}}/><div style={{position:"absolute",left:`${((selectedVal-selectedMin*0.9)/(selectedMax*1.1-selectedMin*0.9))*100}%`,top:-3,width:2,height:14,background:selectedBracket.color,borderRadius:1,transform:"translateX(-50%)"}}/></div><div style={{display:"flex",justifyContent:"space-between",fontSize:11,color:"#555"}}><span>Min: <strong style={{color:"#60a5fa"}}>{fmt(selectedMin)}</strong></span><span>Avg: <strong style={{color:selectedBracket.color}}>{fmt(selectedVal)}</strong></span><span>Max: <strong style={{color:"#a855f7"}}>{fmt(selectedMax)}</strong></span></div></Panel>}
      </div>
      <div style={{marginBottom:14}}><DemandVoteWidget skin={skin} currentUser={currentUser} userVote={userVote} onVote={onVote}/></div>

      {/* ── BRACKET SUBMISSION PANEL ── */}
      <Panel style={{marginBottom:14}}>
        <SectionLabel>🔑 Submit Serial Bracket Price</SectionLabel>
        <div style={{fontSize:12,color:"#555",marginBottom:14,lineHeight:1.6,marginTop:4}}>
          Traders can submit a verified price for any specific serial range. Once a bracket has enough verified submissions it becomes <strong style={{color:"#4ade80"}}>Verified</strong> and overrides the recommended multiplier.
        </div>
        {skin.isFrozen
          ? <div style={{padding:"14px 16px",background:"rgba(96,165,250,0.06)",border:"1px solid rgba(96,165,250,0.2)",borderRadius:12,fontSize:13,color:"#60a5fa"}}>🔒 Submissions disabled while frozen.</div>
          : !isTrader
            ? <div style={{padding:"14px 16px",background:"rgba(249,115,22,0.06)",border:"1px solid rgba(249,115,22,0.2)",borderRadius:12,fontSize:13,color:"#888"}}>Only trusted traders can submit bracket values.</div>
            : (
              <div style={{display:"flex",flexDirection:"column",gap:10}}>
                {/* Bracket selector */}
                <div>
                  <div style={{fontSize:11,color:"#555",marginBottom:6,fontWeight:600}}>Select serial range to submit for:</div>
                  <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
                    {SERIAL_BRACKETS.map(b=>{
                      const bv       = getBracketValue(b.id, baseAvg, skin.bSubs);
                      const alreadySub = hasSubmittedBracketThisWeek(currentUser?.username, b.id);
                      const isSelected = subBracket===b.id;
                      return (
                        <button key={b.id} onClick={()=>{setSubBracket(b.id);setSubmitError("");setValInput("");}}
                          disabled={alreadySub}
                          style={{background:isSelected?b.color+"22":alreadySub?"#0e0e0e":"#111",border:`1px solid ${isSelected?b.color:alreadySub?"#1a1a1a":"#252525"}`,borderRadius:8,cursor:alreadySub?"not-allowed":"pointer",fontFamily:"inherit",padding:"6px 10px",transition:"all 0.12s",opacity:alreadySub?0.4:1}}>
                          <div style={{fontSize:10,fontWeight:700,color:isSelected?b.color:"#777"}}>{b.label}</div>
                          <div style={{fontSize:9,color:"#444",marginTop:1}}>
                            {alreadySub?"submitted":bv.verified?`✓ ${bv.count} sub${bv.count!==1?"s":""}`:"no data"}
                          </div>
                        </button>
                      );
                    })}
                  </div>
                </div>

                {/* Selected bracket context */}
                {(()=>{
                  const b   = SERIAL_BRACKETS.find(x=>x.id===subBracket);
                  const bv  = getBracketValue(subBracket, baseAvg, skin.bSubs);
                  const rec = baseAvg>0 ? Math.round(baseAvg * (b?.mult??1)) : null;
                  return (
                    <div style={{background:"#111",border:`1px solid ${b?.color}22`,borderRadius:10,padding:"10px 14px",display:"flex",gap:16,flexWrap:"wrap"}}>
                      <div>
                        <div style={{fontSize:10,color:"#555",marginBottom:2}}>Serial range</div>
                        <div style={{fontSize:13,fontWeight:700,color:b?.color}}>{b?.label}</div>
                      </div>
                      <div>
                        <div style={{fontSize:10,color:"#555",marginBottom:2}}>Current price</div>
                        <div style={{fontSize:13,fontWeight:700,color:"#e0e0e0"}}>{fmt(bv.value)}
                          <span style={{fontSize:9,marginLeft:6,color:bv.verified?"#4ade80":"#60a5fa",fontWeight:800}}>{bv.verified?"VERIFIED":"RECOMMENDED"}</span>
                        </div>
                      </div>
                      {rec&&bv.verified&&rec!==bv.value&&<div>
                        <div style={{fontSize:10,color:"#555",marginBottom:2}}>Recommended</div>
                        <div style={{fontSize:13,fontWeight:600,color:"#444"}}>{fmt(rec)}</div>
                      </div>}
                      <div>
                        <div style={{fontSize:10,color:"#555",marginBottom:2}}>Multiplier</div>
                        <div style={{fontSize:13,fontWeight:700,color:b?.color}}>{bv.impliedMult}× base</div>
                      </div>
                    </div>
                  );
                })()}

                <input style={inp} type="number" placeholder={`Your suggested price for ${SERIAL_BRACKETS.find(x=>x.id===subBracket)?.label ?? subBracket}…`} value={valInput} onChange={e=>{setValInput(e.target.value);setSubmitError("");}}/>
                {submitError&&<div style={{fontSize:12,color:"#f87171"}}>⚠ {submitError}</div>}
                {sent==="flagged"&&<div style={{padding:"10px 14px",background:"rgba(251,191,36,0.08)",border:"1px solid rgba(251,191,36,0.25)",borderRadius:10,fontSize:12,color:"#fbbf24",lineHeight:1.6}}>⚠ Your submission is outside the normal price range and has been sent to a <strong>7-day community vote</strong>. If the community keeps it, it will be included in the average. You can see the vote below.</div>}
                {sent==="ok"&&<div style={{padding:"10px 14px",background:"rgba(74,222,128,0.08)",border:"1px solid rgba(74,222,128,0.2)",borderRadius:10,fontSize:12,color:"#4ade80"}}>✓ Submitted — bracket value updated.</div>}
                {!sent&&<button onClick={tryBracketSubmit} style={{background:"linear-gradient(135deg,#f97316,#c2410c)",border:"none",borderRadius:10,color:"#000",cursor:"pointer",fontFamily:"inherit",fontSize:13,fontWeight:700,padding:"10px"}}>Submit Bracket Price</button>}
              </div>
            )
        }

        {/* All bracket submissions log */}
        {Object.keys(skin.bSubs??{}).length>0&&(
          <div style={{marginTop:16,borderTop:"1px solid #1e1e1e",paddingTop:14}}>
            <div style={{fontSize:10,fontWeight:700,color:"#444",textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:10}}>Bracket Submission Log</div>
            {SERIAL_BRACKETS.map(b=>{
              const bsubs = (skin.bSubs?.[b.id]??[]);
              if (!bsubs.length) return null;
              return (
                <div key={b.id} style={{marginBottom:10}}>
                  <div style={{fontSize:11,fontWeight:700,color:b.color,marginBottom:6,display:"flex",alignItems:"center",gap:6}}>
                    <div style={{width:6,height:6,borderRadius:"50%",background:b.color}}/>
                    {b.label}
                  </div>
                  <div style={{display:"flex",flexDirection:"column",gap:4}}>
                    {bsubs.map((s,i)=>(
                      <div key={i} style={{display:"flex",alignItems:"center",justifyContent:"space-between",background:"#111",borderRadius:8,padding:"6px 12px"}}>
                        <div style={{display:"flex",gap:8,alignItems:"center"}}>
                          <Avatar profile={profiles[s.traderId]} size={24} onClick={()=>onViewProfile(s.traderId)}/>
                          <button onClick={()=>onViewProfile(s.traderId)} style={{background:"none",border:"none",color:"#f97316",cursor:"pointer",fontFamily:"inherit",fontSize:11,fontWeight:600,padding:0}}>{s.traderId}</button>
                          <span style={{fontSize:10,color:"#444"}}>{s.submittedAt}</span>
                        </div>
                        <div style={{display:"flex",alignItems:"center",gap:6}}>
                          <span style={{fontSize:12,fontWeight:700,color:s.flagged?"#555":"#ccc"}}>{fmt(s.value)}</span>
                          {s.flagged
                            ? <span style={{background:"rgba(251,191,36,0.1)",color:"#fbbf24",border:"1px solid rgba(251,191,36,0.25)",borderRadius:6,fontSize:9,fontWeight:700,padding:"1px 6px"}}>⚠ Flagged</span>
                            : <span style={{background:"rgba(74,222,128,0.08)",color:"#4ade80",border:"1px solid rgba(74,222,128,0.2)",borderRadius:6,fontSize:9,fontWeight:700,padding:"1px 6px"}}>✓ Verified</span>
                          }
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              );
            })}
          </div>
        )}
      </Panel>

      {/* Community Vote Panel */}
      {communityVotes && communityVotes.length > 0 && (
        <Panel style={{marginTop:14}}>
          <div style={{fontSize:10,fontWeight:700,color:"#555",textTransform:"uppercase",letterSpacing:"0.07em",marginBottom:4}}>🗳️ Community Price Votes</div>
          <div style={{fontSize:12,color:"#555",marginBottom:16,lineHeight:1.6}}>
            These submissions were flagged as outliers. The community votes to keep or reject them over 7 days.
            {currentUser && (profiles[currentUser.username]?.reputation??0) < MIN_REP && (
              <span style={{color:"#fbbf24"}}> You need {MIN_REP}+ reputation to vote.</span>
            )}
          </div>
          {(communityVotes||[]).map(vote => {
            const now        = Date.now();
            const msLeft     = Math.max(0, vote.expiresAt - now);
            const daysLeft   = Math.ceil(msLeft / (24*60*60*1000));
            const hoursLeft  = Math.ceil(msLeft / (60*60*1000));
            const timeLabel  = daysLeft > 1 ? `${daysLeft}d left` : hoursLeft > 0 ? `${hoursLeft}h left` : "Closing soon";
            const total      = vote.keep.length + vote.reject.length;
            const keepPct    = total > 0 ? Math.round(vote.keep.length/total*100) : 50;
            const rejectPct  = total > 0 ? Math.round(vote.reject.length/total*100) : 50;
            const userVoted  = currentUser && (vote.keep.includes(currentUser.username) || vote.reject.includes(currentUser.username));
            const myVote     = currentUser && (vote.keep.includes(currentUser.username) ? "keep" : vote.reject.includes(currentUser.username) ? "reject" : null);
            const canVote    = currentUser && (profiles[currentUser.username]?.reputation??0) >= MIN_REP && vote.traderId !== currentUser.username;
            const bracketLabel = vote.bracketId ? (SERIAL_BRACKETS.find(b=>b.id===vote.bracketId)?.label ?? vote.bracketId) : "Base price";
            const needsMore  = total < MIN_VOTES;

            return (
              <div key={vote.id} style={{background:"#0e0e0e",border:"1px solid #1e1e1e",borderRadius:12,padding:"14px 16px",marginBottom:10}}>
                {/* Header */}
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10,flexWrap:"wrap",gap:8}}>
                  <div>
                    <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4,flexWrap:"wrap"}}>
                      <span style={{background:"rgba(251,191,36,0.1)",color:"#fbbf24",border:"1px solid rgba(251,191,36,0.25)",borderRadius:99,fontSize:10,fontWeight:700,padding:"2px 8px"}}>⚠ Outlier</span>
                      <span style={{fontSize:12,fontWeight:700,color:"#e0e0e0"}}>{fmt(vote.value)} coins</span>
                      <span style={{fontSize:11,color:"#555"}}>— {bracketLabel}</span>
                    </div>
                    <div style={{fontSize:11,color:"#555"}}>
                      Submitted by <span style={{color:"#f97316",fontWeight:600}}>{vote.traderId}</span> · {vote.submittedAt}
                    </div>
                  </div>
                  <div style={{display:"flex",alignItems:"center",gap:6}}>
                    <span style={{fontSize:10,fontWeight:700,color:"#444",background:"#1a1a1a",borderRadius:99,padding:"2px 8px"}}>⏱ {timeLabel}</span>
                    <span style={{fontSize:10,color:"#444"}}>{total} vote{total!==1?"s":""}{needsMore?` (${MIN_VOTES-total} more needed)`:""}</span>
                  </div>
                </div>

                {/* Vote bar */}
                <div style={{marginBottom:10}}>
                  <div style={{display:"flex",borderRadius:99,overflow:"hidden",height:8,background:"#1a1a1a",marginBottom:6}}>
                    <div style={{width:`${keepPct}%`,background:"#4ade80",transition:"width 0.4s"}}/>
                    <div style={{width:`${rejectPct}%`,background:"#f87171",transition:"width 0.4s"}}/>
                  </div>
                  <div style={{display:"flex",justifyContent:"space-between",fontSize:10,color:"#555"}}>
                    <span style={{color:"#4ade80",fontWeight:700}}>✓ Keep {vote.keep.length}</span>
                    <span style={{color:"#f87171",fontWeight:700}}>✕ Reject {vote.reject.length}</span>
                  </div>
                </div>

                {/* Vote buttons */}
                {canVote ? (
                  <div style={{display:"flex",gap:8}}>
                    <button onClick={()=>onCommunityVote(vote.id,"keep")}
                      style={{flex:1,background:myVote==="keep"?"rgba(74,222,128,0.15)":"#111",border:`1px solid ${myVote==="keep"?"#4ade80":"#252525"}`,borderRadius:8,color:myVote==="keep"?"#4ade80":"#888",cursor:"pointer",fontFamily:"inherit",fontSize:12,fontWeight:700,padding:"7px 0",transition:"all 0.15s"}}>
                      ✓ Keep
                    </button>
                    <button onClick={()=>onCommunityVote(vote.id,"reject")}
                      style={{flex:1,background:myVote==="reject"?"rgba(248,113,113,0.15)":"#111",border:`1px solid ${myVote==="reject"?"#f87171":"#252525"}`,borderRadius:8,color:myVote==="reject"?"#f87171":"#888",cursor:"pointer",fontFamily:"inherit",fontSize:12,fontWeight:700,padding:"7px 0",transition:"all 0.15s"}}>
                      ✕ Reject
                    </button>
                  </div>
                ) : !currentUser ? (
                  <div style={{fontSize:12,color:"#555",textAlign:"center",padding:"6px 0"}}>Log in to vote</div>
                ) : vote.traderId === currentUser.username ? (
                  <div style={{fontSize:12,color:"#555",textAlign:"center",padding:"6px 0"}}>You submitted this — you can't vote on your own submission</div>
                ) : (
                  <div style={{fontSize:12,color:"#555",textAlign:"center",padding:"6px 0"}}>Need {MIN_REP}+ reputation to vote</div>
                )}
              </div>
            );
          })}
        </Panel>
      )}

      {/* Dispute panel */}
      <Panel>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:skinDisputes.length?14:0}}>
          <div><div style={{fontSize:10,fontWeight:700,color:"#555",textTransform:"uppercase",letterSpacing:"0.07em",marginBottom:4}}>⚠️ Dispute Value</div><div style={{fontSize:12,color:"#555"}}>Think this value is wrong? Flag it for admin review.</div></div>
          {currentUser?(<button onClick={()=>{}} style={{background:"#111",border:"1px solid #252525",borderRadius:10,color:"#888",cursor:"pointer",fontFamily:"inherit",fontSize:12,fontWeight:700,padding:"8px 14px"}}>Flag this value</button>):<span style={{fontSize:12,color:"#555"}}>Log in to dispute</span>}
        </div>
        {skinDisputes.length>0&&(<div style={{borderTop:skinDisputes.length?"1px solid #1e1e1e":"none",paddingTop:skinDisputes.length?14:0}}>
          {skinDisputes.map((d,i)=>(
            <div key={i} style={{background:"rgba(251,191,36,0.05)",border:"1px solid rgba(251,191,36,0.15)",borderRadius:10,padding:"10px 14px",marginBottom:8}}>
              <div style={{fontSize:12,color:"#ccc",lineHeight:1.5,marginBottom:4}}>"{d.reason}"</div>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                {profiles[d.user]&&<Avatar profile={profiles[d.user]} size={20} onClick={()=>onViewProfile(d.user)}/>}
                <span style={{fontSize:11,color:"#555"}}>by <button onClick={()=>onViewProfile(d.user)} style={{background:"none",border:"none",color:"#f97316",cursor:"pointer",fontFamily:"inherit",fontSize:11,fontWeight:600,padding:0}}>{d.user}</button> · {d.time}</span>
              </div>
            </div>
          ))}
        </div>)}
      </Panel>
      <div style={{fontSize:11,color:"#333",marginTop:12,paddingLeft:2}}>Last updated: Mar 8, 2026</div>

      {showAlertModal && (
        <AlertModal
          skin={skin}
          currentAlert={currentAlert}
          onSave={(above, below, bracketId) => onSetAlert(skin.id, above, below, bracketId)}
          onClose={() => setShowAlertModal(false)}
        />
      )}
    </div>
  );
}

//  GIF PICKER (Tenor public API)
